<script>
  /**
   * 切換手機端狀態明細顯示
   */
  function toggleStatusDetails() {
    const group = document.getElementById("cacheStatusGroup");
    group.classList.toggle("is-expanded");
    // 點擊後 5 秒自動收合，避免擋住內容
    if (group.classList.contains("is-expanded")) {
      setTimeout(() => group.classList.remove("is-expanded"), 5000);
    }
  }

  /**
   * 處理刷新對照表快取的 UI 邏輯
   */
  function handleRefreshMapping() {
    // 1. 關閉 Offcanvas 導覽列
    var offcanvasElement = document.querySelector("#offcanvasNavbar");
    if (offcanvasElement) {
      var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (bsOffcanvas) bsOffcanvas.hide();
    }

    // 2. 顯示 Loading
    AppUI.loading("同步中", "正在重新讀取對照表資料...");

    // 3. 呼叫後端 refreshMappingCache
    google.script.run
      .withSuccessHandler(function (res) {
        if (res.status === "success") {
          AppUI.success("刷新成功", res.message, 2000).then(function () {
            checkSystemStatus(); // 同步更新導航列的版本指示燈
          });
        } else {
          AppUI.showCommonError(res);
        }
      })
      .withFailureHandler(function (err) {
        AppUI.showCommonError(err);
      })
      .refreshMappingCache();
  }

  /**
   * 處理清理 V1 快取的 UI 邏輯
   */
  function handleClearV1Cache() {
    // 1. 關閉 Offcanvas 導覽列
    var offcanvasElement = document.querySelector("#offcanvasNavbar");
    if (offcanvasElement) {
      var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (bsOffcanvas) bsOffcanvas.hide();
    }

    // 2. 彈出確認視窗
    AppUI.confirm(
      "確定要清理 V1 智慧預測快取？",
      "這將會清除 V1 專屬的運算暫存與 Settings 紀錄，下次載入時會重新獲取。",
    ).then(function (result) {
      if (result.isConfirmed) {
        // 3. 顯示 Loading
        var lotto = $("#lottoType").val() || $("#lottoSelect").val() || "L539";
        AppUI.loading("清理中", "正在清除 V1 快取資料...");

        // 4. 呼叫後端 clearV1Cache
        google.script.run
          .withSuccessHandler(function (res) {
            performPostClearActions(
              "Prediction1",
              "V1 快取已重置，頁面即將重新載入。",
            );
          })
          .withFailureHandler(function (err) {
            AppUI.showCommonError(err);
          })
          .clearV1Cache(lotto);
      }
    });
  }

  /**
   * 處理清理 Prediction1 History 的 UI 邏輯
   */
  function handleClearPrediction1History() {
    var offcanvasElement = document.querySelector("#offcanvasNavbar");
    if (offcanvasElement) {
      var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (bsOffcanvas) bsOffcanvas.hide();
    }

    AppUI.confirm(
      "確定要清理 V1 歷史回測資料？",
      "這將會清除 prct1_History 中的所有回測紀錄，下次查看趨勢圖時將重新運算。",
    ).then(function (result) {
      if (result.isConfirmed) {
        var lotto = $("#lottoType").val() || $("#lottoSelect").val() || "L539";
        AppUI.loading("清理中", "正在清除歷史回測資料...");

        google.script.run
          .withSuccessHandler(function (res) {
            performPostClearActions(
              "Prediction1",
              "V1 歷史資料已清空，頁面即將重新載入。",
            );
          })
          .withFailureHandler(function (err) {
            AppUI.showCommonError(err);
          })
          .clearPrediction1History(lotto);
      }
    });
  }

  /**
   * 處理清理星系快取的 UI 邏輯
   */
  function handleClearGalaxyCache() {
    // 1. 關閉 Offcanvas 導覽列
    var offcanvasElement = document.querySelector("#offcanvasNavbar");
    if (offcanvasElement) {
      var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (bsOffcanvas) bsOffcanvas.hide();
    }

    // 2. 彈出確認視窗
    AppUI.confirm(
      "確定要清理星系規律預測快取？",
      "這將會清除星系演算法專屬的權重快取與軌道統計數據。",
    ).then(function (result) {
      if (result.isConfirmed) {
        // 3. 顯示 Loading
        var lotto = $("#lottoSelect").val() || $("#lottoType").val() || "L539";
        AppUI.loading("清理中", "正在清除星系快取資料...");

        // 4. 呼叫後端 clearPredictGalaxyCache
        google.script.run
          .withSuccessHandler(function (res) {
            performPostClearActions(
              "Predict",
              "星系快取已重置，頁面即將重新載入。",
            );
          })
          .withFailureHandler(function (err) {
            AppUI.showCommonError(err);
          })
          .clearPredictGalaxyCache(lotto);
      }
    });
  }

  /**
   * 處理全部重置的 UI 邏輯
   */
  function handleAllReset() {
    var offcanvasElement = document.querySelector("#offcanvasNavbar");
    if (offcanvasElement) {
      var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (bsOffcanvas) bsOffcanvas.hide();
    }

    AppUI.loading("讀取中", "正在獲取版本資訊...");

    google.script.run
      .withSuccessHandler(function (preview) {
        AppUI.close();

        const previewHtml = `
          <div class="mb-3 text-center">
            <div class="small text-muted mb-2">遞增類型：<span class="badge bg-info">Minor (次版本更新)</span></div>
            <span class="badge bg-secondary">${preview.current}</span>
            <i class="fas fa-long-arrow-alt-right mx-2 text-primary"></i>
            <span class="badge bg-primary">${preview.next}</span>
          </div>
          <p class="small text-muted">這將清理 UI 模板與系統日誌快取（APP_VERSION），但會保留 AI 學習權重、回測紀錄與欄位對照表。用於修復介面顯示異常。</p>
        `;

        Swal.fire({
          title: "確定執行系統核心重置？",
          html: previewHtml,
          icon: "question",
          showCancelButton: true,
          confirmButtonText: "執行重置",
          cancelButtonText: "取消",
        }).then(function (result) {
          if (result.isConfirmed) {
            AppUI.loading("重置中", "正在進行毀滅性快取清理...");
            google.script.run
              .withSuccessHandler(function (res) {
                localStorage.clear();
                AppUI.success(
                  "重置完成",
                  "系統已更新至 " + preview.next,
                  2000,
                ).then(function () {
                  openPageUrl("Index", "_top", true);
                });
              })
              .withFailureHandler(AppUI.showCommonError)
              .resetAllSystems();
          }
        });
      })
      .withFailureHandler(AppUI.showCommonError)
      .getResetPreview();
  }

  /**
   * 執行清理後的共通動作 (備份、清除 localStorage、重載)
   */
  function performPostClearActions(defaultPage, successMsg) {
    // 先備份當前主題設定，避免被清空
    var currentTheme = localStorage.getItem("theme");

    // 1. 取得當前輸入狀態備份 (如彩種、日期)
    var backup = {
      lotto: $("#lottoSelect").val() || $("#lottoType").val(),
      date: $("#predictDate").val() || $("#predDate").val(),
      useTrend: $("#useTrend").is(":checked"),
      topN: $("#topNSelect").val() || $("#topN").val(),
      isReloaded: true,
    };

    // 2. 獲取當前頁面 (支援 V1 預測頁面偵測)
    var currentPage = defaultPage || "Index";
    if ($("#predictButton").length) currentPage = "Predict";
    else if ($("#predDate").length || $("#lottoType").length)
      currentPage = "Prediction1";
    else if ($("#btnCmbUpdate").length || $("#btnMissUpdate").length)
      currentPage = "UpdateAll";

    // 3. 清除客戶端本地儲存並重新寫入備份
    localStorage.clear();
    localStorage.setItem("sys_backup_settings", JSON.stringify(backup));
    if (currentTheme) localStorage.setItem("theme", currentTheme);

    // 4. 顯示成功訊息並重載頁面
    AppUI.success(
      "清理完成",
      successMsg || "快取已重置，頁面即將重新載入。",
      1500,
    ).then(function () {
      openPageUrl(currentPage, "_top", true);
    });
  }

  // --- 腳本容錯與載入優化 ---
  // 確保 jQuery 載入完成後才執行 setupNav
  (function initNav() {
    var checkJQuery = setInterval(function () {
      if (window.jQuery) {
        clearInterval(checkJQuery);
        setupNav();
      }
    }, 50); // 每 50ms 檢查一次

    // 若 3 秒後仍未載入則停止檢查，避免無限迴圈
    setTimeout(function () {
      if (!window.jQuery)
        console.error("jQuery 載入超時，部分功能可能無法使用。");
      clearInterval(checkJQuery);
    }, 3000);
  })();

  function setupNav() {
    $(document).ready(function () {
      // 初始化連線模式選擇
      const savedMode = localStorage.getItem("connection_mode") || "auto";
      $("#connectionModeSelect").val(savedMode);
      detectAndApplyMode();

      // 啟動網路品質監控，確保在不穩定的環境下自動降級
      monitorNetworkQuality();

      checkSystemStatus();
      // 每 5 分鐘自動背景更新
      setInterval(checkSystemStatus, 300000);
    });
  }

  /**
   * 監控網路連線品質
   */
  function monitorNetworkQuality() {
    const checkAndDowngrade = (reason) => {
      const mode = localStorage.getItem("connection_mode") || "auto";
      // 若為即時或自動模式，當離線時強制降級顯示
      if (mode !== "cache") {
        updateConnectionModeUI("cache", "網路異常: " + reason);
      }
    };

    window.addEventListener("offline", () => checkAndDowngrade("已斷線"));
    window.addEventListener("online", () => detectAndApplyMode());

    // 2. 監聽網路品質變動 (Network Information API)
    if (navigator.connection) {
      navigator.connection.addEventListener("change", detectAndApplyMode);
    }
  }

  /**
   * 變更連線模式設定
   */
  function changeConnectionMode(mode) {
    localStorage.setItem("connection_mode", mode);
    detectAndApplyMode();
    AppUI.toast(
      "連線模式已切換為：" + $("#connectionModeSelect option:selected").text(),
      "info",
    );
  }

  /**
   * 偵測當前環境並決定最終生效的模式 (Effective Mode)
   */
  function detectAndApplyMode() {
    const mode = localStorage.getItem("connection_mode") || "auto";

    if (mode === "realtime") {
      updateConnectionModeUI("realtime", "手動強制即時");
    } else if (mode === "cache") {
      updateConnectionModeUI("cache", "手動強制快取");
    } else {
      // 自動模式：執行延遲測試
      const start = Date.now();
      google.script.run
        .withSuccessHandler(function () {
          const latency = Date.now() - start;
          $("#latencyIndicator")
            .text(latency + " ms")
            .removeClass("bg-secondary bg-success bg-warning bg-danger")
            .addClass(
              latency < 400
                ? "bg-success"
                : latency < 800
                  ? "bg-warning"
                  : "bg-danger",
            );

          let effectiveMode = "realtime";
          let reason = "連線良好";

          // 判斷基準：
          // 1. 延遲超過 800ms
          // 2. 網路類型為 2G/3G
          if (latency > 800) {
            effectiveMode = "cache";
            reason = "延遲過高 (" + latency + "ms)";
          }

          if (navigator.connection) {
            const type = navigator.connection.effectiveType;
            if (["slow-2g", "2g", "3g"].includes(type)) {
              effectiveMode = "cache";
              reason = "頻寬受限 (" + type + ")";
            }
          }

          if (!navigator.onLine) {
            effectiveMode = "cache";
            reason = "離線中";
          }

          updateConnectionModeUI(effectiveMode, "自動判定: " + reason);
          // 同步將有效模式寫入 localStorage 供 Predict 頁面讀取 (不覆蓋設定)
          localStorage.setItem("effective_connection_mode", effectiveMode);
        })
        .withFailureHandler(function () {
          updateConnectionModeUI("cache", "伺服器通訊失敗");
        })
        .getCacheStatus(); // 使用輕量 API 進行測試
    }
  }

  /**
   * 更新 UI 上的生效模式描述
   */
  function updateConnectionModeUI(effectiveMode, reason) {
    const $desc = $("#connectionModeDesc");
    const $navbar = $(".navbar");
    const isRealtime = effectiveMode === "realtime";

    // 切換導航列光暈效果 (強制快取模式指示)
    if (effectiveMode === "cache") {
      $navbar.addClass("navbar-cache-glow");
    } else {
      $navbar.removeClass("navbar-cache-glow");
    }

    if (isRealtime) {
      $desc
        .html(
          '<i class="fas fa-bolt me-1 text-warning anim-pulse"></i>' + reason,
        )
        .removeClass("text-info text-danger")
        .addClass("text-warning");
    } else {
      $desc
        .html('<i class="fas fa-database me-1 text-info"></i>' + reason)
        .removeClass("text-warning text-danger")
        .addClass("text-info");
    }
  }

  /**
   * 手動觸發狀態刷新
   */
  function handleManualStatusRefresh() {
    $("#statusRefreshIcon").addClass("fa-spin");
    checkSystemStatus(true);
  }

  /**
   * 檢查系統狀態
   * @param {boolean} isManual 是否為手動觸發
   */
  function checkSystemStatus(isManual) {
    // 背景更新開始時，讓所有指示燈進入微弱呼吸狀態
    $("#cacheStatusGroup .badge").addClass("anim-pulse");
    // 衛星圖示啟動雷達動畫
    $("#statusSummaryBtn i").addClass("radar-active");

    google.script.run
      .withSuccessHandler(function (res) {
        $("#statusSummaryBtn i").removeClass("radar-active");
        if (isManual) {
          $("#statusRefreshIcon").removeClass("fa-spin");
          AppUI.toast("系統狀態已更新", "success");
        }

        const updateBadge = (id, data, label) => {
          const $el = $("#" + id);
          if (data && data.ok) {
            let statusClass = "bg-success";
            let freshnessText = "";

            if (data.remaining !== null) {
              const mins = Math.floor(data.remaining / 60);
              freshnessText = ` (餘 ${mins}m)`;

              // 分別顯示新鮮度：低於 10 分鐘閃爍紅燈，低於 1 小時顯示橘燈
              if (mins < 10) statusClass = "bg-danger anim-pulse";
              else if (mins < 60) statusClass = "bg-warning text-dark";
            }

            $el
              .removeClass(
                "bg-secondary bg-danger bg-warning text-dark anim-pulse",
              )
              .addClass(statusClass)
              .html(
                label +
                  " " +
                  data.version +
                  (data.remaining !== null ? "*" : ""),
              )
              .attr("title", `${label} 版本: ${data.version}${freshnessText}`);
          } else {
            $el
              .removeClass(
                "bg-secondary bg-success bg-warning text-dark anim-pulse",
              )
              .addClass("bg-danger")
              .html(label + " ERR");
          }
        };

        if (res.v1) updateBadge("v1Status", res.v1, "V1");
        if (res.galaxy) updateBadge("galaxyStatus", res.galaxy, "GX");
        if (res.map) updateBadge("mapStatus", res.map, "MP");

        // 更新全域系統核心版本 (AP) 顯示
        if (res.global) {
          $("#appStatus")
            .removeClass("bg-secondary anim-pulse")
            .addClass("bg-dark")
            .html("AP " + res.global);
        }
      })
      .withFailureHandler(function (err) {
        $("#cacheStatusGroup .badge").removeClass("anim-pulse");
        $("#statusSummaryBtn i").removeClass("radar-active");
        if (isManual) $("#statusRefreshIcon").removeClass("fa-spin");
        console.warn("系統狀態檢查失敗，30 秒後重試...", err);

        // 失敗重試機制：30 秒後再次嘗試
        setTimeout(function () {
          checkSystemStatus();
        }, 30000);
      })
      .getCacheStatus();
  }
</script>
