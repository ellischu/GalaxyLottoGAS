      aria-controls="offcanvasNavbar"

      <i class="fas fa-bars"></i>

    <span class="navbar-brand mb-0 h1 text-white mx-auto"
      >Galaxy Lotto 管理系統</span

    <div

        style="

          display: inline-block;

<div
  class="offcanvas offcanvas-start"
  tabindex="-1"
  id="offcanvasNavbar"
  aria-labelledby="offcanvasNavbarLabel"
>
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasNavbarLabel">系統導航</h5>
    <button
      type="button"
      class="btn-close text-reset"
      data-bs-dismiss="offcanvas"
      aria-label="Close"
    ></button>
  </div>

  <div class="offcanvas-body">
    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
      <li class="nav-item">
        <a
          class="nav-link text-primary"
          id="navIndex"
          href="javascript:void(0)"
          onclick="openPageUrl('Index')"
          ><i class="fas fa-home me-2"></i>首頁</a
        >
      </li>

      <hr class="my-2" />

      <li class="nav-item">
        <a
          class="nav-link text-primary"
          id="navPredict"
          href="javascript:void(0)"
          onclick="openPageUrl('Predict')"
        >
          <i class="fas fa-magic me-2"></i>星系預測
        </a>
      </li>

      <li class="nav-item">
        <a
          class="nav-link text-info"
          id="navPrediction1"
          href="javascript:void(0)"
          onclick="openPageUrl('Prediction1')"
        >
          <i class="fas fa-brain me-2"></i>智慧預測 V1
        </a>
      </li>

      <li class="nav-item">
        <a
          class="nav-link text-primary"
          id="navDaily"
          href="javascript:void(0)"
          onclick="openPageUrl('UpdateAll')"
        >
          <i class="fas fa-sync-alt me-2"></i>資料維護
        </a>
      </li>

      <hr class="my-2" />

      <li class="nav-item">
        <a
          class="nav-link text-warning"
          id="navRefreshMapping"
          href="javascript:void(0)"
          onclick="handleRefreshMapping()"
        >
          <i class="fas fa-sync me-2"></i>刷新對照表
        </a>
      </li>

      <li class="nav-item">
        <a
          class="nav-link text-danger"
          id="navClearCache"
          href="javascript:void(0)"
          onclick="handleClearCache()"
        >
          <i class="fas fa-broom me-2"></i>清理快取
        </a>
      </li>
    </ul>
  </div>
</div>

<script>
  /**
   * 處理刷新對照表快取的 UI 邏輯
   */
  function handleRefreshMapping() {
    // 1. 關閉 Offcanvas 導覽列
    var offcanvasElement = document.querySelector("#offcanvasNavbar");
    if (offcanvasElement) {
      var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (bsOffcanvas) bsOffcanvas.hide();
    }

    // 2. 顯示 Loading
    AppUI.loading("同步中", "正在重新讀取對照表資料...");

    // 3. 呼叫後端 refreshMappingCache
    google.script.run
      .withSuccessHandler(function (res) {
        if (res.status === "success") {
          AppUI.success("刷新成功", res.message, 2000).then(function () {
            checkSystemStatus(); // 同步更新導航列的版本指示燈
          });
        } else {
          AppUI.showCommonError(res);
        }
      })
      .withFailureHandler(function (err) {
        AppUI.showCommonError(err);
      })
      .refreshMappingCache();
  }

  /**
   * 處理清理快取的 UI 邏輯
   */
  function handleClearCache() {
    // 1. 關閉 Offcanvas 導覽列
    var offcanvasElement = document.querySelector("#offcanvasNavbar");
    if (offcanvasElement) {
      var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (bsOffcanvas) bsOffcanvas.hide();
    }

    // 2. 彈出確認視窗
    AppUI.confirm(
      "確定要清理系統快取？",
      "這將會清除所有暫存的頁面與設定資料，下次載入時會重新從伺服器獲取。",
    ).then(function (result) {
      if (result.isConfirmed) {
        // 3. 顯示 Loading
        AppUI.loading("清理中", "正在清除星系快取資料...");

        // 4. 呼叫後端 clearAllCache
        google.script.run
          .withSuccessHandler(function (res) {
            // 先備份當前主題設定，避免被清空
            var currentTheme = localStorage.getItem("theme");

            // 1. 取得當前輸入狀態備份 (如彩種、日期)
            var backup = {
              lotto: $("#lottoSelect").val() || $("#lottoType").val(),
              date: $("#predictDate").val() || $("#predDate").val(),
              useTrend: $("#useTrend").is(":checked"),
              topN: $("#topNSelect").val() || $("#topN").val(),
              isReloaded: true,
            };

            // 2. 獲取當前頁面 (支援 V1 預測頁面偵測)
            var currentPage = "Index";
            if ($("#predictButton").length) currentPage = "Predict";
            else if ($("#predDate").length || $("#lottoType").length)
              currentPage = "Prediction1";
            else if ($("#btnCmbUpdate").length || $("#btnMissUpdate").length)
              currentPage = "UpdateAll";

            // 3. 清除客戶端本地儲存並重新寫入備份
            localStorage.clear();
            localStorage.setItem("sys_backup_settings", JSON.stringify(backup));
            if (currentTheme) localStorage.setItem("theme", currentTheme);

            // 4. 顯示成功訊息並重載頁面
            AppUI.success(
              "清理完成",
              "星系快取已重置，頁面即將重新載入。",
              1500,
            ).then(function () {
              openPageUrl(currentPage, "_top", true);
            });
          })
          .withFailureHandler(function (err) {
            AppUI.showCommonError(err);
          })
          .clearAllCache();
      }
    });
  }

  // --- 腳本容錯與載入優化 ---
  // 確保 jQuery 載入完成後才執行 setupNav
  (function initNav() {
    var checkJQuery = setInterval(function () {
      if (window.jQuery) {
        clearInterval(checkJQuery);
        setupNav();
      }
    }, 50); // 每 50ms 檢查一次

    // 若 3 秒後仍未載入則停止檢查，避免無限迴圈
    setTimeout(function () {
      if (!window.jQuery)
        console.error("jQuery 載入超時，部分功能可能無法使用。");
      clearInterval(checkJQuery);
    }, 3000);
  })();

  function setupNav() {
    $(document).ready(function () {
      checkSystemStatus();
    });
  }

  function checkSystemStatus() {
    google.script.run
      .withSuccessHandler(function (res) {
        var $badge = $("#cacheStatusBadge");
        if (res.ok) {
          var timeLabel = "";
          if (res.remaining !== null) {
            var mins = Math.floor(res.remaining / 60);
            var h = Math.floor(mins / 60);
            var m = mins % 60;
            timeLabel = " (" + (h > 0 ? h + "h" : "") + m + "m)";
          }

          $badge
            .removeClass("bg-secondary")
            .addClass("bg-success")
            .html(
              '<i class="fas fa-check-circle me-1"></i>' +
                res.version +
                timeLabel,
            )
            .attr(
              "title",
              res.remaining !== null
                ? "對照表快取有效期剩餘約 " +
                    Math.floor(res.remaining / 60) +
                    " 分鐘"
                : "對照表尚未快取，下次預測時將自動建立",
            );
        } else {
          $badge
            .removeClass("bg-secondary")
            .addClass("bg-danger")
            .html('<i class="fas fa-times-circle me-1"></i>快取異常')
            .attr("title", "快取失敗: " + res.message);
        }
      })
      .getCacheStatus();
  }
</script>
