<!doctype html>
<html>
  <head>
    <base target="_top" />
    <title>Galaxy Lotto Observer - Update All</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      /* 自定義樣式以優化手機體驗 */
      body {
        background-color: #f8f9fa;
        font-family: "Microsoft JhengHei", Arial, sans-serif;
      }

      .main-container {
        max-width: 600px;
        /* 手機優先，限制最大寬度 */
        margin: 20px auto;
        padding: 15px;
      }

      .menu-btn {
        height: 80px;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s;
      }

      .menu-btn:active {
        transform: scale(0.98);
      }

      .navbar-custom {
        background-color: #0d6efd;
        /* Bootstrap Primary Color */
        color: white;
      }

      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.7);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }

      .label-text {
        color: #6c757d;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 5px;
      }
    </style>
  </head>

  <body>
    <div id="loadingSpin" class="loading-overlay">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <?!= includeNav(); ?>

    <div class="container main-container">
      <div id="progressArea" class="mt-4" style="display: none">
        <div class="d-flex justify-content-between mb-1">
          <span id="progressLabel" class="text-muted small">準備處理...</span>
          <span id="progressPercent" class="text-primary fw-bold small"
            >0%</span
          >
        </div>
        <div class="progress" style="height: 20px">
          <div
            id="progressBar"
            class="progress-bar progress-bar-striped progress-bar-animated"
            role="progressbar"
            style="width: 0%"
          ></div>
        </div>
        <p id="currentTask" class="text-center mt-2 text-secondary small"></p>
      </div>
      <hr />
      <div class="card shadow-sm mb-4">
        <h5 class="text-center">更新表格</h5>
        <div class="card-body">
          <div class="row align-items-end">
            <div class="col-12">
              <!-- <label for="secLotto" class="form-label label-text">合併表格</label> -->
              <select id="secLotto" class="form-select label-text">
                <option value="L539">539</option>
                <option value="L649">大樂透</option>
                <option value="L638">威力彩</option>
                <option value="LSix">六合彩</option>
              </select>
            </div>
          </div>
          <div class="row g-2 align-items-end">
            <div class="col-6">
              <div class="d-grid">
                <button
                  class="btn btn-primary label-text text-white"
                  type="button"
                  id="btnCmbUpdate"
                >
                  <i class="fas fa-sync-alt me-2"></i> 合併表格更新
                </button>
              </div>
            </div>
            <div class="col-6">
              <div class="d-grid">
                <button
                  class="btn btn-danger label-text text-white"
                  type="button"
                  id="btnCmbStop"
                  disabled
                >
                  <i class="fas fa-stop me-2"></i> 合併表格停止
                </button>
              </div>
            </div>
          </div>
          <div class="row g-2 align-items-end">
            <div class="col-6">
              <div class="d-grid">
                <button
                  class="btn btn-primary label-text text-white"
                  type="button"
                  id="btnMissUpdate"
                >
                  <i class="fas fa-sync-alt me-2"></i> 遺漏表更新
                </button>
              </div>
            </div>
            <div class="col-6">
              <div class="d-grid">
                <button
                  class="btn btn-danger label-text text-white"
                  type="button"
                  id="btnMissStop"
                  disabled
                >
                  <i class="fas fa-stop me-2"></i> 遺漏表停止
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      var UpdateStatus = null;
      $(document).ready(function () {
        $("#loadingSpin").css("display", "flex");
        $("#btnCmbUpdate").click(handleCmbUpdate);
        $("#btnCmbStop").click(stopCmbUpdate);
        $("#btnMissUpdate").click(handleMissUpdate);
        $("#btnMissStop").click(stopMissUpdate);
        $("#loadingSpin").hide();
        sessionStorage.removeItem("UpdateStatus");
        google.script.run.clearProgress("Update_JOB");
      });

      function handleCmbUpdate(e) {
        if (e) e.preventDefault();
        var lotto = $("#secLotto").val();

        const startProcess = () => {
          $("#progressArea").show();
          updateProgressBar(0, 100, "啟動中...");
          callCmbUpdate(lotto);
        };
        Swal.fire({
          title: "確認更新?",
          icon: "question",
          showCancelButton: true,
          confirmButtonText: "確定",
          cancelButtonText: "取消",
        }).then((result) => {
          if (result.isConfirmed) {
            UpdateStatus = sessionStorage.getItem("UpdateStatus");
            if (UpdateStatus === null) {
              sessionStorage.setItem("UpdateStatus", "continue");
            }
            freeUI("Cmb");
            startProcess();
          } else {
            resetUI();
          }
        });
      }

      function callCmbUpdate(lotto) {
        UpdateStatus = sessionStorage.getItem("UpdateStatus");
        // console.log(UpdateStatus);
        if (UpdateStatus == "stop") {
          Swal.fire({
            icon: "warning",
            title: "處理停止",
            text: "處理停止",
            confirmButtonText: "確定",
            showCloseButton: true,
          }).then(() => {
            sessionStorage.removeItem("UpdateStatus");
            resetUI();
            // 必須等待後端 clearProgress 完成後才重新載入頁面
            // 否則會因為頁面已跳轉而導致 message channel closed 錯誤
            google.script.run
              .withSuccessHandler(function () {
                //重新戴入頁面
                setTimeout(function () {
                  openPageUrl("UpdateAll");
                }, 100);
              })
              .withFailureHandler(showError) // 也可以加上錯誤處理
              .clearProgress("Update_JOB");
          });
          return;
        } else {
          google.script.run
            .withSuccessHandler(function (res) {
              if (res.status === "continue") {
                // 計算並更新百分比
                let percent = Math.round((res.currentIndex / res.total) * 100);
                updateProgressBar(percent, 100, res.message);
                // 停上一下再繼續下一回合
                setTimeout(() => {
                  callCmbUpdate(lotto);
                }, 2000);
              } else if (res.status === "complete") {
                // 完成
                updateProgressBar(100, 100, res.message);
                Swal.fire({
                  icon: "success",
                  title: "處理完成",
                  text: res.message,
                  confirmButtonText: res.btntext,
                  showCloseButton: true,
                }).then(() => {
                  sessionStorage.removeItem("UpdateStatus");
                  resetUI();
                });
              } else if (res.status === "error") {
                // 處理錯誤情況
                Swal.fire({
                  icon: "error",
                  title: "處理失敗",
                  text: res.message,
                  confirmButtonText: res.btntext,
                  showCloseButton: true,
                }).then(() => {
                  sessionStorage.removeItem("UpdateStatus");
                  resetUI();
                });
              }
            })
            .withFailureHandler(function (err) {
              Swal.fire({
                icon: "error",
                title: "系統錯誤",
                text: err.message,
                confirmButtonText: "確定",
                showCloseButton: true,
              }).then(() => {
                resetUI();
              });
            })
            .combineData(lotto);
        }
      }

      function stopCmbUpdate() {
        $("#btnCmbStop")
          .prop("disabled", true)
          .html('<i class="fas fa-spinner fa-spin me-2"></i> 停止中...');
        sessionStorage.setItem("UpdateStatus", "stop");
      }

      function handleMissUpdate(e) {
        if (e) e.preventDefault();
        var lotto = $("#secLotto").val();

        const startProcess = () => {
          $("#progressArea").show();
          updateProgressBar(0, 100, "啟動中...");
          callMissUpdate(lotto);
        };
        Swal.fire({
          title: "確認更新?",
          icon: "question",
          showCancelButton: true,
          confirmButtonText: "確定",
          cancelButtonText: "取消",
        }).then((result) => {
          if (result.isConfirmed) {
            UpdateStatus = sessionStorage.getItem("UpdateStatus");
            if (UpdateStatus === null) {
              sessionStorage.setItem("UpdateStatus", "continue");
            }
            freeUI("Cmb");
            startProcess();
          } else {
            resetUI();
          }
        });
      }

      function callMissUpdate(lotto) {
        UpdateStatus = sessionStorage.getItem("UpdateStatus");
        // console.log(UpdateStatus);
        if (UpdateStatus == "stop") {
          Swal.fire({
            icon: "warning",
            title: "處理停止",
            text: "處理停止",
            confirmButtonText: "確定",
            showCloseButton: true,
          }).then(() => {
            sessionStorage.removeItem("UpdateStatus");
            resetUI();
            // 必須等待後端 clearProgress 完成後才重新載入頁面
            // 否則會因為頁面已跳轉而導致 message channel closed 錯誤
            google.script.run
              .withSuccessHandler(function () {
                //重新戴入頁面
                setTimeout(function () {
                  openPageUrl("UpdateAll");
                }, 100);
              })
              .withFailureHandler(showError) // 也可以加上錯誤處理
              .clearProgress("Update_JOB");
          });
          return;
        } else {
          google.script.run
            .withSuccessHandler(function (res) {
              if (res.status === "continue") {
                // 計算並更新百分比
                let percent = Math.round((res.currentIndex / res.total) * 100);
                updateProgressBar(percent, 100, res.message);
                // 停上一下再繼續下一回合
                setTimeout(() => {
                  callCmbUpdate(lotto);
                }, 2000);
              } else if (res.status === "complete") {
                // 完成
                updateProgressBar(100, 100, res.message);
                Swal.fire({
                  icon: "success",
                  title: "處理完成",
                  text: res.message,
                  confirmButtonText: res.btntext,
                  showCloseButton: true,
                }).then(() => {
                  sessionStorage.removeItem("UpdateStatus");
                  resetUI();
                });
              } else if (res.status === "error") {
                // 處理錯誤情況
                Swal.fire({
                  icon: "error",
                  title: "處理失敗",
                  text: res.message,
                  confirmButtonText: res.btntext,
                  showCloseButton: true,
                }).then(() => {
                  sessionStorage.removeItem("UpdateStatus");
                  resetUI();
                });
              }
            })
            .withFailureHandler(function (err) {
              Swal.fire({
                icon: "error",
                title: "系統錯誤",
                text: err.message,
                confirmButtonText: "確定",
                showCloseButton: true,
              }).then(() => {
                resetUI();
              });
            })
            .genMissData(lotto);
        }
      }

      function stopMissUpdate() {
        $("#btnMissStop")
          .prop("disabled", true)
          .html('<i class="fas fa-spinner fa-spin me-2"></i> 停止中...');
        sessionStorage.setItem("UpdateStatus", "stop");
      }

      function updateProgressBar(percent, total, message) {
        $("#progressBar").width(percent + "%");
        $("#progressPercent").text(percent + "%");
        $("#progressLabel").text(message);
      }

      function freeUI(btn) {
        $("#btnCmbUpdate").prop("disabled", true);
        $("#btnCmbStop").prop("disabled", !(btn === "Cmb"));
        $("#btnMissUpdate").prop("disabled", true);
        $("#btnMissStop").prop("disabled", !(btn === "Miss"));
        $("#secLotto").prop("disabled", true);
      }

      function resetUI() {
        $("#btnCmbUpdate").prop("disabled", false);
        $("#btnCmbStop")
          .prop("disabled", true)
          .html('<i class="fas fa-stop me-2"></i> 合併表格停止');
        $("#btnMissUpdate").prop("disabled", false);
        $("#btnMissStop")
          .prop("disabled", true)
          .html('<i class="fas fa-stop me-2"></i> 遺漏表停止');
        $("#secLotto").prop("disabled", false);
        $("#progressArea").fadeOut();
        $("#progressBar").width("0%");
        $("#progressPercent").text("0%");
        sessionStorage.removeItem("UpdateStatus");
      }

      function showError(err) {
        resetUI();
        Swal.fire("系統錯誤", err.message, "error");
      }
    </script>
  </body>
  <?!= includeFooter(); ?>
</html>
