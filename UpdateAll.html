<!doctype html>
<html>
  <head>
    <base target="_top" />
    <title>Galaxy Lotto Observer - Update All</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      /* 自定義樣式以優化手機體驗 */
      body {
        background-color: #f8f9fa;
        font-family: "Microsoft JhengHei", Arial, sans-serif;
      }

      .main-container {
        max-width: 600px;
        /* 手機優先，限制最大寬度 */
        margin: 20px auto;
        padding: 15px;
      }

      .menu-btn {
        height: 80px;
        font-size: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s;
      }

      .menu-btn:active {
        transform: scale(0.98);
      }

      .navbar-custom {
        background-color: #0d6efd;
        /* Bootstrap Primary Color */
        color: white;
      }

      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.7);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }

      .label-text {
        color: #6c757d;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 5px;
      }
    </style>
  </head>

  <body>
    <div id="loadingSpin" class="loading-overlay">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <?!= includeNav(); ?>

    <div class="container main-container">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="text-center">更新所有彩種</h5>
          <div class="row g-3 align-items-end">
            <div class="col-12">
              <label for="secLotto" class="form-label label-text"
                >選擇彩種</label
              >
              <select id="secLotto" class="form-select label-text">
                <option value="L539">539</option>
                <option value="L649">大樂透</option>
                <option value="L638">威力彩</option>
                <option value="LSix">六合彩</option>
              </select>
            </div>

            <hr />

            <div id="progressArea" class="mt-4" style="display: none">
              <div class="d-flex justify-content-between mb-1">
                <span id="progressLabel" class="text-muted small"
                  >準備處理...</span
                >
                <span id="progressPercent" class="text-primary fw-bold small"
                  >0%</span
                >
              </div>
              <div class="progress" style="height: 20px">
                <div
                  id="progressBar"
                  class="progress-bar progress-bar-striped progress-bar-animated"
                  role="progressbar"
                  style="width: 0%"
                ></div>
              </div>
              <p
                id="currentTask"
                class="text-center mt-2 text-secondary small"
              ></p>
            </div>
            <div class="col-12">
              <div class="d-grid">
                <button
                  class="btn btn-primary label-text text-white"
                  type="button"
                  id="btnUpdate"
                >
                  <i class="fas fa-sync-alt me-2"></i> 更新
                </button>
                <button
                  class="btn btn-danger label-text text-white"
                  type="button"
                  id="btnStop"
                  style="display: none"
                >
                  <i class="fas fa-stop me-2"></i> 停止
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      var UpdateStatus = null;
      $(document).ready(function () {
        $("#loadingSpin").css("display", "flex");
        $("#btnUpdate").click(handleUpdate);
        $("#btnStop").click(stopUpdate);
        $("#loadingSpin").hide();
        google.script.run.clearProgress("Update_JOB");
      });

      function handleUpdate(e) {
        $("#btnUpdate").prop("disabled", true);
        $("#secLotto").prop("disabled", true);
        $("#se")
        if (e) e.preventDefault();
        var lotto = $("#secLotto").val();
        // console.log(lotto);

        const startProcess = () => {
          // 初始化 UI
          $("#progressArea").show();
          $("#btnStop").show();
          updateProgressBar(0, 100, "啟動中...");
          callUpdate(lotto);
        };
        Swal.fire({
          title: "確認更新?",
          icon: "question",
          showCancelButton: true,
          confirmButtonText: "確定",
          cancelButtonText: "取消",
        }).then((result) => {
          if (result.isConfirmed) {
            UpdateStatus = sessionStorage.getItem("UpdateStatus");
            // console.log(UpdateStatus);
            if (UpdateStatus === null) {
              sessionStorage.setItem("UpdateStatus", "continue");
            }
            startProcess();
          } else {
            $("#btnUpdate").prop("disabled", false);
          }
        });
      }

      // 建立一個可以遞迴呼叫的函式
      function callUpdate(lotto) {
        UpdateStatus = sessionStorage.getItem("UpdateStatus");
        // console.log(UpdateStatus);
        if (UpdateStatus == "stop") {
          Swal.fire({
            icon: "warning",
            title: "處理停止",
            text: "處理停止",
            confirmButtonText: "確定",
            showCloseButton: true,
          }).then(() => {
            sessionStorage.setItem("UpdateStatus", null);
            resetUI();
            google.script.run.clearProgress("Update_JOB");
            //重新戴入頁面
            openPageUrl("UpdateAll");
          });
          return;
        } else {
          google.script.run
            .withSuccessHandler(function (res) {
              if (res.status === "continue") {
                // 計算並更新百分比
                let percent = Math.round((res.currentIndex / res.total) * 100);
                updateProgressBar(percent, 100, res.message);
                // 繼續下一回合
                callUpdate(lotto);
              } else if (res.status === "complete") {
                // 完成
                updateProgressBar(100, 100, res.message);
                Swal.fire({
                  icon: "success",
                  title: "處理完成",
                  text: res.message,
                  confirmButtonText: res.btntext,
                  showCloseButton: true,
                }).then(() => {
                  sessionStorage.setItem("UpdateStatus", null);
                  resetUI();
                });
              } else if (res.status === "error") {
                // 處理錯誤情況
                Swal.fire({
                  icon: "error",
                  title: "處理失敗",
                  text: res.message,
                  confirmButtonText: res.btntext,
                  showCloseButton: true,
                }).then(() => {
                  sessionStorage.setItem("UpdateStatus", null);
                  resetUI();
                });
              }
            })
            .withFailureHandler(function (err) {
              Swal.fire({
                icon: "error",
                title: "系統錯誤",
                text: err.message,
                confirmButtonText: "確定",
                showCloseButton: true,
                setTimeout: 2000,
              }).then(() => {
                resetUI();
              });
            })
            .combineData(lotto);
        }
      }

      function stopUpdate() {
        $("#btnStop")
          .prop("disabled", true)
          .html('<i class="fas fa-spinner fa-spin me-2"></i> 停止中...');
        sessionStorage.setItem("UpdateStatus", "stop");
      }

      function updateProgressBar(percent, total, message) {
        $("#progressBar").width(percent + "%");
        $("#progressPercent").text(percent + "%");
        $("#progressLabel").text(message);
      }

      function resetUI() {
        $("#btnStop")
          .prop("disabled", false)
          .html('<i class="fas fa-stop me-2"></i> 停止');
        $("#btnUpdate").prop("disabled", false);
        $("#secLotto").prop("disabled", false);
        $("#btnStop").hide();
        $("#progressArea").fadeOut();
        $("#progressBar").width("0%");
        $("#progressPercent").text("0%");
        sessionStorage.setItem("UpdateStatus", null);
      }
    </script>
  </body>
  <?!= includeFooter(); ?>
</html>
