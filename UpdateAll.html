    <script>
      /* global google, AppUI, openPageUrl */
      (function ($) {
        // 將狀態變數提升至 IIFE 作用域，確保所有 window 函式都能存取
        let isUpdatingAll = false;
        let updateQueue = [];
        let failedTasks = [];
        let totalBatchTasks = 0;
        let completedBatchTasks = 0;
        let batchTaskDurations = [];
        let currentTaskStartTime = null;
        const allLotteries = ["L539", "L649", "L638", "LSix"];
        const lottoNames = {
          L539: "539",
          L649: "大樂透",
          L638: "威力彩",
          LSix: "六合彩",
        };

        $(document).ready(function () {
          // 使用 window. 前綴確保引用到下方定義在 window 上的函式
          $("#btnUpdate").click(function(e) { window.handleUpdate(e); });
          $("#btnStop").click(function(e) { window.stopUpdate(e); });
          $("#btnCheckHealth").click(function(e) { window.handleCheckDatabaseHealth(e); });
          $("#btnClearProgress").click(function(e) { window.handleClearProgress(e); });
          $("#btnUpdateAll").click(function(e) { window.handleUpdateAllLotteries(e); });
          sessionStorage.removeItem("UpdateStatus");

          // 不再於頁面載入時清除進度，保留斷點續傳的可能性
        });

        // 處理單一彩種更新
        window.handleUpdate = function (e) {
          if (e) e.preventDefault();
          const lotto = $("#secLotto").val();
          const type = $("#secUpdateType").val();
          const typeName = type === "Cmb" ? "合併表格" : "遺漏表";
          const lottoName = lottoNames[lotto] || lotto;

          const startProcess = () => {
            // 啟動前先清空該任務的舊進度，確保是全新開始
            var jobKey = type === "Cmb" ? "Combine_JOB_" + lotto : "Miss_JOB_" + lotto;
            google.script.run.clearProgress(jobKey);
            if (type !== "Cmb") google.script.run.clearProgress("GENMISS_JOB_" + lotto + "_1");
            $("#queueStatus").addClass("d-none"); // 單一任務隱藏佇列狀態

            $("#progressArea").show();
            updateProgressBar(
              0,
              100,
              "啟動中...",
              `當前任務：${lottoName} - ${typeName}`,
            );
            callUpdateProcess(type, lotto, false); // 明確指定為非批次更新
          };
          AppUI.confirm(
            `確認更新${typeName}?`,
            "這將會從來源抓取新資料。",
          ).then((result) => {
            if (result.isConfirmed) {
              sessionStorage.setItem("UpdateStatus", "continue");
              window.freeUI();
              startProcess();
            }
          });
        };

        window.handleUpdateAllLotteries = function (e) {
          if (e) e.preventDefault();

          AppUI.confirm(
            "確認一鍵更新所有彩種?",
            "這將會依序更新所有彩種的合併表格與遺漏表，過程可能較長。",
          ).then((result) => {
            if (result.isConfirmed) {
              isUpdatingAll = true;
              updateQueue = [];
              failedTasks = [];
              batchTaskDurations = [];
              completedBatchTasks = 0;

              // 批次啟動前先清除所有相關進度快取
              allLotteries.forEach(function(l) {
                google.script.run.clearProgress("Combine_JOB_" + l);
                google.script.run.clearProgress("Miss_JOB_" + l);
                google.script.run.clearProgress("GENMISS_JOB_" + l + "_1");
              });

              allLotteries.forEach((lotto) => {
                updateQueue.push({ lotto: lotto, type: "Cmb", retry: 0 });
                updateQueue.push({ lotto: lotto, type: "Miss", retry: 0 });
              });
              totalBatchTasks = updateQueue.length;

              sessionStorage.setItem("UpdateStatus", "continue");
              window.freeUI();
              $("#progressArea").show(); // 顯示進度條區域
              startNextQueuedUpdate();
            }
          });
        };

        function startNextQueuedUpdate() {
          if (updateQueue.length === 0) {
            $("#queueStatus").addClass("d-none");
            if (failedTasks.length > 0) {
              const errorListItems = failedTasks
                .map(
                  (t) =>
                    `<li><b>${lottoNames[t.lotto] || t.lotto}</b> (${t.type === "Cmb" ? "合併" : "遺漏"}): ${t.msg}</li>`,
                )
                .join("");

              // 使用 Swal.fire 自定義視窗，提供重試按鈕
              Swal.fire({
                title: "批次更新結束 (部分失敗)",
                html: `完成更新，但以下項目發生錯誤：<br>
                       <div class="text-start small mt-2 bg-light p-2 rounded border" style="max-height: 200px; overflow-y: auto;">
                         <ul class="mb-0 ps-3">${errorListItems}</ul>
                       </div><p class="mt-2 mb-0 small text-muted">是否要針對上述失敗項目重新執行？</p>`,
                icon: "warning",
                showCancelButton: true,
                confirmButtonText:
                  '<i class="fas fa-redo me-1"></i> 重試失敗項目',
                cancelButtonText: "關閉並結束",
                allowOutsideClick: false,
              }).then((result) => {
                if (result.isConfirmed) {
                  handleRetryFailures();
                } else {
                  isUpdatingAll = false;
                  window.resetUI();
                }
              });
            } else {
              AppUI.success("所有彩種更新完成！", "資料庫已同步至最新狀態。").then(() => {
                isUpdatingAll = false;
                window.resetUI();
              });
            }
            return;
          }

          const nextTask = updateQueue.shift();
          const typeName = nextTask.type === "Cmb" ? "合併表格" : "遺漏表";
          const lottoName = lottoNames[nextTask.lotto] || nextTask.lotto;

          // 計算預估剩餘時間 (基於已完成任務的平均時間)
          let timeEstimate = "";
          if (batchTaskDurations.length > 0) {
            const avg =
              batchTaskDurations.reduce((a, b) => a + b, 0) /
              batchTaskDurations.length;
            const remainingTasksCount = updateQueue.length + 1; // 包含當前正在執行的這一個
            timeEstimate = ` | 預計剩餘: ${formatDuration(avg * remainingTasksCount)}`;
          }

          // 更新佇列剩餘顯示
          $("#queueStatus")
            .removeClass("d-none")
            .html(
              `<i class="fas fa-list-ol me-1"></i>佇列剩餘: ${updateQueue.length} 任務${timeEstimate}`,
            );

          currentTaskStartTime = Date.now();

          // 關鍵修正：若為重試任務，沿用首次啟動時間以包含所有嘗試耗時與等待延時
          if (nextTask.firstStartTime) currentTaskStartTime = nextTask.firstStartTime;
          else nextTask.firstStartTime = currentTaskStartTime;

          const retryLabel = nextTask.retry > 0 ? ` (第 ${nextTask.retry} 次重試)` : "";
          const basePercent = isUpdatingAll ? Math.round((completedBatchTasks / totalBatchTasks) * 100) : 0;

          updateProgressBar(
            basePercent,
            100,
            "初始化...",
            `一鍵更新：${lottoName} (${typeName})${retryLabel}`,
          );
          callUpdateProcess(nextTask.type, nextTask.lotto, true, nextTask.retry); // 傳遞目前的重試計數
        }

        /**
         * 處理重試失敗項目的邏輯
         */
        window.handleRetryFailures = function () {
          // 將失敗項目重新轉換回任務格式
          updateQueue = failedTasks.map((t) => ({
            lotto: t.lotto,
            type: t.type,
            retry: 0,
          }));
          totalBatchTasks = updateQueue.length;
          completedBatchTasks = 0;
          failedTasks = []; // 重置失敗清單
          isUpdatingAll = true;
          window.freeUI(); // 使用 freeUI 保持進度條顯示，不應 reset
          startNextQueuedUpdate();
        };

        // 更新處理進程的通用函式，增加 isBatchUpdate 參數
        window.callUpdateProcess = function (type, lotto, isBatchUpdate, retry = 0) {
          const UpdateStatus = sessionStorage.getItem("UpdateStatus");
          var jobKey = type === "Cmb" ? "Combine_JOB_" + lotto : "Miss_JOB_" + lotto;
          var missGenKey = type !== "Cmb" ? "GENMISS_JOB_" + lotto + "_1" : null;

          if (UpdateStatus === "stop") {
            AppUI.error("處理停止", "任務已由使用者手動終止").then(() => {
              sessionStorage.removeItem("UpdateStatus");
              isUpdatingAll = false; // 確保批次更新狀態被重置
              resetUI();
              google.script.run
                .withSuccessHandler(() =>
                  setTimeout(() => openPageUrl("UpdateAll"), 100),
                )
                .withFailureHandler(window.showError)
                .clearProgress(jobKey);
              if (missGenKey) google.script.run.clearProgress(missGenKey);
            });
            return;
          }

          const runner = google.script.run
            .withSuccessHandler(function (res) {
              if (!res) {
                console.error("Server returned null response");
                return;
              }
              if (res.status === "continue") {
                let taskPercent = (res.currentIndex / res.total);
                let displayPercent;
                if (isBatchUpdate) {
                  displayPercent = Math.round(((completedBatchTasks + taskPercent) / totalBatchTasks) * 100);
                } else {
                  displayPercent = Math.round(taskPercent * 100);
                }
                updateProgressBar(displayPercent, 100, res.message || "正在處理...");
                setTimeout(
                  () => callUpdateProcess(type, lotto, isBatchUpdate, retry),
                  2000,
                ); // 繼續傳遞 isBatchUpdate 狀態
              } else if (res.status === "complete") {
                if (isBatchUpdate) {
                  completedBatchTasks++;
                  let overallPercent = Math.round((completedBatchTasks / totalBatchTasks) * 100);
                  updateProgressBar(overallPercent, 100, res.message || "單項完成");

                  // 紀錄該任務耗時
                  if (currentTaskStartTime) {
                    batchTaskDurations.push(Date.now() - currentTaskStartTime);
                  }
                  // 如果是批次更新的一部分，則不顯示成功訊息，直接進行下一個任務
                  startNextQueuedUpdate();
                } else {
                  updateProgressBar(100, 100, res.message || "處理完成");
                  // 否則，顯示成功訊息並重置 UI
                  AppUI.success("處理完成", res.message).then(() => {
                    sessionStorage.removeItem("UpdateStatus");
                    window.resetUI();
                  });
                }
              } else if (res.status === "error") {
                if (isBatchUpdate && retry < 2) {
                  // 增加重試機制：將任務塞回佇列開頭並延時重試
                  updateQueue.unshift({
                    lotto: lotto,
                    type: type,
                    retry: retry + 1,
                    firstStartTime: currentTaskStartTime,
                  });
                  updateProgressBar(0, 100, `任務異常，3秒後進行第 ${retry + 1} 次自動重試...`);
                  setTimeout(startNextQueuedUpdate, 3000);
                } else if (isBatchUpdate) {
                  // 失敗也列入時間計算，以維護預估穩定性
                  if (currentTaskStartTime) {
                    batchTaskDurations.push(Date.now() - currentTaskStartTime);
                  }
                  completedBatchTasks++;
                  failedTasks.push({ lotto: lotto, type: type, msg: res.message || "未知錯誤" });
                  AppUI.toast(
                    `${lottoNames[lotto] || lotto} 更新失敗，已跳過`,
                    "error", // 將警告圖示改為錯誤圖示，更明確表示失敗
                    2000,
                  );
                  startNextQueuedUpdate(); // 跳過並繼續下一個
                } else {
                  AppUI.error("處理失敗", res.message || "未知錯誤").then(() => {
                    isUpdatingAll = false;
                    window.resetUI();
                  });
                }
              } else {
                // 兼容模式：genMissData 傳回陣列而非 {status} 物件，視為完成
                if (isBatchUpdate) {
                  completedBatchTasks++;
                  let overallPercent = Math.round((completedBatchTasks / totalBatchTasks) * 100);
                  updateProgressBar(overallPercent, 100, "處理完成");
                  if (currentTaskStartTime) {
                    batchTaskDurations.push(Date.now() - currentTaskStartTime);
                  }
                  startNextQueuedUpdate();
                } else {
                  updateProgressBar(100, 100, "處理完成");
                  AppUI.success("處理完成", "").then(() => {
                    sessionStorage.removeItem("UpdateStatus");
                    window.resetUI();
                  });
                }
              }
            })
            .withFailureHandler(function (err) {
              if (isBatchUpdate && retry < 2) {
                // 針對網路超時等連線錯誤進行重試
                updateQueue.unshift({
                  lotto: lotto,
                  type: type,
                  retry: retry + 1,
                  firstStartTime: currentTaskStartTime,
                });
                updateProgressBar(0, 100, `連線中斷，將於 3 秒後自動重試...`);
                setTimeout(startNextQueuedUpdate, 3000);
              } else if (isBatchUpdate) {
                // 超時或連線中斷也列入計算
                if (currentTaskStartTime) {
                  batchTaskDurations.push(Date.now() - currentTaskStartTime);
                }
                completedBatchTasks++;
                // 若發生超時 (Timeout)，不清除後端進度，僅紀錄並跳過
                const errorMsg = err.message || "系統超時或連線中斷";
                failedTasks.push({ lotto: lotto, type: type, msg: errorMsg });
                console.error(
                  `[Batch Critical] ${lotto} ${type} 失敗:`,
                  errorMsg,
                );
                startNextQueuedUpdate(); // 超時也跳過繼續下一個
              } else {
                AppUI.showCommonError(err);
              }
            });

          if (type === "Cmb") runner.combineData(lotto);
          else runner.genMissData(lotto, new Date(), 1, "ASC", -1);
        };

        window.stopUpdate = function () {
          $("#btnStop")
            .prop("disabled", true)
            .html('<i class="fas fa-spinner fa-spin me-2"></i> 停止中...');
          sessionStorage.setItem("UpdateStatus", "stop");
          // 如果正在進行批次更新，則清空任務佇列並隱藏狀態
          if (isUpdatingAll) {
            updateQueue = [];
            isUpdatingAll = false;
            $("#queueStatus").addClass("d-none");
          }
        };

        // 更新進度條，新增 taskInfo 參數用於更新下方提示文字
        window.updateProgressBar = function (
          percent,
          total,
          message,
          taskInfo,
        ) {
          $("#progressBar").width(percent + "%");
          $("#progressPercent").text(percent + "%");
          $("#progressLabel").text(message);
          if (taskInfo) {
            $("#currentTask").text(taskInfo);
          }
        };

        /**
         * 處理清理快取進度按鈕的點擊事件
         */
        window.handleClearProgress = function () {
          AppUI.confirm(
            "確認清理所有快取進度?",
            "這將會重置所有更新任務的斷點續傳狀態，並清理各彩種過期快取數據。",
          ).then((result) => {
            if (result.isConfirmed) {
              AppUI.loading("處理中", "正在執行全局快取清理任務...");
              google.script.run
                .withSuccessHandler(function (res) {
                  // 將後端回傳的換行符號轉為 <br> 以利 SweetAlert2 正確渲染摘要內容
                  AppUI.success(
                    "清理完成",
                    res.message.replace(/\n/g, "<br>"),
                  ).then(() => {
                    window.resetUI();
                  });
                })
                .withFailureHandler(AppUI.showCommonError.bind(AppUI))
                .cleanupAllLotteryCaches();
            }
          });
        };

        /**
         * 處理資料庫體檢按鈕的點擊事件
         */
        window.handleCheckDatabaseHealth = function () {
          AppUI.loading("檢查中", "正在生成資料庫體檢報告...");
          google.script.run
            .withSuccessHandler(function (res) {
              if (res.status === "success") {
                AppUI.success(
                  "體檢完成",
                  res.message.replace(/\n/g, "<br>"),
                ).then(() => {
                  window.resetUI();
                });
              } else if (res.status === "warning" && res.details) {
                // 解析報告中的基準日期
                const adDateMatch = res.message.match(/AllData\): ([\d-]+)/);
                const adDate = adDateMatch ? adDateMatch[1] : "未知";

                let html = `
                  <div class="text-start small">
                    <div class="mb-3 p-2 bg-light border rounded shadow-sm">主資料來源 (AllData): <b class="text-primary">${adDate}</b></div>
                    <div class="list-group border-0">
                `;

                res.details.forEach((item) => {
                  const name = lottoNames[item.id] || item.id;
                  const fixBtn = item.canFix
                    ? `<button class="btn btn-sm btn-primary py-0 px-2 float-end" onclick="window.triggerQuickFix('${item.id}', 'Cmb')"><i class="fas fa-wrench me-1"></i>修復</button>`
                    : "";
                  html += `
                    <div class="list-group-item py-2 px-1 border-0 border-bottom d-flex justify-content-between align-items-center">
                      <span><b class="text-dark">${name}</b>: ${item.status} <span class="text-muted">(${item.date})</span></span>
                      ${fixBtn}
                    </div>`;
                });

                // 檢查是否有任何異常項目需要修復
                const hasAbnormal = res.details.some((item) => item.canFix);
                if (hasAbnormal) {
                  window._lastHealthDetails = res.details; // 暫存明細供一鍵修復使用
                  html += `
                    <div class="mt-3 d-grid">
                      <button class="btn btn-warning btn-sm fw-bold shadow-sm" onclick="window.triggerFixAll()">
                        <i class="fas fa-tools me-1"></i> 修復所有異常項目
                      </button>
                    </div>`;
                }

                html += `</div></div>`;

                Swal.fire({
                  title:
                    '<i class="fas fa-notes-medical text-warning me-2"></i>資料庫體檢報告',
                  html: html,
                  width: "500px",
                  confirmButtonText: "關閉並返回",
                }).then(() => window.resetUI());
              } else {
                AppUI.error(
                  "體檢失敗",
                  res.message.replace(/\n/g, "<br>"),
                ).then(() => {
                  window.resetUI();
                });
              }
            })
            .withFailureHandler(AppUI.showCommonError.bind(AppUI))
            .checkDatabaseHealth();
        };

        /**
         * 一鍵修復：針對體檢報告中的所有異常項目啟動佇列更新
         */
        window.triggerFixAll = function () {
          if (!window._lastHealthDetails) return;

          const itemsToFix = window._lastHealthDetails.filter((d) => d.canFix);
          if (itemsToFix.length === 0) return;

          AppUI.confirm(
            "啟動批次修復?",
            `系統將自動更新 ${itemsToFix.length} 個異常彩種的合併表格與遺漏表。`,
          ).then((result) => {
            if (result.isConfirmed) {
              Swal.close(); // 關閉報告視窗
              isUpdatingAll = true;
              updateQueue = [];
              failedTasks = [];
              batchTaskDurations = [];

              // 批次啟動前先清除相關進度快取
              google.script.run.clearProgress("Update_JOB");
              google.script.run.clearProgress("Miss_JOB");

              // 依序將需要修復的彩種放入任務佇列
              itemsToFix.forEach((item) => {
                updateQueue.push({ lotto: item.id, type: "Cmb" });
                updateQueue.push({ lotto: item.id, type: "Miss" });
              });

              sessionStorage.setItem("UpdateStatus", "continue");
              window.freeUI();
              startNextQueuedUpdate();
            }
          });
        };

        /**
         * 快速修復：從體檢報告直接觸發更新
         */
        window.triggerQuickFix = function (lotto, type) {
          Swal.close();
          $("#secLotto").val(lotto);
          $("#secUpdateType").val(type);
          window.handleUpdate(); // 觸發標準更新流程（含確認視窗）
        };

        window.freeUI = function () {
          $(
            "#btnUpdate, #secLotto, #secUpdateType, #btnUpdateAll, #btnClearProgress, #btnCheckHealth",
          ).prop("disabled", true);
          $("#btnStop").prop("disabled", false);
        };

        window.resetUI = function () {
          $(
            "#btnUpdate, #secLotto, #secUpdateType, #btnUpdateAll, #btnClearProgress, #btnCheckHealth",
          ).prop("disabled", false);
          $("#btnStop")
            .prop("disabled", true)
            .html('<i class="fas fa-stop me-2"></i> 停止執行');
          $("#progressArea").fadeOut();
          $("#progressBar").width("0%");
          $("#progressPercent").text("0%");
          $("#queueStatus").addClass("d-none").text("");
          $("#currentTask").text(""); // 重置時清空任務文字
          failedTasks = [];
          batchTaskDurations = [];
          sessionStorage.removeItem("UpdateStatus");
        };

        window.showError = function (err) {
          window.resetUI();
          AppUI.showCommonError(err);
        };

        /**
         * 格式化毫秒為易讀時間字串
         */
        function formatDuration(ms) {
          if (ms <= 0) return "0秒";
          const totalSeconds = Math.floor(ms / 1000);
          const hours = Math.floor(totalSeconds / 3600);
          const minutes = Math.floor((totalSeconds % 3600) / 60);
          const seconds = totalSeconds % 60;
          let result = "";
          if (hours > 0) result += hours + "時";
          if (minutes > 0) result += minutes + "分";
          if (seconds > 0 || result === "") result += seconds + "秒";
          return result;
        }
      })(jQuery);
    </script>
    <?!= includeFooter(); ?>
  </body>
