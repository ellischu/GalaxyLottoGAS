<style>
  .footer-section {
    margin-top: 50px;
    padding: 20px 0;
    text-align: center;
    border-top: 1px solid #dee2e6;
    color: #6c757d;
  }

  .footer-section a {
    color: #dc3545;
    text-decoration: none;
    font-weight: bold;
  }

  .footer-section a:hover {
    text-decoration: underline;
  }
</style>

<footer class="footer-section">
  <div class="container">
    <p>
      <i class="fas fa-comment-dots"></i>
      對系統有任何建議嗎？
      <a id="pageSuggest" onclick="" class="btn btn-danger text-white"
        >提交意見</a
      >
    </p>
    <small>&copy; 2026 管理系統</small>
  </div>
</footer>

<script>
  /**
   * 呼叫後端同步權限功能
   */
  function syncPermissions() {
    // 檢查 Swal 是否存在，避免再次報錯
    if (typeof Swal === "undefined") {
      alert("系統錯誤：尚未載入 SweetAlert2 函式庫");
      return;
    }

    // 1. 關閉 Offcanvas 導覽列
    var offcanvasElement = document.querySelector(".offcanvas");
    if (offcanvasElement) {
      var offcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (offcanvas) offcanvas.hide();
    }

    // 2. 顯示 Loading
    AppUI.loading("同步權限中", "正在更新所有試算表權限...", {
      color: '#084298',
      background: '#e7f1ff'
    });

    // 3. 呼叫 GAS 後端
    google.script.run
      .withSuccessHandler(function () {
        AppUI.success("同步完成", "權限已成功更新");
      })
      .withFailureHandler(function (err) {
        AppUI.error("同步失敗", err.message);
      })
      .syncMasterTablePermissions();
  }

  function runManualMaintenance() {
    // 1. 關閉導航列
    var offcanvasElement = document.querySelector(".offcanvas");
    var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
    if (bsOffcanvas) bsOffcanvas.hide();

    // 2. 顯示讀取中 (使用通用 Loading)
    AppUI.loading("資料處理中", "正在遷移過期紀錄並同步 User 名單...");

    // 3. 呼叫後端函式
    google.script.run
      .withSuccessHandler(function () {
        AppUI.success("完成", "資料維護與 User 同步已執行完畢。");
      })
      .withFailureHandler(function (err) {
        AppUI.showCommonError(err);
      })
      .dailyMaintenanceJob(); // 執行剛才寫的後端主函式
  }

  function ChangePage(pageName) {
    // 1. 關閉導航列
    var offcanvasElement = document.querySelector(".offcanvas");
    var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
    if (bsOffcanvas) bsOffcanvas.hide();

    // 2. 顯示 Toast 提示轉換中
    AppUI.toast("頁面轉換中...", "info", 1500);
  }
</script>
