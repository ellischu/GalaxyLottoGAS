<script>
  /**
   * 檢查外部函式庫載入狀態
   * 驗證 jQuery, Bootstrap, SweetAlert2 是否已定義
   */
  (function () {
    var libs = {
      jQuery: typeof jQuery !== "undefined",
      Bootstrap: typeof bootstrap !== "undefined",
      SweetAlert2: typeof Swal !== "undefined",
    };

    var missing = Object.keys(libs).filter(function (name) {
      return !libs[name];
    });

    if (missing.length > 0) {
      var errorMsg = "關鍵函式庫載入失敗: " + missing.join(", ");
      console.error(errorMsg);
      // 若檢測到缺失，等待 1.5 秒後再次檢查（給予 Fallback 腳本一點時間）
      setTimeout(function () {
        var stillMissing = missing.some(function (name) {
          if (name === "jQuery") return typeof window.jQuery === "undefined";
          if (name === "Bootstrap")
            return typeof window.bootstrap === "undefined";
          if (name === "SweetAlert2") return typeof window.Swal === "undefined";
          return false;
        });

        if (stillMissing) {
          console.error("備援載入亦失敗。");
        }
      }, 1500);
    } else {
      console.info("所有外部資源 (jQuery, Bootstrap, Swal2) 載入成功。");
    }
  })();

  /**
   * 動態注入腳本內容到 DOM
   * @param {string} scriptContent 要注入的 JavaScript 程式碼
   */
  function injectScriptContent(scriptContent) {
    try {
      var script = document.createElement("script");
      // 使用 .text 屬性處理大型腳本字串在部分環境下的相容性
      script.text = scriptContent;
      document.head.appendChild(script);
      console.log("Fallback script injected via DOM.");
    } catch (e) {
      console.warn("DOM 注入失敗:", e);
      eval(scriptContent);
    }
  }

  /**
   * 共用頁面跳轉函式
   */
  var SCRIPT_URL = "<?!= getScriptUrl() ?>";

  function openPageUrl(pageName, target, forceReload) {
    target = target || "_top";
    pageName = pageName || "Index";

    if (target === "_self" || target === "_top") {
      // 1. 自動關閉 Bootstrap 的 Offcanvas 導覽列
      if (typeof bootstrap !== "undefined") {
        var offcanvasElement = document.querySelector(".offcanvas.show");
        if (offcanvasElement) {
          var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
          if (bsOffcanvas) bsOffcanvas.hide();
        }
      }

      // 2. 顯示頁面切換 Loading (若為強制重載則跳過，避免與成功訊息衝突)
      if (window.AppUI && !forceReload) {
        AppUI.loading("頁面跳轉中", "正在載入，請稍候...");
      }

      // 3. 組合 URL，若 forceReload 為 true 則加上時間戳記避開快取
      var url =
        SCRIPT_URL +
        (SCRIPT_URL.indexOf("?") === -1 ? "?" : "&") +
        "page=" +
        pageName;
      if (forceReload) url += "&t=" + Date.now();

      window.open(url, "_top");
    } else {
      var url =
        SCRIPT_URL +
        (SCRIPT_URL.indexOf("?") === -1 ? "?" : "&") +
        "page=" +
        pageName +
        (forceReload ? "&t=" + Date.now() : "");
      window.open(url, target);
    }
  }

  /**
   * 全域 UI 控制物件
   */
  window.AppUI = {
    _activeInterval: null, // 用於追蹤進度輪詢計時器

    /** 停止所有背景輪詢 */
    stopPolling: function () {
      if (this._activeInterval) {
        clearInterval(this._activeInterval);
        this._activeInterval = null;
        console.log("[AppUI] 背景輪詢已自動停止");
      }
    },

    /** 通用 Loading 效果 */
    loading: function (title, text, options) {
      title = title || "處理中";
      text = text || "請稍候...";
      options = options || {};
      if (typeof Swal === "undefined") {
        console.warn("Swal 未定義，降級使用 console 紀錄");
        return Promise.resolve();
      }

      var swalOptions = {
        title: title,
        text: text,
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: function () {
          Swal.showLoading();
        },
      };
      return Swal.fire(Object.assign(swalOptions, options));
    },

    // 科技感 Loading (Nebula Style)
    loadingNebula: function (text) {
      text = text || "正在獲取最新開獎紀錄";
      return this.loading(
        '<span style="letter-spacing: 2px;">SCANNING NEBULA</span>',
        text,
        {
          background: "#1a1a2e",
          color: "#00d2ff",
          loaderHtml:
            '<div class="spinner-border text-info" style="width: 3rem; height: 3rem; border-width: 0.25rem;" role="status"></div>',
        },
      );
    },

    // 彈出 HTML 內容視窗
    alertHtml: function (title, html, width) {
      width = width || "600px";
      return Swal.fire({
        title: title,
        html: html,
        width: width,
        confirmButtonText: "關閉",
        showCloseButton: true,
      });
    },

    // 全螢幕 / 大型彈窗模式
    alertLarge: function (title, html) {
      return this.alertHtml(title, html, "90%");
    },

    // 成功提示
    success: function (title, text, timer) {
      if (timer === undefined) timer = 2000;
      var timerInterval;
      return Swal.fire({
        icon: "success",
        title: title,
        html:
          "<div>" +
          text +
          "</div>" +
          (timer
            ? '<div class="mt-3 small text-muted">視窗將在 <b></b> 秒後自動關閉</div>'
            : ""),
        timer: timer,
        timerProgressBar: !!timer,
        showConfirmButton: !timer,
        didOpen: function () {
          if (timer) {
            var b = Swal.getHtmlContainer().querySelector("b");
            timerInterval = setInterval(function () {
              var timeLeft = Swal.getTimerLeft();
              if (b) b.textContent = Math.ceil(timeLeft / 1000);
            }, 100);
          }
        },
        willClose: function () {
          clearInterval(timerInterval);
        },
      });
    },

    // 錯誤提示
    error: function (title, text, debugInfo, showRetry) {
      this.stopPolling(); // 發生錯誤時立即停止輪詢

      // --- 核心新增：自動將錯誤詳情發送到後端 ErrorLog 工作表 ---
      try {
        google.script.run.logSystemError("Frontend_AppUI", "[" + title + "] " + (text || "無詳細內容"), "ERROR", (debugInfo && debugInfo.stack) ? debugInfo.stack : "", {
          lotto: window._lastErrorLotto || "N/A",
          timestamp: new Date().toISOString()
        });
      } catch (logErr) {
        console.warn("後端日誌同步失敗:", logErr);
      }

      window._lastErrorTitle = title;
      window._lastErrorText = text;
      var options = {
        icon: "error",
        title: title,
        text: text || "發生未知錯誤",
      };

      // 在頁尾增加功能按鈕區
      var footerLinks = [];
      if (debugInfo && debugInfo.stack) {
        window._lastDebugStack = debugInfo.stack;
        footerLinks.push(
          '<a href="javascript:void(0)" onclick="AppUI.showDebugStack()" class="text-danger fw-bold small"><i class="fas fa-bug me-1"></i>查看詳細錯誤</a>',
        );
      }
      footerLinks.push(
        '<a href="javascript:void(0)" onclick="AppUI.copyErrorInfo()" class="text-secondary small ms-3"><i class="fas fa-copy me-1"></i>複製錯誤回報</a>',
      );
      if (showRetry) {
        footerLinks.push(
          '<a href="javascript:void(0)" onclick="clearCacheAndRetry()" class="text-primary fw-bold small ms-3"><i class="fas fa-sync me-1"></i>清理快取並重試</a>',
        );
      }

      options.footer =
        '<div class="d-flex justify-content-center w-100">' +
        footerLinks.join("") +
        "</div>";

      return Swal.fire(options);
    },

    // 複製錯誤資訊到剪貼簿供回報使用
    copyErrorInfo: function () {
      var report =
        "【Galaxy Lotto 系統錯誤回報】\n" +
        "時間：" +
        new Date().toLocaleString() +
        "\n" +
        "標題：" +
        (window._lastErrorTitle || "N/A") +
        "\n" +
        "彩種：" +
        (window._lastErrorLotto || "N/A") +
        "\n" +
        "內容：" +
        (window._lastErrorText || "N/A") +
        "\n";

      if (window._lastDebugStack) {
        report += "\n--- Stack Trace ---\n" + window._lastDebugStack;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(report).then(function () {
          AppUI.toast("錯誤資訊已複製到剪貼簿", "success");
        });
      } else {
        // 針對舊版環境的備援方案
        console.log("Clipboard API 不可用，回傳格式化內容：", report);
        AppUI.toast("複製失敗，請開啟控制台手動複製", "error");
      }
    },

    // 顯示堆疊追蹤資訊
    showDebugStack: function (stack) {
      var content = stack || window._lastDebugStack || "無可用堆疊資訊";
      return Swal.fire({
        title: "詳細錯誤資訊 (Stack Trace)",
        html:
          '<pre class="text-start bg-light p-3 border rounded" style="font-size: 13px; max-height: 450px; overflow: auto; white-space: pre-wrap; font-family: Consolas, monospace;">' +
          content +
          "</pre>",
        width: "90%",
        confirmButtonText: "關閉",
        showCloseButton: true,
      });
    },

    // 確認視窗
    confirm: function (title, text, timer) {
      text = text || "";
      timer = timer || null;
      return Swal.fire({
        title: title,
        text: text,
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "確定",
        cancelButtonText: "取消",
        timer: timer,
        timerProgressBar: !!timer,
      });
    },

    // Toast 吐司訊息 (非阻斷式通知)
    toast: function (title, icon, timer) {
      icon = icon || "success";
      timer = timer || 3000;
      var Toast = Swal.mixin({
        toast: true,
        position: "top-end",
        showConfirmButton: false,
        timer: timer,
        timerProgressBar: true,
        didOpen: function (toast) {
          toast.addEventListener("mouseenter", Swal.stopTimer);
          toast.addEventListener("mouseleave", Swal.resumeTimer);
        },
      });
      return Toast.fire({ icon: icon, title: title });
    },

    /** 關閉當前所有 SweetAlert2 視窗 */
    close: function () {
      this.stopPolling(); // 關閉視窗時同步停止輪詢
      Swal.close();
    },

    /** 統一的系統錯誤處理入口 */
    showCommonError: function (error) {
      this.stopPolling();
      console.error("AppUI System Error:", error);
      // 確保 errorMsg 永遠是字串，避免 Swal 渲染異常
      const errorMsg = error && error.message ? error.message : String(error);
      this.error("系統錯誤", errorMsg);
    },
  };

  // 相容舊代碼
  function showCommonError(error) {
    AppUI.showCommonError(error);
  }
</script>
