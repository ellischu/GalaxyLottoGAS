<script>
  /**
   * 檢查外部函式庫載入狀態
   * 驗證 jQuery, Bootstrap, SweetAlert2 是否已定義
   */
  (function () {
    const libs = {
      jQuery: typeof jQuery !== "undefined",
      Bootstrap: typeof bootstrap !== "undefined",
      SweetAlert2: typeof Swal !== "undefined",
    };

    const missing = Object.keys(libs).filter((name) => !libs[name]);

    if (missing.length > 0) {
      const errorMsg = "關鍵函式庫載入失敗: " + missing.join(", ");
      console.error(errorMsg);
      // 若檢測到缺失，等待 1.5 秒後再次檢查（給予 Fallback 腳本一點時間）
      setTimeout(() => {
        const stillMissing = missing.some((name) => {
          if (name === "jQuery") return typeof window.jQuery === "undefined";
          if (name === "Bootstrap")
            return typeof window.bootstrap === "undefined";
          if (name === "SweetAlert2") return typeof window.Swal === "undefined";
          return false;
        });

        if (stillMissing) {
          console.error("備援載入亦失敗。");
        }
      }, 1500);
    } else {
      console.info("所有外部資源 (jQuery, Bootstrap, Swal2) 載入成功。");
    }
  })();

  /**
   * 動態注入腳本內容到 DOM
   * @param {string} scriptContent 要注入的 JavaScript 程式碼
   */
  function injectScriptContent(scriptContent) {
    try {
      const script = document.createElement("script");
      // 使用 .text 屬性處理大型腳本字串在部分環境下的相容性
      script.text = scriptContent;
      document.head.appendChild(script);
      console.log("Fallback script injected via DOM.");
    } catch (e) {
      console.warn("DOM 注入失敗，嘗試使用 eval 載入:", e);
      eval(scriptContent);
    }
  }

  /**
   * 共用頁面跳轉函式
   */
  const SCRIPT_URL = "<?!= getScriptUrl() ?>";

  function openPageUrl(pageName, target = "_top") {
    if (target === "_self" || target === "_top") {
      // 1. 自動關閉 Bootstrap 的 Offcanvas 導覽列
      if (typeof bootstrap !== "undefined") {
        const offcanvasElement = document.querySelector(".offcanvas.show");
        if (offcanvasElement) {
          const bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
          if (bsOffcanvas) bsOffcanvas.hide();
        }
      }

      // 2. 顯示頁面切換 Loading (使用重構後的 AppUI)
      if (window.AppUI) {
        AppUI.loading("頁面跳轉中", "正在載入，請稍候...");
      }

      window.open(SCRIPT_URL + "?page=" + pageName, "_top");
    } else {
      window.open(SCRIPT_URL + "?page=" + pageName, target);
    }
  }

  /**
   * 全域 UI 控制物件
   */
  window.AppUI = {
    // 通用 Loading
    loading: function (title = "處理中", text = "請稍候...", options = {}) {
      if (typeof Swal === "undefined") {
        console.warn("Swal 未定義，降級使用 console 紀錄");
        return Promise.resolve();
      }
      return Swal.fire({
        title: title,
        text: text,
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => {
          Swal.showLoading();
        },
        ...options,
      });
    },

    // 科技感 Loading (Nebula Style)
    loadingNebula: function (text = "正在獲取最新開獎紀錄") {
      return this.loading(
        '<span style="letter-spacing: 2px;">SCANNING NEBULA</span>',
        text,
        {
          background: "#1a1a2e",
          color: "#00d2ff",
          loaderHtml:
            '<div class="spinner-grow text-info" style="width: 3rem; height: 3rem;" role="status"></div>',
        },
      );
    },

    // 彈出 HTML 內容視窗
    alertHtml: function (title, html, width = "600px") {
      return Swal.fire({
        title: title,
        html: html,
        width: width,
        confirmButtonText: "關閉",
        showCloseButton: true,
      });
    },

    // 全螢幕 / 大型彈窗模式
    alertLarge: function (title, html) {
      return this.alertHtml(title, html, "90%");
    },

    // 成功提示
    success: function (title, text, timer = 2000) {
      let timerInterval;
      return Swal.fire({
        icon: "success",
        title: title,
        html:
          `<div>${text}</div>` +
          (timer
            ? `<div class="mt-3 small text-muted">視窗將在 <b></b> 秒後自動關閉並重載</div>`
            : ""),
        timer: timer,
        timerProgressBar: !!timer,
        showConfirmButton: !timer,
        didOpen: () => {
          if (timer) {
            const b = Swal.getHtmlContainer().querySelector("b");
            timerInterval = setInterval(() => {
              const timeLeft = Swal.getTimerLeft();
              if (b) b.textContent = Math.ceil(timeLeft / 1000);
            }, 100);
          }
        },
        willClose: () => {
          clearInterval(timerInterval);
        },
      });
    },

    // 錯誤提示
    error: function (title, text) {
      return Swal.fire({
        icon: "error",
        title: title,
        text: text || "發生未知錯誤",
      });
    },

    // 確認視窗
    confirm: function (title, text = "", timer = null) {
      return Swal.fire({
        title: title,
        text: text,
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "確定",
        cancelButtonText: "取消",
        timer: timer,
        timerProgressBar: !!timer,
      });
    },

    // Toast 吐司訊息 (非阻斷式通知)
    toast: function (title, icon = "success", timer = 3000) {
      const Toast = Swal.mixin({
        toast: true,
        position: "top-end",
        showConfirmButton: false,
        timer: timer,
        timerProgressBar: true,
        didOpen: (toast) => {
          toast.onmouseenter = Swal.stopTimer;
          toast.onmouseleave = Swal.resumeTimer;
        },
      });
      return Toast.fire({ icon, title });
    },

    // 關閉視窗
    close: function () {
      Swal.close();
    },

    // 系統錯誤處理
    showCommonError: function (error) {
      console.error(error);
      this.error("系統錯誤", error.message || error);
    },
  };

  // 相容舊代碼
  function showCommonError(error) {
    AppUI.showCommonError(error);
  }
</script>
