<style>
  body {
    /* 移除硬編碼背景色，讓 Styles.html 的響應式背景（淺色/深色）能正確生效 */
    font-family: "Microsoft JhengHei", sans-serif;
  }
  .lotto-ball {
    width: 55px;
    height: 55px;
    background: radial-gradient(circle at 30% 30%, #fff, #f00);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 1.3rem;
    box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
    margin-bottom: 5px;
    transition: transform 0.3s;
  }
  /* 深色模式下球體增加微弱外發光，提升立體感 */
  [data-bs-theme="dark"] .lotto-ball {
    box-shadow:
      0 0 15px rgba(255, 255, 255, 0.2),
      0 0 30px rgba(255, 255, 255, 0.05),
      2px 2px 8px rgba(0, 0, 0, 0.5);
  }
  /* 宮位分析表格高亮：增加青色外發光效果 */
  .table-success-subtle {
    box-shadow: 0 0 12px rgba(0, 210, 255, 0.25);
    background-color: rgba(0, 210, 255, 0.05) !important;
    transition: background-color 0.3s;
  }
  .lotto-ball.hit {
    background: radial-gradient(circle at 30% 30%, #ffd700, #ff8c00);
    border: 2px solid #fff;
    transform: scale(1.1);
  }
  .bg-rebound {
    background-color: #6610f2 !important;
    color: #fff !important;
    border: 1px solid rgba(255, 255, 255, 0.8);
    box-shadow: 0 0 10px rgba(102, 16, 242, 0.8);
    text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
  }
  .animate-pulse {
    animation: pulse 2s infinite;
  }
  /* 強化 Checkbox 旁圖示顯示：跟隨系統字體縮放比例 */
  .form-check-label i {
    font-size: calc(1.8rem * var(--font-scale, 1));
    vertical-align: middle;
    margin-bottom: 0.2rem;
    margin-right: 5px;
  }
  /* 移除與全域 Styles.html 衝突的 transform，改用全域定義的寬高 */
  .form-check-input {
    cursor: pointer;
    margin-right: 10px !important;
    flex-shrink: 0; /* 防止開關被文字擠壓變形 */
    border: 1px solid rgba(0, 0, 0, 0.25) !important; /* 增加邊框確保在淺色背景下可見 */
    background-color: #fff;
    border-radius: 2rem !important; /* 確保開關組件具備圓角特性 */
  }
  .form-check-input:checked {
    background-color: #0d6efd;
  }

  /* 命中球號登場動畫：縮放與閃爍過場 */
  .ball-hit-appear {
    animation: ball-hit-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    z-index: 5;
  }

  @keyframes ball-hit-pop {
    0% {
      transform: scale(0.3);
      opacity: 0;
      filter: brightness(3);
    }
    50% {
      transform: scale(1.3);
      opacity: 1;
      filter: brightness(1.5);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
    }
    70% {
      transform: scale(1.05);
      filter: brightness(1.2);
    }
    100% {
      transform: scale(1.1);
      opacity: 1;
      filter: brightness(1);
    }
  }

  /* 命中球號呼吸效果：在登場動畫後持續執行 */
  .ball-hit-breathing {
    animation: ball-hit-breathing 3.5s infinite ease-in-out;
    z-index: 4;
  }

  @keyframes ball-hit-breathing {
    0%,
    100% {
      box-shadow:
        0 0 15px rgba(255, 215, 0, 0.6),
        0 0 25px rgba(255, 193, 7, 0.3);
      transform: scale(1.1) rotate(0deg); /* 保持縮放與初始角度 */
    }
    50% {
      box-shadow:
        0 0 35px rgba(255, 215, 0, 0.9),
        0 0 50px rgba(255, 193, 7, 0.5);
      transform: scale(1.18) rotate(3deg); /* 增加輕微旋轉與更強的發光 */
    }
  }

  /* 換組動畫：消失 */
  @keyframes ball-exit-space {
    0% {
      transform: scale(1);
      opacity: 1;
      filter: blur(0);
    }
    100% {
      transform: scale(0.3);
      opacity: 0;
      filter: blur(10px) brightness(2);
    }
  }
  .ball-exit-space {
    animation: ball-exit-space 0.4s ease-in forwards;
  }

  /* 換組動畫：出現 */
  @keyframes ball-enter-space {
    0% {
      transform: scale(0);
      opacity: 0;
      filter: brightness(0);
    }
    100% {
      transform: scale(1);
      opacity: 1;
      filter: brightness(1);
    }
  }
  .ball-enter-space {
    animation: ball-enter-space 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)
      forwards;
  }

  /* --- 深色模式科幻開關配色 --- */
  [data-bs-theme="dark"] .form-check-input {
    background-color: #333;
    border-color: rgba(255, 255, 255, 0.2) !important;
  }
  [data-bs-theme="dark"] .form-check-input:checked {
    background-color: #00d2ff !important; /* 科幻青色 */
    border-color: #00d2ff !important;
    box-shadow: 0 0 15px rgba(0, 210, 255, 0.5) !important;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='white'/%3e%3c/svg%3e");
  }

  @keyframes pulse {
    0% {
      opacity: 1;
    }
    50% {
      opacity: 0.7;
    }
    100% {
      opacity: 1;
    }
  }
  .animate-flash {
    animation: flash 1.5s ease-in-out infinite;
  }
  @keyframes flash {
    0% {
      opacity: 1;
      box-shadow: 0 0 5px #6610f2;
    }
    50% {
      opacity: 0.7;
      box-shadow:
        0 0 15px #6610f2,
        0 0 25px #6610f2,
        0 0 35px #ffffff;
    }
    100% {
      opacity: 1;
      box-shadow: 0 0 5px #6610f2;
    }
  }

  /* 過熱標籤動畫：高頻震動閃爍 */
  .animate-overheat {
    animation: overheat-blink 0.8s infinite alternate ease-in-out;
    box-shadow: 0 0 10px rgba(220, 53, 69, 0.5);
  }
  @keyframes overheat-blink {
    0% {
      opacity: 1;
      filter: brightness(1);
      transform: scale(1);
    }
    100% {
      opacity: 0.8;
      filter: brightness(1.3);
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(220, 53, 69, 0.8);
    }
  }

  /* 科技感控制面板樣式 */
  .tech-panel {
    background: rgba(var(--bs-primary-rgb), 0.03);
    border: 1px solid rgba(var(--bs-primary-rgb), 0.15);
    border-radius: 12px;
    padding: 1.2rem;
    backdrop-filter: blur(5px);
    box-shadow: inset 0 0 15px rgba(var(--bs-primary-rgb), 0.05);
  }

  /* 放大開關圖示與對齊優化 */
  .tech-panel .form-switch {
    padding-left: 3.2rem;
    min-height: 1.5rem;
  }
  .tech-panel .form-check-input {
    width: 2.8rem !important;
    height: 1.4rem !important;
    margin-left: -3.2rem !important;
    cursor: pointer;
    border-radius: 2rem !important; /* 強制科技面板內的開關呈現膠囊狀圓角 */
  }
  .tech-panel .form-check-label {
    cursor: pointer;
    padding-top: 2px;
  }

  [data-bs-theme="dark"] .tech-panel {
    background: rgba(0, 210, 255, 0.03);
    border-color: rgba(0, 210, 255, 0.2);
    box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.05);
  }

  /* 深色模式下主題按鈕變為黃色/金色 */
  [data-bs-theme="dark"] #themeToggleBtn {
    color: #ffc107 !important;
    border-color: #ffc107 !important;
  }
  [data-bs-theme="dark"] #themeToggleBtn:hover {
    background-color: rgba(255, 193, 7, 0.1) !important;
    box-shadow: 0 0 12px rgba(255, 193, 7, 0.4);
  }

  /* 智慧預測按鈕美化與科幻擴散效果 */
  .btn-prediction-v1 {
    position: relative;
    overflow: hidden;
    z-index: 1;
    border: none !important;
    background: linear-gradient(45deg, #0d6efd, #00d2ff) !important;
    box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3) !important;
    transition: all 0.3s ease !important;
  }
  .btn-prediction-v1:hover {
    box-shadow: 0 0 20px rgba(0, 210, 255, 0.6) !important;
    filter: brightness(1.1);
  }
  .btn-scan-active::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: scan-ripple-out 0.8s ease-out;
    pointer-events: none;
  }
  @keyframes scan-ripple-out {
    0% {
      width: 0;
      height: 0;
      opacity: 1;
    }
    100% {
      width: 1000px;
      height: 1000px;
      opacity: 0;
    }
  }

  /* 歷史期數下拉選單美化 */
  #historyPeriod {
    transition: all 0.3s ease;
    border-radius: 6px;
  }
  [data-bs-theme="dark"] #historyPeriod {
    background-color: rgba(0, 210, 255, 0.05) !important;
    border-color: rgba(0, 210, 255, 0.4) !important;
    color: #00d2ff !important;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2300d2ff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
    text-shadow: 0 0 5px rgba(0, 210, 255, 0.2);
  }
  [data-bs-theme="dark"] #historyPeriod:hover,
  [data-bs-theme="dark"] #historyPeriod:focus {
    border-color: #00d2ff !important;
    box-shadow: 0 0 10px rgba(0, 210, 255, 0.4) !important;
    outline: none;
  }

  /* 五行屬性標籤樣式 (解決金星等標籤不可見問題) */
  .badge-metal {
    background: linear-gradient(135deg, #ffd700, #b8860b) !important;
    color: #000 !important;
    box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    text-shadow: none !important;
  } /* 金 - 金星：使用深色文字確保金底清晰 */
  .badge-wood {
    background: linear-gradient(135deg, #28a745, #155724) !important;
    color: #fff !important;
    box-shadow: 0 0 8px rgba(40, 167, 69, 0.5);
  } /* 木 - 木星 */
  .badge-water {
    background: linear-gradient(135deg, #00d2ff, #007bff) !important;
    color: #fff !important;
    box-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
  } /* 水 - 水星 */
  .badge-fire {
    background: linear-gradient(135deg, #ff416c, #ff4b2b) !important;
    color: #fff !important;
    box-shadow: 0 0 8px rgba(255, 65, 108, 0.5);
  } /* 火 - 火星 */
  .badge-earth {
    background: linear-gradient(135deg, #8d6e63, #4e342e) !important;
    color: #fff !important;
    box-shadow: 0 0 8px rgba(141, 110, 99, 0.5);
  } /* 土 - 土星 */

  .badge-element {
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
  }

  /* 連莊標籤：深色金屬感配淡白光 */
  .badge-repeat {
    background-color: #212529 !important;
    color: #fff !important;
    box-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    letter-spacing: 1px;
  }
  /* 隔期標籤：科幻青色發光 */
  .badge-skip {
    background-color: #0dcaf0 !important;
    color: #212529 !important;
    box-shadow: 0 0 8px rgba(13, 202, 240, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.4);
    letter-spacing: 1px;
    animation: skip-glow-pulse 2.5s infinite ease-in-out;
  }
  @keyframes skip-glow-pulse {
    0%,
    100% {
      box-shadow: 0 0 5px rgba(13, 202, 240, 0.5);
      opacity: 1;
    }
    50% {
      box-shadow: 0 0 15px rgba(13, 202, 240, 0.8);
      opacity: 0.9;
    }
  }
  /* 五行共振標籤：翠綠色能源發光 */
  /* 特別號 (S1) 命中標籤：亮綠色背景與深色文字，確保視覺對比 */
  .bg-s1 {
    background-color: #38ef7d !important;
    color: #212529 !important;
    box-shadow: 0 0 15px rgba(56, 239, 125, 0.8);
    font-weight: bold;
    border: 1px solid #fff !important;
  }
  /* 中特驚喜發光動畫 */
  .animate-glow-s1 {
    animation: glow-s1 1.2s infinite alternate ease-in-out;
  }
  @keyframes glow-s1 {
    from {
      box-shadow: 0 0 10px rgba(56, 239, 125, 0.6);
      transform: scale(1);
    }
    to {
      box-shadow:
        0 0 25px rgba(56, 239, 125, 1),
        0 0 35px rgba(255, 215, 0, 0.7);
      filter: brightness(1.2);
      transform: scale(1.1);
    }
  }
  .ball-container {
    width: 60px;
  }
  .card {
    border-radius: 15px;
    border: none;
  }

  @media (max-width: 576px) {
    .lotto-ball {
      width: 40px;
      height: 40px;
      font-size: 1rem;
    }
    .form-label {
      font-size: 0.85rem;
    }
    /* 詳細模式下的環境係數表格行動端優化 */
    #envTableBody td {
      padding: 0.5rem 0.25rem !important;
      font-size: 0.85rem;
      vertical-align: middle;
    }
    #envTableBody .ps-3 {
      padding-left: 0.6rem !important;
    }
    #envTableBody .badge {
      font-size: 0.75rem;
      padding: 0.35em 0.5em;
      white-space: nowrap;
    }
    .table-responsive {
      max-height: 450px !important; /* 手機版縮短滾動區域避免頁面過長 */
    }
  }
</style>
