      <div id="loading" class="text-center mt-5">

    <script>
      /**
       * 使用 IIFE 封裝 jQuery 邏輯，避免 $ 命名衝突
       */
      (function ($) {
        $(document).ready(function () {
          // 使用封裝後的物件
          AppUI.loadingNebula();

          google.script.run
            .withSuccessHandler(window.renderData)
            .withFailureHandler(AppUI.showCommonError.bind(AppUI))
            .getLastRecords();
        });

        window.renderData = function (data) {
          const $app = $("#app");
          AppUI.close();
          $("#loading").hide();

          if (!data || Object.keys(data).length === 0) {
            $app.html(
              '<div class="col-12 text-center"><p class="text-muted">No observation records found.</p></div>',
            );
            return;
          }

          const names = {
            L539: "今彩 539",
            L649: "大樂透",
            L638: "威力彩",
            LSix: "六合彩",
          };

          const order = ["L539", "L649", "L638", "LSix"];

          order.forEach((key) => {
            if (data[key]) {
              const record = data[key];

              let ballsHtml = "";
              Object.keys(record).forEach((k) => {
                if (k.startsWith("L") && !isNaN(parseInt(k.substring(1)))) {
                  ballsHtml += `<div class="ball">${record[k]}</div>`;
                }
              });

              if (record["S1"]) {
                ballsHtml += `<div class="ball special">${record["S1"]}</div>`;
              }

              const cardHtml = `
                <div class="card w-100 shadow-sm">
                  <div class="card-header fw-bold">
                    ${names[key] || key}
                  </div>
                  <div class="card-body">
                    <div class="row text-center mb-3">
                      <div class="col-4">
                        <div class="label-text">期數</div>
                        <div class="value-text">${record["period"] || ""}</div>
                      </div>
                      <div class="col-4">
                        <div class="label-text">日期</div>
                        <div class="value-text">${window.formatDate(record["Date"])}</div>
                      </div>
                      <div class="col-4">
                        <div class="label-text">總合</div>
                        <div class="value-text">${record["Sum"] || "-"}</div>
                      </div>
                    </div>
                    <div class="d-flex flex-wrap justify-content-center border-top pt-3 mt-3">
                      ${ballsHtml}
                    </div>
                  </div>
                </div>
            `;
              $app.append(cardHtml);
            }
          });
        };

        window.formatDate = function (dateStr) {
          if (!dateStr) return "";
          return dateStr.toString().split("T")[0];
        };

        window.showError = function (error) {
          Swal.close();
          $("#loading").html(
            `<div class="alert alert-danger">Error: ${error.message}</div>`,
          );
        };
      })(jQuery);
    </script>
