  <body>

    <div class="container main-container">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="text-center header-text">預測查詢</h5>
          <div class="row g-3 align-items-end">
            <div class="col-md-6">
              <label for="predictDate" class="form-label label-text"
                >日期</label
              >
              <input
                type="date"

                id="predictDate"
              />
            </div>
            <div class="col-md-6">
              <label for="lottoSelect" class="form-label label-text"
                >選擇彩種</label
              >
              <select id="lottoSelect" class="form-select label-text">
                <option value="L539" selected>今彩 539</option>
                <option value="L649">大樂透</option>
                <option value="L638">威力彩</option>
                <option value="LSix">六合彩</option>
              </select>
            </div>
            <div class="col-12">
              <div class="d-grid">
                <button
                  class="btn btn-primary label-text text-white"
                  type="button"
                  id="predictButton"
                >

                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <hr />

      <h2 class="text-center header-text">最新開獎結果</h2>

      <div id="loading" class="text-center mt-5">
        <p class="mt-2 text-secondary">Scanning Nebula...</p>
      </div>

      <div id="app" class="d-flex flex-column gap-3"></div>
    </div>

    <script>
      /**
       * 使用 IIFE 封裝 jQuery 邏輯，避免 $ 命名衝突
       */
      (function ($) {
        $(document).ready(function () {
          const d = new Date();
          d.setDate(d.getDate() + 1);
          const dateStr =
            d.getFullYear() +
            "-" +
            String(d.getMonth() + 1).padStart(2, "0") +
            "-" +
            String(d.getDate()).padStart(2, "0");
          $("#predictDate").val(dateStr);

          // 使用封裝後的物件
          AppUI.loadingNebula();

          google.script.run
            .withSuccessHandler(window.renderData)
            .withFailureHandler(AppUI.showCommonError.bind(AppUI))
            .getLastRecords();
        });

        window.renderData = function (data) {
          const $app = $("#app");
          AppUI.close();
          $("#loading").hide();

          if (!data || Object.keys(data).length === 0) {
            $app.html(
              '<div class="col-12 text-center"><p class="text-muted">No observation records found.</p></div>',
            );
            return;
          }

          const names = {
            L539: "今彩 539",
            L649: "大樂透",
            L638: "威力彩",
            LSix: "六合彩",
          };

          const order = ["L539", "L649", "L638", "LSix"];

          order.forEach((key) => {
            if (data[key]) {
              const record = data[key];

              let ballsHtml = "";
              Object.keys(record).forEach((k) => {
                if (k.startsWith("L") && !isNaN(parseInt(k.substring(1)))) {
                  ballsHtml += `<div class="ball">${record[k]}</div>`;
                }
              });

              if (record["S1"]) {
                ballsHtml += `<div class="ball special">${record["S1"]}</div>`;
              }

              const cardHtml = `
                <div class="card w-100 shadow-sm">
                  <div class="card-header fw-bold">
                    ${names[key] || key}
                  </div>
                  <div class="card-body">
                    <div class="row text-center mb-3">
                      <div class="col-4">
                        <div class="label-text">期數</div>
                        <div class="value-text">${record["period"] || ""}</div>
                      </div>
                      <div class="col-4">
                        <div class="label-text">日期</div>
                        <div class="value-text">${window.formatDate(record["Date"])}</div>
                      </div>
                      <div class="col-4">
                        <div class="label-text">總合</div>
                        <div class="value-text">${record["Sum"] || "-"}</div>
                      </div>
                    </div>
                    <div class="d-flex flex-wrap justify-content-center border-top pt-3 mt-3">
                      ${ballsHtml}
                    </div>
                  </div>
                </div>
            `;
              $app.append(cardHtml);
            }
          });
        };

        window.formatDate = function (dateStr) {
          if (!dateStr) return "";
          return dateStr.toString().split("T")[0];
        };

        window.showError = function (error) {
          Swal.close();
          $("#loading").html(
            `<div class="alert alert-danger">Error: ${error.message}</div>`,
          );
        };
      })(jQuery.noConflict());
    </script>
  </body>
