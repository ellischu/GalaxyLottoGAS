    <div class="container main-container">
      <!-- 前往預測頁面的快捷入口 -->

    <!-- 將共用腳本移至 body 底部載入，避免阻斷 HTML 渲染 -->
    <?!= include('Scripts'); ?>

    <script>
      /**
       * 使用 IIFE 封裝 jQuery 邏輯，避免 $ 命名衝突
       */
      (function ($) {
        // 獲取 Script URL 供跳轉使用
        google.script.run
          .withSuccessHandler(function (url) {
            window.scriptUrl = url;
          })
          .getScriptUrl();

        $(document).ready(function () {
          // 使用封裝後的物件
          AppUI.loadingNebula();

          google.script.run
            .withSuccessHandler(window.renderData)
            .withFailureHandler(AppUI.showCommonError.bind(AppUI))
            .getLastRecords();

          // 載入系統健康統計
          fetchSystemHealth();
        });

        window.renderData = function (data) {
          var $app = $("#app");
          AppUI.close();
          $("#loading").hide();

          window.latestLotteryData = data; // 暫存資料供全域分享使用

          if (!data || Object.keys(data).length === 0) {
            $app.html(
              '<div class="col-12 text-center"><p class="text-muted">No observation records found.</p></div>',
            );
            return;
          }

          var names = {
            L539: "今彩 539",
            L649: "大樂透",
            L638: "威力彩",
            LSix: "六合彩",
          };

          window.shareRegistry = {}; // 初始化分享訊息註冊表，防止特殊字元破壞 HTML

          var cardConfigs = {
            L539: {
              border: "border-success",
              icon: "fa-leaf",
              text: "text-success",
            },
            L649: {
              border: "border-primary",
              icon: "fa-star",
              text: "text-primary",
            },
            L638: { border: "border-info", icon: "fa-bolt", text: "text-info" },
            LSix: {
              border: "border-danger",
              icon: "fa-fire",
              text: "text-danger",
            },
          };

          var order = ["L539", "L649", "L638", "LSix"];

          order.forEach(function (key) {
            if (data[key]) {
              var record = data[key];
              var config = cardConfigs[key] || {
                border: "",
                icon: "fa-circle",
                text: "",
              };

              var ballsHtml = "";
              var numsArr = [];
              Object.keys(record).forEach(function (k) {
                if (k.startsWith("L") && !isNaN(parseInt(k.substring(1)))) {
                  ballsHtml += '<div class="ball">' + record[k] + "</div>";
                  numsArr.push(record[k]);
                }
              });

              if (record["S1"]) {
                ballsHtml +=
                  '<div class="ball special">' + record["S1"] + "</div>";
              }

              // 產生 LINE 分享訊息文字
              var shareMsg =
                "【" +
                (names[key] || key) +
                "】\n期數：" +
                (record["period"] || "") +
                "\n日期：" +
                window.formatDate(record["Date"]) +
                "\n號碼：" +
                numsArr.join(", ");
              if (record["S1"]) shareMsg += " (特別號: " + record["S1"] + ")";
              shareMsg += "\n\n來自 Galaxy Lotto Observer";

              var registryId = "msg_" + key;
              window.shareRegistry[registryId] = shareMsg;

              var lineUrl =
                "https://line.me/R/msg/text/?" + encodeURIComponent(shareMsg);

              var cardHtml =
                '<div class="col-12 col-md-6">' +
                '<div class="card h-100 shadow-sm ' +
                config.border +
                '">' +
                '<div class="card-header fw-bold ' +
                config.text +
                '">' +
                '<i class="fas ' +
                config.icon +
                ' me-2"></i>' +
                (names[key] || key) +
                "</div>" +
                '<div class="card-body">' +
                '<div class="row text-center mb-3">' +
                '<div class="col-4">' +
                '<div class="label-text">期數</div>' +
                '<div class="value-text">' +
                (record["period"] || "") +
                "</div>" +
                "</div>" +
                '<div class="col-4">' +
                '<div class="label-text">日期</div>' +
                '<div class="value-text">' +
                window.formatDate(record["Date"]) +
                "</div>" +
                "</div>" +
                '<div class="col-4">' +
                '<div class="label-text">總合</div>' +
                '<div class="value-text">' +
                (record["Sum"] || "-") +
                "</div>" +
                "</div>" +
                "</div>" +
                '<div class="d-flex flex-wrap justify-content-center border-top pt-3 mt-3">' +
                ballsHtml +
                "</div>" +
                '<div class="d-flex justify-content-between align-items-center mt-3 border-top pt-2">' +
                '<div class="d-flex gap-2 gap-sm-3">' +
                '<a href="' +
                lineUrl +
                '" target="_blank" class="text-decoration-none fs-4 text-success fw-bold">' +
                '<i class="fab fa-line me-1"></i>LINE 分享' +
                "</a>" +
                '<a href="javascript:void(0)" data-msg-id="' +
                registryId +
                '" onclick="window.copyToClipboard(window.shareRegistry[this.dataset.msgId])" class="text-decoration-none fs-4 text-secondary fw-bold">' +
                '<i class="fas fa-copy me-1"></i>複製文字' +
                "</a>" +
                '<a href="javascript:void(0)" onclick="window.shareAsImage(\'' +
                key +
                '\')" class="text-decoration-none fs-4 text-info fw-bold d-none d-sm-inline">' +
                '<i class="fas fa-image me-1"></i>分享圖片' +
                "</a>" +
                "</div>" +
                '<a href="javascript:void(0)" onclick="window.viewTrend(\'' +
                key +
                '\')" class="text-decoration-none fs-4 ' +
                config.text +
                ' fw-bold">' +
                '趨勢預測 <i class="fas fa-chevron-right ms-1"></i>' +
                "</a>" +
                "</div></div></div></div>";
              $app.append(cardHtml);
            }
          });
        };

        /**
         * 獲取並顯示系統健康統計
         */
        function fetchSystemHealth() {
          google.script.run
            .withSuccessHandler(function (stats) {
              if (!stats) return;
              $("#statCacheCount").text(stats.cacheCount + " 組");
              $("#statArchiveCount").text(stats.archiveCount + " 筆");
              $("#statVersion").text(stats.appVersion);
              $("#systemHealthPanel").fadeIn();
            })
            .getSystemHealthStats();
        }

        /**
         * 一鍵分享今日所有開獎結果
         */
        window.shareAllToday = function () {
          var data = window.latestLotteryData;
          if (!data) return;

          var msg = "【Galaxy Lotto 今日開獎總結】\n";
          var names = {
            L539: "今彩539",
            L649: "大樂透",
            L638: "威力彩",
            LSix: "六合彩",
          };

          ["L539", "L649", "L638", "LSix"].forEach(function (key) {
            if (data[key]) {
              var record = data[key];
              var nums = [];
              Object.keys(record).forEach(function (k) {
                if (k.startsWith("L") && !isNaN(parseInt(k.substring(1))))
                  nums.push(record[k]);
              });
              msg +=
                "\n$ " +
                names[key] +
                ": " +
                nums.join(", ") +
                (record.S1 ? " [S:" + record.S1 + "]" : "");
            }
          });

          msg += "\n\n更多 AI 分析請造訪 Galaxy Lotto Observer";
          window.copyToClipboard(msg);
          var lineUrl =
            "https://line.me/R/msg/text/?" + encodeURIComponent(msg);
          window.open(lineUrl, "_blank");
        };

        /**
         * 將單一彩種結果繪製成圖片並下載/分享
         */
        window.shareAsImage = function (key) {
          var data = window.latestLotteryData[key];
          if (!data) return;

          // 偵測目前系統/瀏覽器是否處於夜間模式
          var isDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;

          var canvas = document.createElement("canvas");
          canvas.width = 600;
          canvas.height = 350;
          var ctx = canvas.getContext("2d");

          // 背景
          var gradient = ctx.createLinearGradient(0, 0, 600, 350);
          if (isDark) {
            gradient.addColorStop(0, "#1a1a2e");
            gradient.addColorStop(1, "#16213e");
          } else {
            gradient.addColorStop(0, "#ffffff");
            gradient.addColorStop(1, "#f1f3f5");
          }
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, 600, 350);

          // 標題
          ctx.fillStyle = isDark ? "#00d2ff" : "#0d6efd";
          ctx.font = 'bold 36px "Microsoft JhengHei"';
          var names = {
            L539: "今彩 539",
            L649: "大樂透",
            L638: "威力彩",
            LSix: "六合彩",
          };
          ctx.fillText(names[key], 40, 60);

          // 資訊
          ctx.fillStyle = isDark ? "#ffffff" : "#495057";
          ctx.font = '20px "Microsoft JhengHei"';
          ctx.fillText(
            "期數: " + data.period + " | 日期: " + window.formatDate(data.Date),
            40,
            100,
          );

          // 繪製球號
          var x = 60;
          var y = 180;
          Object.keys(data).forEach(function (k) {
            if (k.startsWith("L") && !isNaN(parseInt(k.substring(1)))) {
              drawBall(ctx, x, y, data[k], "#ff512f");
              x += 80;
            }
          });
          if (data.S1) drawBall(ctx, x, y, data.S1, "#11998e");

          // 浮水印
          ctx.fillStyle = isDark ? "rgba(255,255,255,0.3)" : "rgba(0,0,0,0.2)";
          ctx.font = "14px Arial";
          ctx.fillText("Galaxy Lotto Observer AI System", 380, 320);

          var imgData = canvas.toDataURL("image/png");
          var link = document.createElement("a");
          link.download = key + "_" + data.period + ".png";
          link.href = imgData;
          link.click();
          AppUI.toast("圖片已產生成並下載", "success");
        };

        function drawBall(ctx, x, y, num, color) {
          ctx.beginPath();
          ctx.arc(x, y, 30, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.5)";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = "white";
          ctx.font = "bold 24px Arial";
          ctx.textAlign = "center";
          ctx.fillText(num, x, y + 10);
        }

        window.viewTrend = function (lotto) {
          var backup = { lotto: lotto, isReloaded: true, autoStart: true };
          localStorage.setItem("sys_backup_settings", JSON.stringify(backup));
          openPageUrl("Predict");
        };

        window.copyToClipboard = function (text) {
          if (!text) return;
          // 使用現代剪貼簿 API
          navigator.clipboard
            .writeText(text)
            .then(() => {
              AppUI.toast("已複製到剪貼簿", "success");
            })
            .catch(() => {
              // 備援機制：針對舊版瀏覽器或特定環境
              var textArea = document.createElement("textarea");
              textArea.value = text;
              document.body.appendChild(textArea);
              textArea.select();
              document.execCommand("copy");
              document.body.removeChild(textArea);
              AppUI.toast("已複製到剪貼簿", "success");
            });
        };

        window.formatDate = function (dateStr) {
          if (!dateStr) return "";
          return dateStr.toString().split("T")[0];
        };

        window.showError = function (error) {
          Swal.close();
          $("#loading").html(
            '<div class="alert alert-danger">Error: ' +
              error.message +
              "</div>",
          );
        };
      })(jQuery);
    </script>
    <?!= includeFooter(); ?>
  </body>
