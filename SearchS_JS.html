<script>
  /**
   * SearchS.html 邏輯處理
   */
  $(document).ready(function () {
    // 1. 介面初始化
    initPage();
    window._lastPreviewData = null; // 暫存預覽資料供切換過濾

    // 2. 開關聯動與滑動效果
    $("#chkField").on("change", function () {
      $("#AreaField").slideToggle(this.checked);
      updateNextCombos();
    });
    $("#chkNext").on("change", function () {
      $("#AreaNext").slideToggle(this.checked);
      updateNextCombos();
    });
    $("#chkRange").on("change", function () {
      $("#AreaRange").slideToggle(this.checked);
    });
    $("#chkPreview").on("change", function () {
      $("#AreaTable, #AreaDebug").slideToggle(this.checked);
    });

    // 3. 資料預覽更新監聽
    $("#INDate, #SecLotto").on("change", function () {
      const isL638 = $("#SecLotto").val() === "L638";
      $("#ColNextSpe").toggle(isL638);
      $("#ColNextCombo")
        .toggleClass("col-md-6", !isL638)
        .toggleClass("col-md-4", isL638);
      loadPreviewData();
      updateNextCombos();
    });
    $(
      "#SecNextNums, #SecNextStep, #SecField1, #SecField2, #SecField3, #SecField4",
    ).on("change", updateNextCombos);

    // 4. 提交查詢
    $("#btnQuery").on("click", function () {
      startGalaxySearch();
    });

    // 5. 預覽資料
    $("#btnPreview").on("click", function () {
      showDataPreview();
    });

    // 6. 組合選擇變更
    $("#SecNextCombo, #SecNextSpe").on("change", function () {
      // 當選中的組合或特別號改變時，應重新觸發預覽以取得該組合對應的正確歷史結果
      showDataPreview();
    });
  });

  function initPage() {
    // 設定預設日期為今天
    const today = new Date().toISOString().split("T")[0];
    $("#INDate").val(today);

    // 從伺服器獲取欄位列表以填充 Select
    google.script.run
      .withSuccessHandler(function (fields) {
        const $selects = $("#SecField1, #SecField2, #SecField3, #SecField4");
        fields.forEach((f) => {
          $selects.append($("<option>", { value: f.id, text: f.name }));
        });
        loadPreviewData();
      })
      .getFieldList();
  }

  function loadPreviewData() {
    const lotto = $("#SecLotto").val();
    const date = $("#INDate").val();
    const $container = $("#AeraAllData");

    $container.html(
      '<div class="text-center p-2"><div class="spinner-border spinner-border-sm text-info"></div> 讀取中...</div>',
    );

    google.script.run
      .withSuccessHandler(function (data) {
        if (!data) {
          $container.html(
            '<span class="text-muted">此日期無可用環境參數。</span>',
          );
          return;
        }
        let html = '<div class="row row-cols-2 row-cols-md-4 g-2 small">';

        // 處理 null 或 undefined，避免顯示 "nullnull"
        const dayG = data.dayG || "";
        const dayZ = data.dayZ || "";
        const gz = dayG || dayZ ? `${dayG}${dayZ}` : "無";

        const items = [
          { label: "日干支", val: gz },
          { label: "日形", val: data.fiveElements },
          { label: "日星", val: data.dayStar },
          { label: "本命", val: data.lifePalace },
        ];
        items.forEach((it) => {
          html += `<div class="col"><strong>${it.label}:</strong> <span class="text-primary">${it.val || "無"}</span></div>`;
        });
        html += "</div>";
        $container.html(html);
      })
      .getDatePreview(lotto, date);
  }

  /**
   * 動態獲取托牌組合並填充下拉選單
   */
  function updateNextCombos() {
    const isNext = $("#chkNext").is(":checked");
    if (!isNext) return;

    const $comboSelect = $("#SecNextCombo"),
      $speSelect = $("#SecNextSpe");
    const params = {
      lotto: $("#SecLotto").val(),
      date: $("#INDate").val(),
      fieldMode: $("#chkField").is(":checked"),
      fields: [
        $("#SecField1").val(),
        $("#SecField2").val(),
        $("#SecField3").val(),
        $("#SecField4").val(),
      ].filter((v) => v),
      nextNums: parseInt($("#SecNextNums").val()) || 1,
      nextStep: parseInt($("#SecNextStep").val()) || 1,
    };

    if (!params.date) return;

    $comboSelect.html("<option>計算組合中...</option>").prop("disabled", true);
    $speSelect.prop("disabled", true);

    google.script.run
      .withSuccessHandler(function (res) {
        $comboSelect.prop("disabled", false);
        if (!res || !res.strNextNums) {
          $comboSelect.html('<option value="all">此條件下無匹配組合</option>');
          return;
        }

        const combinations = res.strNextNums.split("|");
        const spe = res.StrNextNumSpe;
        let html = "";

        combinations.forEach((combo) => {
          // 將 # 轉為逗號顯示，組合則保留 # 格式供過濾邏輯使用
          let label = combo.replace(/#/g, ", ");
          html += `<option value="${combo}">${label}</option>`;
        });

        $comboSelect.html(html);

        // 填充特別號選單 (若有)
        if (spe) {
          $speSelect
            .html(`<option value="${spe}">${spe}</option>`)
            .prop("disabled", false);
        } else {
          $speSelect
            .html('<option value="">--</option>')
            .prop("disabled", true);
        }
      })
      .withFailureHandler(function () {
        $comboSelect
          .html('<option value="all">獲取失敗</option>')
          .prop("disabled", false);
      })
      .getNextComboOptions(params);
  }

  function startGalaxySearch() {
    const date = $("#INDate").val();
    if (!date) {
      Swal.fire({ icon: "warning", title: "請選擇預測日期", text: "日期欄位不可為空" });
      return;
    }
    const nextMode = $("#chkNext").is(":checked");
    const rangeMode = $("#chkRange").is(":checked");
    const fieldMode = $("#chkField").is(":checked");

    const params = {
      lotto: $("#SecLotto").val(),
      date: $("#INDate").val(),
      module: $("#SecModules").val(),
      fieldMode: fieldMode,
      fields: fieldMode
        ? [
            $("#SecField1").val(),
            $("#SecField2").val(),
            $("#SecField3").val(),
            $("#SecField4").val(),
          ].filter((v) => v)
        : [],
      nextMode: nextMode,
      nextNums: nextMode ? parseInt($("#SecNextNums").val()) || 0 : 0,
      nextStep: nextMode ? parseInt($("#SecNextStep").val()) || 0 : 0,
      strNextNums: nextMode ? $("#SecNextCombo").val() : "",
      StrNextNumSpe: nextMode ? $("#SecNextSpe").val() : "",
      dataLimit: rangeMode ? parseInt($("#InDataLimit").val()) || 0 : 0,
      dataOffset: rangeMode ? parseInt($("#InDataOffset").val()) || 0 : 0,
      searchLimit: rangeMode ? parseInt($("#InSearchLimit").val()) || 0 : 0,
      searchOffset: rangeMode ? parseInt($("#InSearchOffset").val()) || 0 : 0,
    };

    Swal.fire({
      title: "啟動查詢",
      text: "正在連結星系資料庫...",
      icon: "info",
      showConfirmButton: false,
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading(),
    });

    google.script.run
      .withSuccessHandler(function (res) {
        Swal.close();
        if (res.url) {
          try { sessionStorage.setItem("_missDataParams", JSON.stringify({
            lotto: params.lotto,
            date: params.date,
            methodSN: res.methodSN
          })); } catch(e) {}
          window.open(res.url, "_blank");
        }
      })
      .prepareActivityQuery(params);
  }

  function showDataPreview() {
    const nextMode = $("#chkNext").is(":checked");
    const rangeMode = $("#chkRange").is(":checked");
    const fieldMode = $("#chkField").is(":checked");

    const params = {
      lotto: $("#SecLotto").val(),
      date: $("#INDate").val(),
      fieldMode: fieldMode,
      fields: fieldMode
        ? [
            $("#SecField1").val(),
            $("#SecField2").val(),
            $("#SecField3").val(),
            $("#SecField4").val(),
          ].filter((v) => v)
        : [],
      // 加入其餘參數供除錯面板觀察輸入狀態
      nextMode: nextMode,
      nextNums: nextMode ? parseInt($("#SecNextNums").val()) || 0 : 0,
      nextStep: nextMode ? parseInt($("#SecNextStep").val()) || 0 : 0,
      strNextNums: nextMode ? $("#SecNextCombo").val() : "",
      StrNextNumSpe: nextMode ? $("#SecNextSpe").val() : "",
      dataLimit: rangeMode ? parseInt($("#InDataLimit").val()) || 0 : 0,
      dataOffset: rangeMode ? parseInt($("#InDataOffset").val()) || 0 : 0,
      searchLimit: rangeMode ? parseInt($("#InSearchLimit").val()) || 0 : 0,
      searchOffset: rangeMode ? parseInt($("#InSearchOffset").val()) || 0 : 0,
    };

    if (!params.date) {
      Swal.fire("提醒", "請先選擇日期", "warning");
      return;
    }

    // 自動開啟預覽開關並確保區域顯示
    $("#chkPreview").prop("checked", true);
    $("#AreaTable, #AreaDebug").show();

    // 【除錯】顯示預覽時的 params 內容
    const $debug = $("#AreaDebug");
    $debug
      .html(
        "<strong>[Client-Side Preview params]</strong>\n" +
          JSON.stringify(params, null, 2),
      )
      .show();
    console.log("Debug Preview Params:", params);

    const $tableContainer = $("#AreaTable");
    $tableContainer
      .html(
        '<div class="text-center p-4"><div class="spinner-border text-success"></div><p class="mt-2 text-secondary">正在檢索星系歷史紀錄...</p></div>',
      )
      .show();

    google.script.run
      .withSuccessHandler(function (res) {
        if (res.status === "error") {
          $tableContainer.html(
            '<div class="alert alert-danger">' + res.message + "</div>",
          );
          return;
        }

        // 【除錯】顯示伺服器構造後的內容
        if (res.methodObj) {
          $debug.append(
            "\n\n<strong>[Server-Side methodObj (constructed during preview)]</strong>\n" +
              JSON.stringify(res.methodObj, null, 2),
          );
        }

        if (res.methodSN) {
          $debug.append(
            "\n\n<strong>[Obtained MethodSN]</strong>: " + res.methodSN,
          );
        }

        window._lastPreviewData = res; // 存入全域快取
        renderPreviewTable(res.headers, res.rows, res.methodObj);
      })
      .withFailureHandler(function (err) {
        $tableContainer.html(
          '<div class="alert alert-danger">系統傳輸錯誤: ' +
            err.message +
            "</div>",
        );
      })
      .getPreviewData(params);
  }

  function renderPreviewTable(headers, rows, methodObj) {
    const $container = $("#AreaTable");
    if (!rows || rows.length === 0) {
      $container.html(
        '<div class="alert alert-info text-center">根據目前欄位條件，在此日期前找不到相關紀錄。</div>',
      );
      return;
    }

    // 定義要顯示的關鍵欄位
    const displayFields = [
      "Date",
      "N1",
      "N2",
      "N3",
      "N4",
      "N5",
      "N6",
      "S1",
      "Sum",
    ];

    let html =
      '<div class="d-flex justify-content-between align-items-center mb-2">';
    html += '<div class="section-title mt-0">歷史數據預覽 (最近 20 筆)</div>';

    // 改為顯示目前選中的組合標籤
    if (methodObj && methodObj.NextNumsMode && methodObj.strNextNums) {
      const activeCombo = $("#SecNextCombo option:selected").text();
      const activeSpe = $("#SecNextSpe").val();
      let label = `<i class="bi bi-funnel-fill"></i> 目前選項: ${activeCombo}`;
      if (activeSpe) label += ` [特別號: ${activeSpe}]`;
      html += `<div class="badge bg-info text-dark shadow-sm p-2">${label}</div>`;
    }
    html += "</div>";

    html += '<div id="PreviewTableWrapper">';
    // 移除前端 filterRowsLocally，因為伺服器端已經根據 SecNextCombo 回傳了過濾後的結果
    const activeFilter = $("#SecNextCombo").val() || "all";
    html += renderPreviewTableBody(headers, rows, displayFields, activeFilter);
    html += "</div>";

    $container.html(html);

    // 自動捲動到結果區
    $("html, body").animate({ scrollTop: $container.offset().top - 20 }, 500);
  }

  /**
   * 根據過濾條件篩選行 (前端過濾)
   */
  function filterRowsLocally(headers, rows, filterVal, spe) {
    // 在托牌模式下，表格顯示的是「結果期」，不需要在前端再次過濾「觸發號碼」
    return rows;

    const nIndices = [1, 2, 3, 4, 5, 6]
      .map((i) => headers.indexOf("N" + i))
      .filter((idx) => idx > -1);
    const s1Idx = headers.indexOf("S1");
    const targetNums = filterVal.split("#"); // 修改為 # 以匹配 getNextNumDetail 的產出

    return rows.filter((row) => {
      const rowNums = nIndices.map((idx) => String(row[idx]));
      // 如果不是威力彩，S1 通常也包含在號碼池中
      if (s1Idx > -1 && !spe) {
        rowNums.push(String(row[s1Idx]));
      }

      const isMatch = targetNums.every((num) => rowNums.includes(num));
      if (!isMatch) return false;

      // 如果有特別號限制 (威力彩模式)
      if (spe && s1Idx > -1) {
        return String(row[s1Idx]) === String(spe);
      }
      return true;
    });
  }

  /**
   * 渲染表格主體 HTML
   */
  function renderPreviewTableBody(
    headers,
    rows,
    displayFields,
    activeFilter = "all",
  ) {
    if (!rows || rows.length === 0) {
      return '<div class="alert alert-warning text-center my-2">目前篩選條件下無匹配紀錄。</div>';
    }

    let html = '<div class="table-responsive shadow-sm rounded-3 border">';
    html +=
      '<table class="table table-sm table-hover table-striped bg-white mb-0" style="font-size:0.8rem;">';

    // Header
    html += '<thead class="table-dark"><tr>';
    displayFields.forEach((f) => {
      if (headers.indexOf(f) > -1) {
        const title = getLocalTitle(f);
        html += `<th class="text-center py-2">${title}</th>`;
      }
    });
    html += "</tr></thead>";

    // Body
    html += "<tbody>";
    const targetNums = activeFilter !== "all" ? activeFilter.split("#") : [];

    rows.forEach((row) => {
      html += "<tr>";
      displayFields.forEach((f) => {
        const idx = headers.indexOf(f);
        if (idx > -1) {
          const val = row[idx];
          const valStr = String(val);
          const isNum = f.startsWith("N") || f === "S1";
          const isSum = f === "Sum";

          // 判斷是否為目前選中的托牌號碼
          const isMatch = targetNums.includes(valStr);

          let cellContent = val;
          if (isNum && val && val !== 0) {
            let ballClass = f === "S1" ? "bg-info" : "bg-primary";
            if (activeFilter !== "all" && !isMatch) {
              ballClass = "bg-secondary opacity-50"; // 非目標號碼淡化
            } else if (isMatch) {
              ballClass = f === "S1" ? "bg-warning text-dark" : "bg-danger"; // 目標號碼高亮
            }
            cellContent = `<span class="badge ${ballClass} rounded-pill" style="width:26px; height:26px; line-height:18px;">${val}</span>`;
          } else if (isSum) {
            cellContent = `<strong>${val}</strong>`;
          }

          html += `<td class="text-center align-middle">${cellContent || ""}</td>`;
        }
      });
      html += "</tr>";
    });
    html += "</tbody></table></div>";
    return html;
  }

  function getLocalTitle(fieldName) {
    const mapping = {
      Date: "日期",
      N1: "號1",
      N2: "號2",
      N3: "號3",
      N4: "號4",
      N5: "號5",
      N6: "號6",
      S1: "特1",
      Sum: "總合",
    };
    return mapping[fieldName] || fieldName;
  }
</script>
