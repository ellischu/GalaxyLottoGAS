<script>
  /**
   * Predict 頁面專屬邏輯
   */
  (function ($) {
    $(document).ready(function () {
      // 初始化預測日期為明天
      var d = new Date();
      d.setDate(d.getDate());
      var dateStr =
        d.getFullYear() +
        "-" +
        String(d.getMonth() + 1).padStart(2, "0") +
        "-" +
        String(d.getDate()).padStart(2, "0");
      $("#predictDate").val(dateStr);

      $("#predictButton").click(handlePredict);

      // 初始化顯示模式狀態
      var isDetailed = localStorage.getItem("detailedMode") === "true";
      $("#displayModeToggle").prop("checked", isDetailed);
      updateDetailedToggleUI(isDetailed);

      // 初始化縮放比例
      var savedScale = localStorage.getItem("uiFontScale") || "1.0";
      $("#fontScaleRange").val(savedScale);
      $("#fontScaleValue").text(savedScale + "x");
      updateUIFontScale(savedScale);

      // 綁定縮放滑桿事件
      $("#fontScaleRange").on("input", function () {
        var val = $(this).val();
        $("#fontScaleValue").text(val + "x");
        updateUIFontScale(val);
      });

      // 初始化載入歷史統計
      loadHistoryStats();

      // 監聽推薦數、彩種、遺漏模式與日期變更，即時更新歷史統計圖表
      $("#topNSelect, #lottoSelect, #useTrend, #predictDate").on(
        "change",
        loadHistoryStats,
      );

      // 還原上次清理快取前的備份設定
      var backup = JSON.parse(
        localStorage.getItem("sys_backup_settings") || "{}",
      );
      if (backup.isReloaded) {
        var needsAutoStart = backup.autoStart === true;
        if (backup.lotto) $("#lottoSelect").val(backup.lotto);
        if (backup.date) $("#predictDate").val(backup.date);
        if (backup.useTrend !== undefined)
          $("#useTrend").prop("checked", backup.useTrend);
        if (backup.topN) $("#topNSelect").val(backup.topN);

        AppUI.toast("系統快取已重置", "success");
        localStorage.removeItem("sys_backup_settings");

        // 從首頁「趨勢預測」跳轉過來時自動執行預測
        if (needsAutoStart) setTimeout(handlePredict, 300);
      }

      // --- 核心優化：監聽主題切換並更新圖表顏色 ---
      const themeObserver = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.attributeName === 'data-bs-theme') {
            const newTheme = document.documentElement.getAttribute('data-bs-theme');
            updateChartsTheme(newTheme);
          }
        });
      });
      themeObserver.observe(document.documentElement, { attributes: true });
    });

    /**
     * 根據主題更新圖表顏色配置
     */
    function updateChartsTheme(theme) {
      const isDark = theme === 'dark';
      const gridColor = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.05)';
      const textColor = isDark ? '#adb5bd' : '#6c757d';

      // 更新星雲飽和度：深色模式下提升飽和度 (160%) 以增強科幻感，淺色模式維持 100%
      document.documentElement.style.setProperty("--nebula-sat", isDark ? "160%" : "100%");

      // 核心優化：同步星環霓虹色調與光暈
      document.documentElement.style.setProperty(
        "--ring-color", 
        isDark ? "rgba(0, 210, 255, 0.8)" : "rgba(0, 123, 255, 0.3)"
      );
      document.documentElement.style.setProperty(
        "--ring-glow", 
        isDark ? "0 0 12px rgba(0, 210, 255, 0.6)" : "none"
      );

      const charts = [window.myConfChart, window.myLongTermChart];
      charts.forEach(chart => {
        if (chart && chart.options.scales) {
          Object.values(chart.options.scales).forEach(scale => {
            if (scale.grid) scale.grid.color = gridColor;
            if (scale.ticks) scale.ticks.color = textColor;
          });
          chart.update('none'); // 使用 'none' 模式進行靜默更新，避免觸發進場動畫
        }
      });
    }

    function getThemeAxisConfig() {
      const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
      return {
        gridColor: isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.05)',
        textColor: isDark ? '#adb5bd' : '#6c757d'
      };
    }

    /**
     * 更新詳細模式開關的視覺樣式
     */
    function updateDetailedToggleUI(isDetailed) {
      const $label = $('label[for="displayModeToggle"]');
      if (isDetailed) {
        $label.addClass("detailed-label-active");
      } else {
        $label.removeClass("detailed-label-active");
      }
    }

    /**
     * 更新全域 CSS 變數以縮放字體與球體
     */
    window.updateUIFontScale = function (scale) {
      document.documentElement.style.setProperty("--font-scale", scale);
      localStorage.setItem("uiFontScale", scale);
    };

    /**
     * 清理全域快取並自動重新執行預測
     */
    window.clearCacheAndRetry = function () {
      const lotto = $("#lottoSelect").val();
      AppUI.loading("修復中", "正在清理星系專屬快取並重置環境...");
      google.script.run
        .withSuccessHandler(function (res) {
          AppUI.toast(res.message || "星系快取已清理，重新執行預測", "success");
          // 這裡僅執行 UI 邏輯。
          // 注意：嚴禁在此處 (Callback) 執行 window.open 或涉及導航的動作，
          // 否則會觸發 "Unsafe attempt to initiate navigation" 錯誤。
          handlePredict();
        })
        .withFailureHandler(function(err) {
          AppUI.error("清理失敗", err.message);
        })
        .clearPredictGalaxyCache(lotto);
    };

    /**
     * 處理清理舊版紀錄的 UI 邏輯
     */
    window.handlePurgeOldVersions = function () {
      AppUI.confirm(
        "確定要清理舊版紀錄？",
        "這將移除所有非當前演算法版本的歷史命中快取，並清除重複資料以確保統計圖表準確。",
      ).then(function (result) {
        if (result.isConfirmed) {
          AppUI.loading("清理中", "正在執行星系維護任務...");
          google.script.run
            .withSuccessHandler(function () {
              AppUI.success("清理完成", "舊版冗餘紀錄已成功移除。");
              // 清理後重新載入統計圖表以顯示最新狀態
              if (window.loadHistoryStats) window.loadHistoryStats();
            })
            .withFailureHandler(AppUI.showCommonError.bind(AppUI))
            .maintenance_PurgeOldHistoryVersions();
        }
      });
    };

    /**
     * 處理刷新權重快取的 UI 邏輯
     */
    window.handleClearAIVersionCache = function () {
      var lotto = $("#lottoSelect").val();
      AppUI.confirm(
        "確定刷新權重快取？",
        "這將清除該彩種在 PropertiesService 中的權重暫存，下一次預測將強制重新讀取試算表設定。",
      ).then(function (result) {
        if (result.isConfirmed) {
          AppUI.loading("重置中", "正在清除權重快取...");
          google.script.run
            .withSuccessHandler(function () {
              AppUI.success("重置完成", "權重快取已清除。");
            })
            .withFailureHandler(AppUI.showCommonError.bind(AppUI))
            .clearAIWeightCache(lotto);
        }
      });
    };

    window.handlePredict = function () {
      var lotto = $("#lottoSelect").val();
      var date = $("#predictDate").val();
      var useTrend = $("#useTrend").is(":checked");
      var topN = $("#topNSelect").val();

      if (!lotto || !date) {
        AppUI.toast("請確認彩種與日期是否正確", "warning");
        return;
      }

      // 設定彩種資訊，供錯誤回報工具 AppUI.error 抓取
      window._lastErrorLotto = lotto;

      if (!date) {
        AppUI.error("錯誤", "請選擇預測日期");
        return;
      }

      AppUI.loading("計算中", "正在掃描星系規律並分析相關性...");

      // --- 啟動進度輪詢器：降低頻率至 2.5s 避免阻塞 Message Channel ---
      let isRequestActive = true;
      let progressInterval = setInterval(function () {
        if (!isRequestActive) return;
        google.script.run
          .withSuccessHandler(function (pStr) {
            if (!pStr) return;
            try {
              const p = JSON.parse(pStr);
              // 動態更新 Loading 視窗的文字
              const $title = $(".swal2-title");
              const $content = $("#swal2-html-container");
              if ($title.length) $title.text("計算中 (" + p.percent + "%)");
              if ($content.length) $content.text(p.message);
            } catch (e) {
              console.warn("進度解析失敗", e);
            }
          })
          .getPredictProgress(lotto);
      }, 2500);

      // 實作客戶端逾時處理 (5 分鐘)，避免 GAS 靜默失敗或長時間掛起
      const timeoutId = setTimeout(function () {
        if (isRequestActive) {
          isRequestActive = false;
          clearInterval(progressInterval);
          AppUI.close();
          AppUI.error(
            "連線超時",
            "星系預測執行時間過長 (超過 5 分鐘)，可能是運算量過大或網路異常。",
            null,
            true,
          );
        }
      }, 300000);

      google.script.run
        .withSuccessHandler(function (res) {
          if (!isRequestActive) return;
          isRequestActive = false;
          clearInterval(progressInterval);
          clearTimeout(timeoutId);
          AppUI.close();
          if (!res) {
            AppUI.error(
              "預測失敗",
              "伺服器未回傳有效數據，可能是運算超時或系統異常。",
              null,
              true,
            );
            return;
          }
          if (res.status === "error") {
            if (res.debugInfo) {
              console.error("[Predict Error Debug Info]", res.debugInfo);
            }
            AppUI.error("預測失敗", res.message, res.debugInfo, true);
            return;
          }
          renderAISuggestion(res);
          renderPrediction(res);
        })
        .withFailureHandler(function (err) {
          if (!isRequestActive) return;
          isRequestActive = false;
          clearInterval(progressInterval);
          clearTimeout(timeoutId);
          AppUI.close();

          // 情況 B: GAS 底層錯誤 (如 404, 權限問題, 或腳本編譯錯誤)
          const errMsg = err.message || String(err);
          const isTimeout =
            errMsg.includes("exceeded") || errMsg.includes("deadline");

          AppUI.error(
            isTimeout ? "伺服器運算超時" : "星系連線中斷",
            isTimeout
              ? "運算時間超過 Google 限制。請縮短預測窗口或清理快取。"
              : "GAS 引擎回傳錯誤：" + errMsg,
            { stack: err.stack || "No stack trace available" },
            true,
          );
        })
        .getPrediction(lotto, date, useTrend, topN);
    };

    /**
     * 載入並渲染近 30 期歷史準確度圖表 (受開關控制)
     */
    window.loadHistoryStats = function () {
      var lotto = $("#lottoSelect").val();
      var topN = $("#topNSelect").val();
      var date = $("#predictDate").val();
      var useTrend = $("#useTrend").is(":checked");

      if (!lotto || !date) return; // 避免無效的初始化請求

      // 重置開關狀態：資料未準備好前禁用並關閉
      $("#historyStatsToggle").prop("disabled", true).prop("checked", false);
      $("#historyStatsArea").removeClass("show");
      $("#historyLoadingIcon").removeClass("d-none"); // 顯示旋轉圖示
      $('label[for="historyStatsToggle"]')
        .removeClass("text-success")
        .addClass("text-secondary");

      google.script.run
        .withSuccessHandler(function (data) {
          // 2. 請求成功：隱藏載入圖示
          $("#historyLoadingIcon").addClass("d-none");

          if (data && data.length > 0) {
            initLongTermAccuracyChart(data);
            // 資料準備就緒，啟用開關並變更標籤顏色
            $("#historyStatsToggle").prop("disabled", false);
            $('label[for="historyStatsToggle"]')
              .removeClass("text-secondary")
              .addClass("text-success");
          }
        })
        .withFailureHandler(function (err) {
          // 3. 請求失敗：隱藏圖示並記錄錯誤
          $("#historyLoadingIcon").addClass("d-none");
          console.error("載入歷史統計失敗:", err);
        })
        .get60PeriodHistoryStats(lotto, topN, date, useTrend);
    };

    /**
     * 手動切換歷史統計區域顯示/隱藏
     */
    window.toggleHistoryStats = function (isVisible) {
      if (isVisible) {
        $("#historyStatsArea").addClass("show");
      } else {
        $("#historyStatsArea").removeClass("show");
      }
    };

    /**
     * 手動切換星系震盪儀表顯示/隱藏
     */
    window.toggleGaugeDisplay = function (isVisible) {
      if (isVisible) {
        $("#gaugeArea").slideDown(400, function() {
          // 核心優化：動畫完成後，若已有上次預測的震盪數據，立即重繪圖表
          if (window.lastPredData && window.lastPredData.ampPercentile !== undefined) {
            initOscillationGauge(parseFloat(window.lastPredData.ampPercentile));
          }
        });

        // 核心優化：若開啟儀表但目前沒有預測結果，自動觸發預測以填充數據
        var hasNoData =
          !window.lastPredData || $("#predictionArea").is(":empty");
        if (hasNoData) {
          handlePredict();
        }
      } else {
        $("#gaugeArea").slideUp();
      }
    };

    window.toggleDisplayMode = function (isDetailed) {
      localStorage.setItem("detailedMode", isDetailed);
      updateDetailedToggleUI(isDetailed);
      AppUI.toast(isDetailed ? "切換至詳細分析" : "切換至精簡模式", "info");
      if (window.lastPredData) {
        renderPrediction(window.lastPredData);
        
        // 核心優化：切換至詳細模式時觸發星雲擴張動畫
        if (isDetailed) {
          setTimeout(function() {
            $(".ball").addClass("nebula-expand");
            // 動畫結束後移除類別以便下次觸發
            setTimeout(() => $(".ball").removeClass("nebula-expand"), 800);
          }, 100);
        }
      }
    };

    /**
     * 渲染 AI 智能建議卡片
     */
    window.renderAISuggestion = function (res) {
      var $area = $("#aiSuggestionArea");
      if (!res.aiStrategy) {
        $area.empty();
        return;
      }

      var strategy = res.aiStrategy;
      var isRegimeShift =
        res.learningMode && res.learningMode.includes("規律重組");
      var regimeBadge = isRegimeShift
        ? '<span class="badge anim-pulse-purple ms-2" style="font-size:0.7rem;"><i class="fas fa-sync-alt fa-spin me-1"></i>規律重組擴展模式</span>'
        : "";
      var html =
        '<div class="card border-info shadow-sm bg-light-subtle">' +
        '<div class="card-body">' +
        '<h6 class="fw-bold text-info mb-2"><i class="fas fa-robot me-2"></i>星系戰略分析' +
        regimeBadge +
        "</h6>" +
        '<p class="mb-2 small fw-bold">' +
        strategy.recommendation +
        "</p>" +
        '<div class="d-flex justify-content-between align-items-center">' +
        '<div class="d-flex gap-2">' +
        '<span class="badge bg-info-subtle text-info border border-info-subtle">' +
        strategy.focus +
        "</span>" +
        '<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">風險: ' +
        strategy.risk +
        "</span>" +
        "</div>" +
        (res.cyclicalComparison
          ? '<button class="btn btn-outline-primary btn-sm fw-bold px-3" onclick="showCyclicalDetail()"><i class="fas fa-list-ul me-1"></i>查看週期對比</button>'
          : "") +
        "</div></div></div>";
      $area.html(html).fadeIn();
    };

    window.renderPrediction = function (res) {
      var $area = $("#predictionArea");
      var isDetailed = localStorage.getItem("detailedMode") === "true";

      var html =
        '<div class="card border-primary shadow mb-3">' +
        '<div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">' +
        '<span class="fw-bold"><i class="fas fa-magic me-2"></i>AI 星球預測結果</span>' +
        "<div>" +
        (res.useTrend
          ? '<span class="badge badge-miss-mode bg-warning text-dark me-2" title="已套用遺漏表加權分析"><i class="fas fa-temperature-high me-1"></i>遺漏模式</span>'
          : "") +
        '<span class="badge bg-light text-primary">' +
        res.date +
        "</span>" +
        "</div>" +
        "</div>" +
        '<div class="card-body">';

      // 如果是強制繞過快取，顯示醒目標籤
      if (res.bypassCache) {
        html += `
          <div class="text-center mb-3"><span class="badge rounded-pill bg-danger anim-pulse"><i class="fas fa-bolt me-1"></i> 即時運算中 (Bypass Cache)</span></div>`;
      }

      // 顯示異常警示
      if (res.isSevereAnomaly) {
        html += `
          <div class="alert alert-danger border-danger shadow mb-3 anim-shake">
            <i class="fas fa-exclamation-circle me-2"></i><strong>嚴重警告：</strong> 星系軌道極度紊亂！當前數據偏差值過高 (${res.date})，AI 預測可能完全失準，建議僅供參考。
          </div>`;
      } else if (res.isDeviated) {
        html += `
          <div class="alert alert-warning border-warning shadow-sm mb-3 small">
            <i class="fas fa-exclamation-triangle me-2"></i><strong>數據異常：</strong> 當前日期係數與歷史常態偏差過大。
          </div>`;
      }

      // 顯示命中結果 (如果該日期已有開獎)
      if (res.actualDraw) {
        // 特別號顯示邏輯
        let s1Html = res.actualS1
          ? ` <span class="badge ${res.isS1Hit ? "bg-s1 animate-glow-s1" : "bg-secondary-subtle text-secondary"} border ms-1" style="font-size:0.8rem;">S: ${res.actualS1}</span>`
          : "";

        html += `
          <div class="alert alert-success py-2 px-3 mb-3 text-center border-2 d-flex flex-column align-items-center ${res.isS1Hit ? "border-success" : ""}">
            <div class="small mb-1">當日開獎：<strong>${res.actualDraw.join(", ")}</strong>${s1Html}</div>`;

        let starHtml = "";
        for (let i = 0; i < res.maxStars; i++) {
          if (i < res.profitStars) {
            starHtml += '<i class="fas fa-star text-warning me-1"></i>'; // 實心金星
          } else {
            starHtml += '<i class="far fa-star text-muted me-1"></i>'; // 空心星
          }
        }
        html += `
            <div class="fw-bold text-success">獲利星等：${starHtml} (${res.profitStars} / ${res.maxStars})</div>
          </div>`;
      }

      // 渲染球體
      html += '<div class="d-flex flex-wrap justify-content-center">';
      res.results.forEach(function (item) {
        // 修正：伺服器回傳的是補零字串，直接比對字串即可
        var isHit = res.actualDraw && res.actualDraw.includes(item.number);
        var isS1Hit = res.actualS1 && item.number === res.actualS1;

        // 五行類別標籤
        var elementBadge =
          '<span class="badge badge-element ' +
          item.elementColor +
          ' position-absolute top-0 start-0 translate-middle" style="z-index:1; font-size:0.7rem; margin-top:-5px; margin-left: 10px;">' +
          item.elementCategory +
          "</span>";

        var repeatBadge = item.isRepeat
          ? '<span class="badge bg-dark position-absolute top-0 end-0 translate-middle" style="z-index:1; font-size:0.8rem; margin-top:-5px; margin-right: 10px;">連莊</span>'
          : "";
        var skipBadge = item.isSkip
          ? '<span class="badge bg-info text-dark position-absolute start-50 translate-middle-x" style="z-index:1; font-size:0.8rem; bottom: calc(1.8rem * var(--font-scale));">隔期</span>'
          : "";
        var penaltyIcon = item.isHeatPenalized
          ? '<i class="fas fa-balance-scale-right penalty-icon position-absolute" onclick="showHeatPenaltyDetail(\'' +
            item.number +
            '\')" title="AI 偵測到過熱，點擊查看詳情"></i>'
          : "";

        html +=
          '<div class="text-center m-2" style="position: relative;">' +
          (isHit || isS1Hit
            ? '<span class="badge badge-hit-glitter position-absolute top-0 start-50 translate-middle-x" style="z-index:2; font-size:0.8rem; margin-top:-15px;"><i class="fas fa-check"></i> ' +
              (isS1Hit ? "中特" : "命中") +
              "</span>"
            : "") +
          elementBadge + // 將 elementBadge 移到這裡，作為獨立的 span
          '<span class="badge ' +
          item.statusColor +
          ' mb-1" style="font-size: 0.8rem;">' +
          item.status +
          "</span>" +
          repeatBadge +
          skipBadge +
          penaltyIcon +
          '<div class="ball ' +
          (item.isPotentialCold ? "anim-twinkle" : "") +
          " " +
          (isHit ? "ball-hit-gold" : "") +
          (isS1Hit ? " bg-s1 animate-glow-s1" : "") +
          '">' +
          item.number +
          "</div>" +
          '<div class="small text-muted mt-1">' +
          item.probability +
          "</div>" +
          "</div>";
      });
      html += "</div>";

      // 詳細模式下的額外分析圖表
      if (isDetailed && res.confidenceHistory) {
        html += `
          <div class="mt-4 pt-3 border-top">
            <h6 class="text-center mb-2 fw-bold text-secondary small"><i class="fas fa-chart-line me-2"></i>AI 捕捉信心指數趨勢 (近 10 期)</h6>
            <div class="chart-legend-container d-flex flex-wrap justify-content-center gap-2 mb-2">
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkRepeat" checked onclick="updateChartVisibility(0, this.checked)">
                <label class="form-check-label" for="chkRepeat" style="border-color: #ff512f;">連莊</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkSkip" checked onclick="updateChartVisibility(1, this.checked)">
                <label class="form-check-label" for="chkSkip" style="border-color: #11998e;">核心隔期</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkSkipExt" checked onclick="updateChartVisibility(2, this.checked)">
                <label class="form-check-label" for="chkSkipExt" style="border-color: #11998e; border-style: dashed;">擴展隔期</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkConsec" checked onclick="updateChartVisibility(3, this.checked)">
                <label class="form-check-label" for="chkConsec" style="border-color: #8e44ad;">連號</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkRare" checked onclick="updateChartVisibility(4, this.checked)">
                <label class="form-check-label" for="chkRare" style="border-color: #00d2ff;">冷門</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkTail" checked onclick="updateChartVisibility(5, this.checked)">
                <label class="form-check-label" for="chkTail" style="border-color: #e67e22;">尾數</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkSum" checked onclick="updateChartVisibility(6, this.checked)">
                <label class="form-check-label" for="chkSum" style="border-color: #1abc9c;">和值</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkAvg" checked onclick="updateChartVisibility(7, this.checked)">
                <label class="form-check-label" for="chkAvg" style="border-color: #6c757d;">平均</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkHeat" checked onclick="updateChartVisibility(8, this.checked)">
                <label class="form-check-label" for="chkHeat" style="border-color: #e74c3c;">星系過熱</label>
              </div>
            </div>
            <canvas id="confidenceChart" style="max-height: 180px;"></canvas>
          </div>`;
      }

      // 顯示 AI 洞察
      if (res.learningInsights) {
        html += `
          <div class="alert alert-info py-2 px-3 mt-3 mb-0 shadow-sm small">
            <i class="fas fa-brain me-2"></i><strong>AI 學習：</strong> ${res.learningMode}<br/>
            <i class="fas fa-lightbulb me-2 text-warning"></i><strong>關鍵指標：</strong> ${res.learningInsights.join("、")}
          </div>`;
      }

      // 詳細模式：相似度列表
      if (isDetailed && res.top3Matches) {
        html += `
          <div class="mt-4 pt-3 border-top">
            <h6 class="text-center mb-3 fw-bold text-secondary small"><i class="fas fa-project-diagram me-2"></i>核心相似星系路徑</h6>
            <div class="list-group list-group-flush">`;
        res.top3Matches.forEach(function (m, idx) {
          html += `
            <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center small" onclick="showCoeffCompare(${idx})">
              <span><i class="fas fa-calendar-day me-2 text-muted"></i>${m.date}</span>
              <span class="badge bg-info rounded-pill">${(m.score * 100).toFixed(2)} 星值</span>
            </button>`;
        });
        html += `</div></div>`;
      }

      html += `</div></div>`;

      $area.html(html).slideDown();
      window.lastPredData = res; // 暫存資料供比對視窗使用
      if (isDetailed && res.confidenceHistory) {
        initConfidenceChart(res.confidenceHistory);
      }
      if (res.ampPercentile !== undefined) {
        initOscillationGauge(parseFloat(res.ampPercentile));
      }
    };

    window.updateChartVisibility = function (index, visible) {
      if (window.myConfChart) {
        window.myConfChart.setDatasetVisibility(index, visible);
        window.myConfChart.update();
      }
      // 更新標籤視覺狀態：當取消勾選（隱藏指標）時，讓標籤變淡（半透明）
      var $label = $(".chart-legend-container .form-check")
        .eq(index)
        .find(".form-check-label");
      $label.css("opacity", visible ? "1" : "0.35");
    };

    /**
     * 初始化星系震盪儀表盤
     */
    window.initOscillationGauge = function (percentile) {
      var canvas = document.getElementById("oscillationGauge");
      if (!canvas) return;
      var ctx = canvas.getContext("2d");
      if (window.myGaugeChart) window.myGaugeChart.destroy();

      // 根據百分比決定顏色
      let color = "#36a2eb"; // 平穩 (Blue)
      if (percentile > 85)
        color = "#ff6384"; // 極端 (Red)
      else if (percentile > 70)
        color = "#ff9f40"; // 警戒 (Orange)
      else if (percentile > 40) color = "#4bc0c0"; // 正常 (Green)

      // 修正：同步更新儀表下方的文字數值顯示
      $("#gaugeValue").text(percentile + "%");

      window.myGaugeChart = new Chart(ctx, {
        type: "doughnut",
        data: {
          datasets: [
            {
              data: [percentile, 100 - percentile],
              backgroundColor: [color, "#e9ecef"],
              borderWidth: 0,
              circumference: 180,
              rotation: 270,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 1800, // 延長動畫時間，讓彈跳過程更為平滑且明顯
            easing: "easeOutBounce", // 核心：啟用物理回彈效果
          },
          cutout: "75%",
          plugins: { tooltip: { enabled: false }, legend: { display: false } },
          layout: { padding: { bottom: 10, left: 5, right: 5 } },
        },
      });
    };

    /**
     * 初始化信心指數折線圖
     */
    window.initConfidenceChart = function (history) {
      var ctx = document.getElementById("confidenceChart").getContext("2d");
      if (window.myConfChart) window.myConfChart.destroy();
      const themeColors = getThemeAxisConfig();

      window.myConfChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: history.map(function (h) {
            return h.label;
          }),
          datasets: [
            {
              label: "連莊捕捉",
              data: history.map(function (h) {
                return h.repeat;
              }),
              borderColor: "#ff512f",
              backgroundColor: "#ff512f33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "核心隔期",
              data: history.map(function (h) {
                return h.skipCore;
              }),
              borderColor: "#11998e",
              backgroundColor: "#11998e33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "擴展隔期",
              data: history.map(function (h) {
                return h.skipExt;
              }),
              borderColor: "#11998e",
              backgroundColor: "#11998e33",
              borderDash: [3, 3], // 使用虛線代表擴展指標
              tension: 0.3,
              fill: false,
            },
            {
              label: "連號捕捉",
              data: history.map(function (h) {
                return h.consec || 0;
              }),
              borderColor: "#8e44ad",
              backgroundColor: "#8e44ad33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "稀有捕捉",
              data: history.map(function (h) {
                return h.rare;
              }),
              borderColor: "#00d2ff",
              backgroundColor: "#00d2ff33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "尾數捕捉",
              data: history.map(function (h) {
                return h.tail || 0;
              }),
              borderColor: "#e67e22",
              backgroundColor: "#e67e2233",
              tension: 0.3,
              fill: false,
            },
            {
              label: "和值穩定",
              data: history.map((h) => h.sum || 0),
              borderColor: "#1abc9c",
              backgroundColor: "#1abc9c33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "平均信心",
              data: history.map((h) =>
                Math.round(
                  (h.repeat +
                    h.skipCore +
                    h.skipExt +
                    (h.consec || 0) +
                    h.rare +
                    (h.tail || 0) +
                    (h.sum || 0)) /
                    7,
                ),
              ),
              borderColor: "#6c757d",
              backgroundColor: "#6c757d33",
              borderDash: [5, 5], // 設置為虛線以區分特定指標
              borderWidth: 2,
              tension: 0.3,
              fill: false,
            },
            {
              label: "過熱預警",
              data: history.map((h) => (h.heatPenalty || 0) * 10), // 放大 10 倍以便在 0-100 軸上觀察
              borderColor: "#e74c3c",
              backgroundColor: "#e74c3c22",
              pointStyle: "triangle",
              pointRadius: 6,
              borderWidth: 2,
              tension: 0.1,
              fill: false,
            },
          ],
        },
        options: {
          responsive: true,
          devicePixelRatio: window.devicePixelRatio || 2, // 優化 Retina 渲染
          maintainAspectRatio: false,
          animations: {
            // 核心優化：資料點進場漂浮動畫
            y: {
              easing: 'easeOutQuart',
              duration: 2000,
              from: function(ctx) {
                return ctx.chart.scales.y.getPixelForValue(0); // 從 0 線向上升起
              }
            },
            radius: {
              duration: 1200,
              from: 0,
              to: 4,
              easing: 'easeOutBack' // 帶點回彈感的縮放
            }
          },
          layout: { padding: { top: 5, bottom: 5, left: 0, right: 10 } },
          onClick: function (e, elements) {
            if (elements.length > 0) {
              var idx = elements[0].index;
              var h = history[idx];
              if (h && h.coeffs) {
                // 點擊折線圖上的點，觸發係數比對
                window.showCoeffCompare(null, {
                  date: h.fullDate,
                  coeffs: h.coeffs,
                });
              }
            }
          },
          onHover: function (e, el) {
            // 游標移入資料點時切換手型
            e.native.target.style.cursor = el[0] ? "pointer" : "default";
          },
          plugins: {
            legend: {
              labels: { boxWidth: 16, font: { size: 16 }, padding: 12 },
            },
          },
          scales: {
            y: {
              min: 0,
              max: 100,
              grid: { color: themeColors.gridColor },
              ticks: {
                color: themeColors.textColor,
                font: { size: 16 },
                callback: function (v) {
                  return v + "%";
                },
              },
            },
            x: { 
              grid: { color: themeColors.gridColor },
              ticks: { color: themeColors.textColor, font: { size: 16 } } 
            },
          },
        },
      });
    };

    /**
     * 顯示係數比對視窗
     * @param {number} matchIdx 索引 (來自 top3Matches)
     * @param {Object} customMatch 自定義比對資料 (來自圖表點擊)
     */
    window.showCoeffCompare = function (matchIdx, customMatch) {
      customMatch = customMatch || null;
      var res = window.lastPredData;
      var match = customMatch || res.top3Matches[matchIdx];
      var headers = res.allDataHeaders;
      var target = res.targetCoeffs;
      var historical = match.coeffs;
      var perturbationFactors =
        (res.aiStrategy && res.aiStrategy.perturbationFactors) || [];

      let table = `
        <div class="table-responsive">
          <table class="table table-sm table-hover small">
            <thead class="table-light">
              <tr><th>係數名稱</th><th>目標值</th><th>歷史值</th><th>數值差異</th><th>Z-Score</th><th>百分比差異</th></tr>
            </thead>
            <tbody>`;
      headers.forEach(function (h, i) {
        const mappedName = res.fieldMapping ? res.fieldMapping[h] : null;
        const title = mappedName || h;
        const suggestion = res.unmappedFieldSuggestions
          ? res.unmappedFieldSuggestions[h]
          : null;
        const titleHtml = suggestion
          ? `${title} <i class="fas fa-lightbulb text-warning ms-1" title="發現孤兒欄位！建議修正為：${suggestion.id} (${suggestion.name})，相似度 ${suggestion.similarity}%" style="cursor:help;"></i>`
          : title;

        const rawV1 = String(target[i]);
        const rawV2 = String(historical[i]);

        // 轉換數值 ID 為人性化標籤 (加上背景顏色)
        const mappedV1 = res.valueMapping ? res.valueMapping[rawV1] : null;
        const mappedV2 = res.valueMapping ? res.valueMapping[rawV2] : null;

        const displayV1 = mappedV1
          ? `<span class="badge bg-primary-subtle text-primary border border-primary-subtle">${mappedV1}</span>`
          : rawV1;
        const displayV2 = mappedV2
          ? `<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">${mappedV2}</span>`
          : rawV2;

        const v1 = parseFloat(rawV1);
        const v2 = parseFloat(rawV2);
        let diffVal = (v1 - v2).toFixed(2);
        let zScoreDisplay = "0.00";
        let pctDiff = "0%";
        let bgStyle = "";
        let trStyleClass = ""; // 修正：確保變數在此作用域內已初始化
        let animClass = "";

        if (isNaN(v1) || isNaN(v2)) {
          diffVal = '<span class="text-muted small">無數據</span>';
          zScoreDisplay = "-";
          pctDiff = "N/A";
        } else if (v2 !== 0) {
          const pct = ((v1 - v2) / Math.abs(v2)) * 100;
          pctDiff = (pct > 0 ? "+" : "") + pct.toFixed(1) + "%";
          const alpha = Math.min(0.4, Math.abs(pct) / 200);
          bgStyle = `background-color: rgba(${pct > 0 ? "255,0,0" : "0,0,255"}, ${alpha})`;

          // 計算 Z-Score: (加權後的絕對差異) / 系統標準差
          if (res.stdDev) {
            const weight = res.learnedEffArr ? res.learnedEffArr[i] : 1.0;
            const zScore = (Math.abs(v1 - v2) * weight) / res.stdDev;
            zScoreDisplay = zScore.toFixed(2);

            // 核心優化：根據 Z-Score 高亮整行，提升異常數據辨識度
            if (zScore >= 3.0) {
              trStyleClass = "table-danger"; // 極端異常高亮
              zScoreDisplay = `<span class="text-danger fw-bold">${zScoreDisplay} <i class="fas fa-bolt"></i></span>`;
            } else if (zScore >= 2.0) {
              trStyleClass = "table-warning"; // 顯著異常高亮
              zScoreDisplay = `<span class="text-warning fw-bold">${zScoreDisplay}</span>`;
            }
          }

          if (res.isDeviated && Math.abs(pct) >= 100) {
            animClass = "anim-pulse d-inline-block fw-bold";
          }
        }

        if (!trStyleClass && perturbationFactors.includes(title)) {
          trStyleClass = "table-warning";
        }

        table +=
          '<tr class="' +
          trStyleClass +
          '">' +
          "<td>" +
          titleHtml +
          "</td>" +
          "<td>" +
          displayV1 +
          "</td>" +
          "<td>" +
          displayV2 +
          "</td>" +
          '<td class="' +
          (v1 - v2 === 0 ? "text-success fw-bold" : "") +
          '">' +
          diffVal +
          "</td>" +
          '<td class="text-center">' +
          zScoreDisplay +
          "</td>" +
          '<td style="' +
          bgStyle +
          '"><span class="' +
          animClass +
          '">' +
          pctDiff +
          "</span></td>" +
          "</tr>";
      });
      table += `</tbody></table></div>`;

      AppUI.alertLarge(`星系比對: ${match.date}`, table);

      // 核心優化：開啟比對視窗時，同步觸發主界面星球的擴張動畫，增強分析連動感
      setTimeout(function() {
        $(".ball").addClass("nebula-expand");
        // 動畫結束後移除，以便下次點擊或其他動作觸發
        setTimeout(() => $(".ball").removeClass("nebula-expand"), 800);
      }, 300);
    };

    /**
     * 顯示週期性指標 (九星/星宿) 的詳細對比視窗
     */
    window.showCyclicalDetail = function () {
      var res = window.lastPredData;
      if (!res || !res.cyclicalComparison) {
        AppUI.toast("暫無週期對比數據", "info");
        return;
      }

      let html = `
        <div class="table-responsive">
          <table class="table table-bordered table-sm small">
            <thead class="table-light">
              <tr><th>指標名稱</th><th>目標日</th><th>歷史匹配日</th></tr>
            </thead>
            <tbody>`;

      res.cyclicalComparison.forEach((m) => {
        html += `<tr><td colspan="3" class="bg-primary-subtle text-primary text-center fw-bold">${m.date} (歷史高相似期)</td></tr>`;
        m.details.forEach((d) => {
          const rowClass = d.isMatch ? "comp-match" : "comp-mismatch";
          html += `
            <tr class="${rowClass}">
              <td>${d.name}</td>
              <td>${d.target}</td>
              <td>${d.match} ${d.isMatch ? '<i class="fas fa-check-circle text-success ms-1"></i>' : ""}</td>
            </tr>`;
        });
      });

      html += `</tbody></table></div>`;

      AppUI.alertHtml(
        '<i class="fas fa-sync-alt me-2"></i>週期共振明細對比',
        html,
        "550px",
      );
    };

    /**
     * 初始化 60 期長期準確度圖表
     */
    function initLongTermAccuracyChart(history) {
      var ctx = document
        .getElementById("longTermAccuracyChart")
        .getContext("2d");
      if (window.myLongTermChart) window.myLongTermChart.destroy();
      const themeColors = getThemeAxisConfig();

      window.myLongTermChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: history.map((h) => h.date),
          datasets: [
            {
              label: "命中數",
              data: history.map((h) => h.hits),
              // 核心優化：區分模式顏色。橘色: 含遺漏分析, 藍色: 純頻率分析
              backgroundColor: history.map((h) =>
                h.useTrend
                  ? "rgba(255, 159, 64, 0.7)"
                  : "rgba(54, 162, 235, 0.7)",
              ),
              borderColor: history.map((h) =>
                h.useTrend ? "rgba(255, 159, 64, 1)" : "rgba(54, 162, 235, 1)",
              ),
              borderWidth: 1,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: "top",
              labels: {
                boxWidth: 12,
                font: { size: 11 },
                generateLabels: function (chart) {
                  return [
                    {
                      text: "含遺漏分析",
                      fillStyle: "rgba(255, 159, 64, 0.7)",
                      strokeStyle: "rgba(255, 159, 64, 1)",
                    },
                    {
                      text: "純頻率分析",
                      fillStyle: "rgba(54, 162, 235, 0.7)",
                      strokeStyle: "rgba(54, 162, 235, 1)",
                    },
                  ];
                },
              },
            },
            tooltip: {
              mode: "index",
              intersect: false,
              callbacks: {
                afterLabel: function (context) {
                  var item = history[context.dataIndex];
                  return (
                    "分析模式: " + (item.useTrend ? "含遺漏分析" : "純頻率分析")
                  );
                },
              },
            },
          },
          onClick: function (e, elements) {
            if (elements.length > 0) {
              var idx = elements[0].index;
              var h = history[idx];
              if (h.hitNumbers && h.hitNumbers.length > 0) {
                AppUI.alertHtml(
                  '<i class="fas fa-trophy text-warning me-2"></i>命中詳情 (' +
                    h.date +
                    ")",
                  '<div class="text-center">該期命中號碼：<br>' +
                    '<h3 class="text-success mt-2 fw-bold">' +
                    h.hitNumbers.join(", ") +
                    "</h3>" +
                    '<p class="text-muted small mt-2">共命中 ' +
                    h.hits +
                    " 顆球</p></div>",
                  "400px",
                );
              } else {
                AppUI.toast(
                  "該期命中 " +
                    h.hits +
                    " 顆球" +
                    (h.hits > 0 ? " (無詳細號碼資料)" : ""),
                  "info",
                );
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: themeColors.gridColor },
              ticks: { color: themeColors.textColor, stepSize: 1, font: { size: 10 } },
            },
            x: {
              grid: { display: false }, // 柱狀圖通常隱藏垂直格線較美觀
              ticks: { color: themeColors.textColor, font: { size: 9 }, maxRotation: 45, minRotation: 45 },
            },
          },
        },
      });
    }

    /**
     * 顯示星球過熱懲罰詳情
     */
    window.showHeatPenaltyDetail = function (num) {
      AppUI.alertHtml(
        '<i class="fas fa-fire-alt text-danger me-2"></i>星系過熱預警',
        '<div class="text-start">' +
          '<p>星球代號：<strong class="text-primary">' +
          num +
          "</strong></p>" +
          "<p>偵測結果：AI 偵測到該星球在近期軌道中出現頻率極高，機率值已觸發<strong>「過熱臨界點」</strong>。</p>" +
          "<p>系統處理：為了維持星系分佈平衡，模型已自動施加<strong>「重力穩定權重」</strong>進行降權，以防止預測結果過度傾斜於極熱號碼。</p>" +
          '<p class="text-muted small">* 戰略建議：過熱號碼雖然能量強，但隨之而來的「冷卻期」風險也較高，建議搭配潛力號碼進行佈局。</p>' +
          "</div>",
        "450px",
      );
    };
  })(jQuery);
</script>
