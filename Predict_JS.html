<script>
  /**
   * Predict 頁面專屬邏輯
   */
  (function ($) {
    $(document).ready(function () {
      // 初始化預測日期為明天
      var d = new Date();
      d.setDate(d.getDate());
      var dateStr =
        d.getFullYear() +
        "-" +
        String(d.getMonth() + 1).padStart(2, "0") +
        "-" +
        String(d.getDate()).padStart(2, "0");
      $("#predictDate").val(dateStr);

      $("#predictButton").click(handlePredict);

      // 初始化顯示模式狀態
      var isDetailed = localStorage.getItem("detailedMode") === "true";
      $("#displayModeToggle").prop("checked", isDetailed);
      updateDetailedToggleUI(isDetailed);

      // 初始化縮放比例
      var savedScale = localStorage.getItem("uiFontScale") || "1.0";
      $("#fontScaleRange").val(savedScale);
      $("#fontScaleValue").text(savedScale + "x");
      updateUIFontScale(savedScale);

      // 綁定縮放滑桿事件
      $("#fontScaleRange").on("input", function () {
        var val = $(this).val();
        $("#fontScaleValue").text(val + "x");
        updateUIFontScale(val);
      });

      // 還原上次清理快取前的備份設定
      var backup = JSON.parse(
        localStorage.getItem("sys_backup_settings") || "{}",
      );
      if (backup.isReloaded) {
        if (backup.lotto) $("#lottoSelect").val(backup.lotto);
        if (backup.date) $("#predictDate").val(backup.date);
        if (backup.useTrend !== undefined)
          $("#useTrend").prop("checked", backup.useTrend);
        if (backup.topN) $("#topNSelect").val(backup.topN);

        AppUI.toast("系統快取已重置", "success");
        localStorage.removeItem("sys_backup_settings");
      }
    });

    /**
     * 更新詳細模式開關的視覺樣式
     */
    function updateDetailedToggleUI(isDetailed) {
      const $label = $('label[for="displayModeToggle"]');
      if (isDetailed) {
        $label.addClass("detailed-label-active");
      } else {
        $label.removeClass("detailed-label-active");
      }
    }

    /**
     * 更新全域 CSS 變數以縮放字體與球體
     */
    window.updateUIFontScale = function (scale) {
      document.documentElement.style.setProperty("--font-scale", scale);
      localStorage.setItem("uiFontScale", scale);
    };

    /**
     * 清理全域快取並自動重新執行預測
     */
    window.clearCacheAndRetry = function () {
      AppUI.loading("修復中", "正在清理系統快取並重置環境...");
      google.script.run
        .withSuccessHandler(function () {
          AppUI.toast("快取已清理，重新執行預測", "success");
          // 呼叫原本的預測流程
          handlePredict();
        })
        .clearAllCache(false);
    };

    window.handlePredict = function () {
      var lotto = $("#lottoSelect").val();
      var date = $("#predictDate").val();
      var useTrend = $("#useTrend").is(":checked");
      var topN = $("#topNSelect").val();

      if (!date) {
        AppUI.error("錯誤", "請選擇預測日期");
        return;
      }

      AppUI.loading("計算中", "正在掃描星系規律並分析相關性...");

      google.script.run
        .withSuccessHandler(function (res) {
          AppUI.close();
          if (!res) {
            AppUI.error(
              "預測失敗",
              "伺服器未回傳有效數據，可能是運算超時或系統異常。",
              null,
              true,
            );
            return;
          }
          if (res.status === "error") {
            if (res.debugInfo) {
              console.error("[Predict Error Debug Info]", res.debugInfo);
            }
            AppUI.error("預測失敗", res.message, res.debugInfo, true);
            return;
          }
          renderAISuggestion(res);
          renderPrediction(res);
        })
        .withFailureHandler(AppUI.showCommonError.bind(AppUI))
        .getPrediction(lotto, date, useTrend, topN);
    };

    window.toggleDisplayMode = function (isDetailed) {
      localStorage.setItem("detailedMode", isDetailed);
      updateDetailedToggleUI(isDetailed);
      AppUI.toast(isDetailed ? "切換至詳細分析" : "切換至精簡模式", "info");
      if (window.lastPredData) {
        renderPrediction(window.lastPredData);
      }
    };

    /**
     * 渲染 AI 智能建議卡片
     */
    window.renderAISuggestion = function (res) {
      var $area = $("#aiSuggestionArea");
      if (!res.aiStrategy) {
        $area.empty();
        return;
      }

      var strategy = res.aiStrategy;
      var isRegimeShift =
        res.learningMode && res.learningMode.includes("規律重組");
      var regimeBadge = isRegimeShift
        ? '<span class="badge anim-pulse-purple ms-2" style="font-size:0.7rem;"><i class="fas fa-sync-alt fa-spin me-1"></i>規律重組擴展模式</span>'
        : "";
      var html =
        '<div class="card border-info shadow-sm bg-light-subtle">' +
        '<div class="card-body">' +
        '<h6 class="fw-bold text-info mb-2"><i class="fas fa-robot me-2"></i>星系戰略分析' +
        regimeBadge +
        "</h6>" +
        '<p class="mb-2 small fw-bold text-dark">' +
        strategy.recommendation +
        "</p>" +
        '<div class="d-flex justify-content-between align-items-center">' +
        '<div class="d-flex gap-2">' +
        '<span class="badge bg-info-subtle text-info border border-info-subtle">' +
        strategy.focus +
        "</span>" +
        '<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">風險: ' +
        strategy.risk +
        "</span>" +
        "</div>" +
        (res.cyclicalComparison
          ? '<button class="btn btn-outline-primary btn-sm fw-bold px-3" onclick="showCyclicalDetail()"><i class="fas fa-list-ul me-1"></i>查看週期對比</button>'
          : "") +
        "</div></div></div>";
      $area.html(html).fadeIn();
    };

    window.renderPrediction = function (res) {
      var $area = $("#predictionArea");
      var isDetailed = localStorage.getItem("detailedMode") === "true";

      var html =
        '<div class="card border-primary shadow mb-3">' +
        '<div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">' +
        '<span class="fw-bold"><i class="fas fa-magic me-2"></i>AI 星球預測結果</span>' +
        '<span class="badge bg-light text-primary">' +
        res.date +
        "</span>" +
        "</div>" +
        '<div class="card-body">';

      // 如果是強制繞過快取，顯示醒目標籤
      if (res.bypassCache) {
        html += `
          <div class="text-center mb-3"><span class="badge rounded-pill bg-danger anim-pulse"><i class="fas fa-bolt me-1"></i> 即時運算中 (Bypass Cache)</span></div>`;
      }

      // 顯示異常警示
      if (res.isSevereAnomaly) {
        html += `
          <div class="alert alert-danger border-danger shadow mb-3 anim-shake">
            <i class="fas fa-exclamation-circle me-2"></i><strong>嚴重警告：</strong> 星系軌道極度紊亂！當前數據偏差值過高 (${res.date})，AI 預測可能完全失準，建議僅供參考。
          </div>`;
      } else if (res.isDeviated) {
        html += `
          <div class="alert alert-warning border-warning shadow-sm mb-3 small">
            <i class="fas fa-exclamation-triangle me-2"></i><strong>數據異常：</strong> 當前日期係數與歷史常態偏差過大。
          </div>`;
      }

      // 顯示命中結果 (如果該日期已有開獎)
      if (res.actualDraw) {
        html += `
          <div class="alert alert-success py-2 px-3 mb-3 text-center border-2">
            <div class="small mb-1">當日開獎：<strong>${res.actualDraw.join(", ")}</strong></div>
            <div class="fw-bold text-success">獲利星等：${res.profitStars} / ${res.maxStars}</div>
          </div>`;
      }

      // 渲染球體
      html += '<div class="d-flex flex-wrap justify-content-center">';
      res.results.forEach(function (item) {
        var isHit =
          res.actualDraw && res.actualDraw.includes(Number(item.number));
        var repeatBadge = item.isRepeat
          ? '<span class="badge bg-dark position-absolute top-0 start-50 translate-middle-x" style="z-index:1; font-size:0.8rem; margin-top:-5px;">連莊</span>'
          : "";
        var skipBadge = item.isSkip
          ? '<span class="badge bg-info text-dark position-absolute start-50 translate-middle-x" style="z-index:1; font-size:0.8rem; bottom: calc(1.8rem * var(--font-scale));">隔期</span>'
          : "";
        var penaltyIcon = item.isHeatPenalized
          ? '<i class="fas fa-balance-scale-right penalty-icon position-absolute" onclick="showHeatPenaltyDetail(' +
            item.number +
            ')" title="AI 偵測到過熱，點擊查看詳情"></i>'
          : "";

        html +=
          '<div class="text-center m-2" style="position: relative;">' +
          (isHit
            ? '<span class="badge badge-hit-glitter position-absolute top-0 start-50 translate-middle-x" style="z-index:2; font-size:0.8rem; margin-top:-15px;"><i class="fas fa-check"></i> 命中</span>'
            : "") +
          '<span class="badge ' +
          item.statusColor +
          ' mb-1" style="font-size: 0.8rem;">' +
          item.status +
          "</span>" +
          repeatBadge +
          skipBadge +
          penaltyIcon +
          '<div class="ball ' +
          (item.isPotentialCold ? "anim-twinkle" : "") +
          " " +
          (isHit ? "ball-hit-gold" : "") +
          '">' +
          item.number +
          "</div>" +
          '<div class="small text-muted mt-1">' +
          item.probability +
          "</div>" +
          "</div>";
      });
      html += "</div>";

      // 詳細模式下的額外分析圖表
      if (isDetailed && res.confidenceHistory) {
        html += `
          <div class="mt-4 pt-3 border-top">
            <h6 class="text-center mb-2 fw-bold text-secondary small"><i class="fas fa-chart-line me-2"></i>AI 捕捉信心指數趨勢 (近 10 期)</h6>
            <div class="chart-legend-container d-flex flex-wrap justify-content-center gap-2 mb-2">
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkRepeat" checked onclick="updateChartVisibility(0, this.checked)">
                <label class="form-check-label" for="chkRepeat" style="border-color: #ff512f;">連莊</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkSkip" checked onclick="updateChartVisibility(1, this.checked)">
                <label class="form-check-label" for="chkSkip" style="border-color: #11998e;">核心隔期</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkSkipExt" checked onclick="updateChartVisibility(2, this.checked)">
                <label class="form-check-label" for="chkSkipExt" style="border-color: #11998e; border-style: dashed;">擴展隔期</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkConsec" checked onclick="updateChartVisibility(3, this.checked)">
                <label class="form-check-label" for="chkConsec" style="border-color: #8e44ad;">連號</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkRare" checked onclick="updateChartVisibility(4, this.checked)">
                <label class="form-check-label" for="chkRare" style="border-color: #00d2ff;">冷門</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkTail" checked onclick="updateChartVisibility(5, this.checked)">
                <label class="form-check-label" for="chkTail" style="border-color: #e67e22;">尾數</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkSum" checked onclick="updateChartVisibility(6, this.checked)">
                <label class="form-check-label" for="chkSum" style="border-color: #1abc9c;">和值</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkAvg" checked onclick="updateChartVisibility(7, this.checked)">
                <label class="form-check-label" for="chkAvg" style="border-color: #6c757d;">平均</label>
              </div>
            </div>
            <canvas id="confidenceChart" style="max-height: 180px;"></canvas>
          </div>

          <div class="mt-4 pt-3 border-top">
            <h6 class="text-center mb-3 fw-bold text-secondary small"><i class="fas fa-bullseye me-2"></i>歷史預測準確度統計 (命中球數)</h6>
            <canvas id="accuracyChart" style="max-height: 150px;"></canvas>
          </div>`;
      }

      // 顯示 AI 洞察
      if (res.learningInsights) {
        html += `
          <div class="alert alert-info py-2 px-3 mt-3 mb-0 shadow-sm small">
            <i class="fas fa-brain me-2"></i><strong>AI 學習：</strong> ${res.learningMode}<br/>
            <i class="fas fa-lightbulb me-2 text-warning"></i><strong>關鍵指標：</strong> ${res.learningInsights.join("、")}
          </div>`;
      }

      // 詳細模式：相似度列表
      if (isDetailed && res.top3Matches) {
        html += `
          <div class="mt-4 pt-3 border-top">
            <h6 class="text-center mb-3 fw-bold text-secondary small"><i class="fas fa-project-diagram me-2"></i>核心相似星系路徑</h6>
            <div class="list-group list-group-flush">`;
        res.top3Matches.forEach(function (m, idx) {
          html += `
            <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center small" onclick="showCoeffCompare(${idx})">
              <span><i class="fas fa-calendar-day me-2 text-muted"></i>${m.date}</span>
              <span class="badge bg-info rounded-pill">${(m.score * 100).toFixed(2)} 星值</span>
            </button>`;
        });
        html += `</div></div>`;
      }

      html += `</div></div>`;

      $area.html(html).slideDown();
      window.lastPredData = res; // 暫存資料供比對視窗使用
      if (isDetailed && res.confidenceHistory) {
        initConfidenceChart(res.confidenceHistory);
        initAccuracyChart(res.confidenceHistory);
      }
      if (res.ampPercentile !== undefined) {
        initOscillationGauge(parseFloat(res.ampPercentile));
      }
    };

    window.updateChartVisibility = function (index, visible) {
      if (window.myConfChart) {
        window.myConfChart.setDatasetVisibility(index, visible);
        window.myConfChart.update();
      }
      // 更新標籤視覺狀態：當取消勾選（隱藏指標）時，讓標籤變淡（半透明）
      var $label = $(".chart-legend-container .form-check")
        .eq(index)
        .find(".form-check-label");
      $label.css("opacity", visible ? "1" : "0.35");
    };

    /**
     * 初始化星系震盪儀表盤
     */
    window.initOscillationGauge = function (percentile) {
      var canvas = document.getElementById("oscillationGauge");
      if (!canvas) return;
      var ctx = canvas.getContext("2d");
      if (window.myGaugeChart) window.myGaugeChart.destroy();

      // 根據百分比決定顏色
      let color = "#36a2eb"; // 平穩 (Blue)
      if (percentile > 85)
        color = "#ff6384"; // 極端 (Red)
      else if (percentile > 70)
        color = "#ff9f40"; // 警戒 (Orange)
      else if (percentile > 40) color = "#4bc0c0"; // 正常 (Green)

      window.myGaugeChart = new Chart(ctx, {
        type: "doughnut",
        data: {
          datasets: [
            {
              data: [percentile, 100 - percentile],
              backgroundColor: [color, "#e9ecef"],
              borderWidth: 0,
              circumference: 180,
              rotation: 270,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: "75%",
          plugins: {
            tooltip: { enabled: false },
            legend: { display: false },
          },
          layout: {
            padding: {
              bottom: 10,
              left: 5,
              right: 5,
            },
          },
        },
      });
    };

    /**
     * 初始化信心指數折線圖
     */
    window.initConfidenceChart = function (history) {
      var ctx = document.getElementById("confidenceChart").getContext("2d");
      if (window.myConfChart) window.myConfChart.destroy();

      window.myConfChart = new Chart(ctx, {
        type: "line",
        data: {
          labels: history.map(function (h) {
            return h.label;
          }),
          datasets: [
            {
              label: "連莊捕捉",
              data: history.map(function (h) {
                return h.repeat;
              }),
              borderColor: "#ff512f",
              backgroundColor: "#ff512f33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "核心隔期",
              data: history.map(function (h) {
                return h.skipCore;
              }),
              borderColor: "#11998e",
              backgroundColor: "#11998e33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "擴展隔期",
              data: history.map(function (h) {
                return h.skipExt;
              }),
              borderColor: "#11998e",
              backgroundColor: "#11998e33",
              borderDash: [3, 3], // 使用虛線代表擴展指標
              tension: 0.3,
              fill: false,
            },
            {
              label: "連號捕捉",
              data: history.map(function (h) {
                return h.consec || 0;
              }),
              borderColor: "#8e44ad",
              backgroundColor: "#8e44ad33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "稀有捕捉",
              data: history.map(function (h) {
                return h.rare;
              }),
              borderColor: "#00d2ff",
              backgroundColor: "#00d2ff33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "尾數捕捉",
              data: history.map(function (h) {
                return h.tail || 0;
              }),
              borderColor: "#e67e22",
              backgroundColor: "#e67e2233",
              tension: 0.3,
              fill: false,
            },
            {
              label: "和值穩定",
              data: history.map((h) => h.sum || 0),
              borderColor: "#1abc9c",
              backgroundColor: "#1abc9c33",
              tension: 0.3,
              fill: false,
            },
            {
              label: "平均信心",
              data: history.map((h) =>
                Math.round(
                  (h.repeat +
                    h.skipCore +
                    h.skipExt +
                    (h.consec || 0) +
                    h.rare +
                    (h.tail || 0) +
                    (h.sum || 0)) /
                    7,
                ),
              ),
              borderColor: "#6c757d",
              backgroundColor: "#6c757d33",
              borderDash: [5, 5], // 設置為虛線以區分特定指標
              borderWidth: 2,
              tension: 0.3,
              fill: false,
            },
          ],
        },
        options: {
          responsive: true,
          devicePixelRatio: window.devicePixelRatio || 2, // 優化 Retina 渲染
          maintainAspectRatio: false,
          layout: {
            padding: {
              top: 5,
              bottom: 5,
              left: 0,
              right: 10,
            },
          },
          onClick: function (e, elements) {
            if (elements.length > 0) {
              var idx = elements[0].index;
              var h = history[idx];
              if (h && h.coeffs) {
                // 點擊折線圖上的點，觸發係數比對
                window.showCoeffCompare(null, {
                  date: h.fullDate,
                  coeffs: h.coeffs,
                });
              }
            }
          },
          onHover: function (e, el) {
            // 游標移入資料點時切換手型
            e.native.target.style.cursor = el[0] ? "pointer" : "default";
          },
          plugins: {
            legend: {
              labels: { boxWidth: 16, font: { size: 16 }, padding: 12 },
            },
          },
          scales: {
            y: {
              min: 0,
              max: 100,
              ticks: {
                font: { size: 16 },
                callback: function (v) {
                  return v + "%";
                },
              },
            },
            x: { ticks: { font: { size: 16 } } },
          },
        },
      });
    };

    /**
     * 初始化準確度(命中率)柱狀圖
     */
    window.initAccuracyChart = (history) => {
      var ctx = document.getElementById("accuracyChart").getContext("2d");
      if (window.myAccChart) window.myAccChart.destroy();

      window.myAccChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: history.map((h) => h.label),
          datasets: [
            {
              label: "命中球數",
              data: history.map((h) => h.hits),
              backgroundColor: history.map((h) =>
                h.hits >= 2 ? "#38ef7d" : "#ffc107",
              ),
              borderRadius: 4,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: {
            padding: {
              top: 5,
              bottom: 5,
              left: 0,
              right: 5,
            },
          },
          onClick: function (e, elements) {
            if (elements.length > 0) {
              var idx = elements[0].index;
              var h = history[idx];
              if (h.hitNumbers && h.hitNumbers.length > 0) {
                AppUI.alertHtml(
                  `<i class="fas fa-trophy text-warning me-2"></i>命中詳情 (${h.label})`,
                  `<div class="text-center">該期命中號碼：<br><h3 class="text-success mt-2 fw-bold">${h.hitNumbers.join(", ")}</h3><p class="text-muted small mt-2">共命中 ${h.hits} 顆球</p></div>`,
                );
              } else {
                AppUI.toast("該期未命中任何預測號碼", "info");
              }
            }
          },
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1, font: { size: 16 } },
            },
            x: { ticks: { font: { size: 16 } } },
          },
        },
      });
    };

    /**
     * 顯示係數比對視窗
     * @param {number} matchIdx 索引 (來自 top3Matches)
     * @param {Object} customMatch 自定義比對資料 (來自圖表點擊)
     */
    window.showCoeffCompare = function (matchIdx, customMatch) {
      customMatch = customMatch || null;
      var res = window.lastPredData;
      var match = customMatch || res.top3Matches[matchIdx];
      var headers = res.allDataHeaders;
      var target = res.targetCoeffs;
      var historical = match.coeffs;
      var perturbationFactors =
        (res.aiStrategy && res.aiStrategy.perturbationFactors) || [];

      let table = `
        <div class="table-responsive">
          <table class="table table-sm table-hover small">
            <thead class="table-light">
              <tr><th>係數名稱</th><th>目標值</th><th>歷史值</th><th>數值差異</th><th>Z-Score</th><th>百分比差異</th></tr>
            </thead>
            <tbody>`;
      headers.forEach(function (h, i) {
        const mappedName = res.fieldMapping ? res.fieldMapping[h] : null;
        const title = mappedName || h;
        const suggestion = res.unmappedFieldSuggestions
          ? res.unmappedFieldSuggestions[h]
          : null;
        const titleHtml = suggestion
          ? `${title} <i class="fas fa-lightbulb text-warning ms-1" title="發現孤兒欄位！建議修正為：${suggestion.id} (${suggestion.name})，相似度 ${suggestion.similarity}%" style="cursor:help;"></i>`
          : title;

        const rawV1 = String(target[i]);
        const rawV2 = String(historical[i]);

        // 轉換數值 ID 為人性化標籤 (加上背景顏色)
        const mappedV1 = res.valueMapping ? res.valueMapping[rawV1] : null;
        const mappedV2 = res.valueMapping ? res.valueMapping[rawV2] : null;

        const displayV1 = mappedV1
          ? `<span class="badge bg-primary-subtle text-primary border border-primary-subtle">${mappedV1}</span>`
          : rawV1;
        const displayV2 = mappedV2
          ? `<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">${mappedV2}</span>`
          : rawV2;

        const v1 = parseFloat(rawV1);
        const v2 = parseFloat(rawV2);
        let diffVal = (v1 - v2).toFixed(2);
        let zScoreDisplay = "0.00";
        let pctDiff = "0%";
        let bgStyle = "";
        let rowClass = "";
        let animClass = "";

        if (isNaN(v1) || isNaN(v2)) {
          diffVal = '<span class="text-muted small">無數據</span>';
          zScoreDisplay = "-";
          pctDiff = "N/A";
        } else if (v2 !== 0) {
          const pct = ((v1 - v2) / Math.abs(v2)) * 100;
          pctDiff = (pct > 0 ? "+" : "") + pct.toFixed(1) + "%";
          const alpha = Math.min(0.4, Math.abs(pct) / 200);
          bgStyle = `background-color: rgba(${pct > 0 ? "255,0,0" : "0,0,255"}, ${alpha})`;

          // 計算 Z-Score: (加權後的絕對差異) / 系統標準差
          if (res.stdDev) {
            const weight = res.learnedEffArr ? res.learnedEffArr[i] : 1.0;
            const zScore = (Math.abs(v1 - v2) * weight) / res.stdDev;
            zScoreDisplay = zScore.toFixed(2);

            // 根據 Z-Score 強度給予顏色暗示 (Z > 3 通常視為極端異常)
            if (zScore >= 3.0)
              zScoreDisplay = `<span class="text-danger fw-bold">${zScoreDisplay} <i class="fas fa-bolt"></i></span>`;
            else if (zScore >= 2.0)
              zScoreDisplay = `<span class="text-warning fw-bold">${zScoreDisplay}</span>`;
          }

          if (res.isDeviated && Math.abs(pct) >= 100) {
            animClass = "anim-pulse d-inline-block fw-bold";
          }
        }

        if (perturbationFactors.includes(title)) {
          rowClass = "table-warning"; // 使用 Bootstrap 的警告色來高亮整行
        }

        table += `<tr class="${rowClass}">
          <td>${titleHtml}</td>
          <td>${displayV1}</td>
          <td>${displayV2}</td>
          <td class="${v1 - v2 === 0 ? "text-success fw-bold" : ""}">${diffVal}</td>
          <td class="text-center">${zScoreDisplay}</td>
          <td style="${bgStyle}"><span class="${animClass}">${pctDiff}</span></td>
        </tr>`;
      });
      table += `</tbody></table></div>`;

      AppUI.alertLarge(`星系比對: ${match.date}`, table);
    };

    /**
     * 顯示週期性指標 (九星/星宿) 的詳細對比視窗
     */
    window.showCyclicalDetail = function () {
      var res = window.lastPredData;
      if (!res || !res.cyclicalComparison) {
        AppUI.toast("暫無週期對比數據", "info");
        return;
      }

      let html = `
        <div class="table-responsive">
          <table class="table table-bordered table-sm small">
            <thead class="table-light">
              <tr><th>指標名稱</th><th>目標日</th><th>歷史匹配日</th></tr>
            </thead>
            <tbody>`;

      res.cyclicalComparison.forEach((m) => {
        html += `<tr><td colspan="3" class="bg-primary-subtle text-primary text-center fw-bold">${m.date} (歷史高相似期)</td></tr>`;
        m.details.forEach((d) => {
          const rowClass = d.isMatch ? "comp-match" : "comp-mismatch";
          html += `
            <tr class="${rowClass}">
              <td>${d.name}</td>
              <td>${d.target}</td>
              <td>${d.match} ${d.isMatch ? '<i class="fas fa-check-circle text-success ms-1"></i>' : ""}</td>
            </tr>`;
        });
      });

      html += `</tbody></table></div>`;

      AppUI.alertHtml(
        '<i class="fas fa-sync-alt me-2"></i>週期共振明細對比',
        html,
        "550px",
      );
    };
  })(jQuery);
</script>
