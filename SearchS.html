<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  </head>
  <body>
    <?!= includeNav(); ?>

    <div class="container mt-4">
      <div class="card config-card">
        <div class="card-body p-4">
          <h4 class="text-center mb-4 text-primary">
            <i class="bi bi-gear-fill"></i> 星系預測參數設定
          </h4>

          <!-- 基礎設定區 -->
          <div class="section-title">基礎設定</div>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="INDate" class="form-label">預測日期</label>
              <input type="date" class="form-control" id="INDate" />
            </div>
            <div class="col-md-6">
              <label for="SecLotto" class="form-label">選擇彩種</label>
              <select class="form-select" id="SecLotto">
                <option value="L539" selected>今彩 539</option>
                <option value="L649">大樂透</option>
                <option value="L638">威力彩</option>
                <option value="LSix">六合彩</option>
              </select>
            </div>
          </div>

          <!-- 日期詳細資料預覽區 -->
          <div
            id="AeraAllData"
            class="mt-4 p-3 bg-body-tertiary rounded border border-info-subtle shadow-sm"
          >
            <small class="text-muted">請選擇日期以載入詳細環境參數...</small>
          </div>

          <hr class="my-4" />

          <!-- 進階開關控制 -->
          <div class="row text-center mb-4">
            <div class="col-6 col-md-3">
              <div class="form-switch form-check d-inline-block">
                <input class="form-check-input" type="checkbox" id="chkField" />
                <label class="form-check-label d-block" for="chkField"
                  >欄位設定</label
                >
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="form-switch form-check d-inline-block">
                <input class="form-check-input" type="checkbox" id="chkNext" />
                <label class="form-check-label d-block" for="chkNext"
                  >托牌模式</label
                >
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="form-switch form-check d-inline-block">
                <input class="form-check-input" type="checkbox" id="chkRange" />
                <label class="form-check-label d-block" for="chkRange"
                  >資料範圍</label
                >
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="form-switch form-check d-inline-block">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="chkPreview"
                  checked
                />
                <label class="form-check-label d-block" for="chkPreview"
                  >顯示預覽</label
                >
              </div>
            </div>
          </div>

          <!-- 欄位選擇區 -->
          <div
            id="AreaField"
            class="hidden-area p-3 border rounded mb-3 bg-body-tertiary"
          >
            <h6 class="text-secondary mb-3">關鍵欄位比對設定</h6>
            <div class="row g-2">
              <div class="col-6 col-md-3">
                <select id="SecField1" class="form-select form-select-sm">
                  <option value="">-- 欄位 1 --</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <select id="SecField2" class="form-select form-select-sm">
                  <option value="">-- 欄位 2 --</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <select id="SecField3" class="form-select form-select-sm">
                  <option value="">-- 欄位 3 --</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <select id="SecField4" class="form-select form-select-sm">
                  <option value="">-- 欄位 4 --</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 托牌選擇區 -->
          <div
            id="AreaNext"
            class="hidden-area p-3 border rounded mb-3 bg-body-tertiary"
          >
            <h6 class="text-secondary mb-3">托牌分析參數</h6>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label small">星數選擇</label>
                <select id="SecNextNums" class="form-select">
                  <option value="1">1 星</option>
                  <option value="2">2 星</option>
                  <option value="3">3 星</option>
                  <option value="4">4 星</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label small">間隔期數</label>
                <select id="SecNextStep" class="form-select">
                  <option value="1">1 期</option>
                  <option value="2">2 期</option>
                  <option value="3">3 期</option>
                  <option value="4">4 期</option>
                  <option value="5">5 期</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 資料設定區 -->
          <div
            id="AreaRange"
            class="hidden-area p-3 border rounded mb-3 bg-body-tertiary"
          >
            <h6 class="text-secondary mb-3">資料查詢限制</h6>
            <div class="row g-3">
              <div class="col-6 col-md-3">
                <label class="small">資料數量</label>
                <input
                  type="number"
                  id="InDataLimit"
                  class="form-control"
                  placeholder="100"
                  value="0"
                />
              </div>
              <div class="col-6 col-md-3">
                <label class="small">資料偏移量</label>
                <input
                  type="number"
                  id="InDataOffset"
                  class="form-control"
                  placeholder="0"
                  value="0"
                />
              </div>
              <div class="col-6 col-md-3">
                <label class="small">搜尋數量</label>
                <input
                  type="number"
                  id="InSearchLimit"
                  class="form-control"
                  placeholder="10"
                  value="0"
                />
              </div>
              <div class="col-6 col-md-3">
                <label class="small">搜尋偏移量</label>
                <input
                  type="number"
                  id="InSearchOffset"
                  class="form-control"
                  placeholder="0"
                  value="0"
                />
              </div>
            </div>
          </div>

          <!-- 模組與執行 -->
          <div class="section-title mt-4">預測核心</div>
          <div class="row g-3">
            <div class="col-md-12">
              <select class="form-select" id="SecModules">
                <option value="Activity" selected>星系活性模組</option>
              </select>
            </div>
            <div class="col-md-12 mt-4">
              <div class="d-flex gap-2">
                <button
                  type="button"
                  id="btnQuery"
                  class="btn btn-outline-primary btn-lg flex-grow-1 shadow-sm"
                >
                  <i class="bi bi-search"></i> 啟動星系查詢
                </button>
                <button
                  type="button"
                  id="btnPreview"
                  class="btn btn-outline-success btn-lg flex-grow-1 shadow-sm"
                >
                  <i class="bi bi-eye"></i> 預覽資料
                </button>
              </div>
            </div>

            <!-- 結果資料區 (預覽用) -->
            <div class="col-md-12 mt-3">
              <div id="AreaTable" class="mt-2" style="display: none"></div>
            </div>

            <!-- 偵錯顯示區 (除錯完後移除) -->
            <div class="col-md-12 mt-3">
              <div
                id="AreaDebug"
                class="debug-panel"
                style="display: none"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 載入必要 JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    include("Lib_Swal") ?> <?!= include('Scripts'); ?> <?!=
    HtmlService.createHtmlOutputFromFile('SearchS_JS').getContent(); ?> <?!=
    includeFooter(); ?>
  </body>
</html>
