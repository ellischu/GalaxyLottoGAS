<!doctype html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"

    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  </head>
  <body>
    <?!= includeNav(); ?>
    <div class="container main-container">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="text-center header-text">AI 智慧預測系統 V1</h5>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label label-text">日期</label>
              <input
                type="date"
                id="predDate"
                class="form-control label-text"
              />
            </div>
            <div class="col-md-4">
              <label class="form-label label-text">選擇彩種</label>
              <select id="lottoType" class="form-select label-text">
                <option value="L539">今彩 539</option>
                <option value="L649">大樂透 649</option>
                <option value="L638">威力彩 638</option>
                <option value="LSix">六合彩</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label label-text">推薦數量</label>
              <select id="topN" class="form-select label-text">
                <option value="10">10 個</option>
                <option value="7">精選 7 顆</option>
                <option value="5">嚴選 5 顆</option>
              </select>
            </div>
          </div>

          <div class="d-grid mt-4">
            <button
              id="predictBtnV1"
              class="btn btn-primary label-text text-white py-3 shadow-sm btn-prediction-v1"
              onclick="runPrediction()"
            >
              <i class="fas fa-satellite-dish me-2"></i> 啟動智慧預測掃描
            </button>
          </div>

          <!-- 進度條容器 -->
          <div id="progressContainer" class="d-none mt-3">
            <div class="progress" style="height: 12px">
              <div
                id="predictionProgressBar"
                class="progress-bar progress-bar-striped progress-bar-animated bg-info"
                role="progressbar"
                style="width: 0%"
              ></div>
            </div>
            <div
              id="progressMessage"
              class="text-center small mt-1 text-muted fw-bold"
            >
              準備掃描...
            </div>
          </div>

          <!-- 科技感控制面板 -->
          <div class="tech-panel mt-3">
            <div class="row g-3">
              <div class="col-4">
                <div class="form-switch form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="useTrend"
                    checked
                  />
                  <label class="form-check-label small fw-bold" for="useTrend"
                    >遺漏趨勢</label
                  >
                </div>
              </div>
              <div class="col-4">
                <div class="form-switch form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="displayModeToggle"
                    onchange="toggleDisplayMode(this.checked)"
                  />
                  <label
                    class="form-check-label small fw-bold text-primary"
                    for="displayModeToggle"
                    >詳細分析</label
                  >
                </div>
              </div>
              <div class="col-4">
                <div class="form-switch form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="historyToggle"
                    onchange="toggleHistoryStats(this.checked)"
                    disabled
                  />
                  <label
                    class="form-check-label small fw-bold text-success"
                    for="historyToggle"
                  >
                    <i class="fas fa-chart-line me-1"></i>歷史趨勢 (回測)
                    <i
                      id="historyLoadingIcon"
                      class="fas fa-spinner fa-spin ms-1 text-primary d-none"
                    ></i>
                  </label>
                </div>
              </div>
              <div class="col-4">
                <div class="form-switch form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="weightPanelToggle"
                    onchange="toggleWeightPanel(this.checked)"
                  />
                  <label
                    class="form-check-label small fw-bold text-info"
                    for="weightPanelToggle"
                    >權重部署</label
                  >
                </div>
              </div>

              <div class="col-12 border-top pt-2 mt-2">
                <div class="d-flex justify-content-between gap-2">
                  <button
                    id="themeToggleBtn"
                    class="btn btn-sm btn-outline-secondary flex-grow-1 fw-bold"
                    onclick="window.toggleTheme()"
                  >
                    <i class="fas fa-moon me-1"></i> 深色模式
                  </button>
                  <button
                    class="btn btn-sm btn-outline-info flex-grow-1 fw-bold"
                    onclick="showAIWeights()"
                    title="查看學習權重"
                  >
                    <i class="fas fa-brain me-1"></i> 查看權重
                  </button>
                  <button
                    class="btn btn-sm btn-outline-danger flex-grow-1 fw-bold"
                    onclick="clearCacheAndRetry()"
                    title="清理快取"
                  >
                    <i class="fas fa-broom me-1"></i> 清理快取
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 權重戰略面板 (新增) -->
      <div id="weightStrategyPanel" class="mb-4 d-none">
        <div
          class="card border-primary shadow-sm"
          style="border-radius: 12px; overflow: hidden"
        >
          <div class="card-header bg-primary text-white small fw-bold py-2">
            <i class="fas fa-chess-board me-2"></i>當前星系權重戰略部署
          </div>
          <div
            id="weightPanelBody"
            class="card-body py-2 bg-light-subtle"
          ></div>
        </div>
      </div>

      <!-- AI 智能建議區 (比照 Predict.html) -->
      <div id="aiSuggestionArea" class="mb-4"></div>

      <div id="resultArea" class="mb-4"></div>

      <!-- 快取資訊顯示區 (新增) -->
      <div id="cacheInfoContainer"></div>

      <div class="card shadow-sm mt-4 mb-5 d-none" id="historyCard">
        <div
          class="card-header bg-dark text-white d-flex justify-content-between align-items-center"
        >
          <span><i class="fas fa-chart-area me-2"></i>歷史命中趨勢 (回測)</span>
          <select
            id="historyPeriod"
            class="form-select form-select-sm w-auto bg-dark text-white border-secondary"
            style="font-size: 0.8rem"
          >
            <option value="10">近 10 期</option>
            <option value="20">近 20 期</option>
            <option value="30" selected>近 30 期</option>
            <option value="50">近 50 期</option>
          </select>
        </div>
        <div class="card-body">
          <canvas id="historyChart" style="width: 100%; height: 300px"></canvas>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

    includeFooter(); ?>
  </body>
</html>
