  <body>
    <?!= includeNav(); ?>
    <div class="container main-container">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="text-center header-text">AI 智慧預測系統 V1</h5>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label label-text">日期</label>
              <input
                type="date"
                id="predDate"
                class="form-control label-text"
              />
            </div>
            <div class="col-md-4">
              <label class="form-label label-text">選擇彩種</label>
              <select id="lottoType" class="form-select label-text">
                <option value="L539">今彩 539</option>
                <option value="L649">大樂透 649</option>
                <option value="L638">威力彩 638</option>
                <option value="LSix">六合彩</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label label-text">推薦數量</label>
              <select id="topN" class="form-select label-text">
                <option value="10">10 個</option>
                <option value="7">精選 7 顆</option>
                <option value="5">嚴選 5 顆</option>
              </select>
            </div>
            <div class="col-md-6 mt-2">
              <div class="form-check form-switch">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="useTrend"
                  checked
                />
                <label class="form-check-label label-text" for="useTrend">
                  <i class="fas fa-temperature-high me-1"></i>考慮冷熱權重趨勢
                </label>
              </div>
            </div>
            <div class="col-md-6 mt-2">
              <div class="form-check form-switch">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="displayModeToggle"
                  onchange="toggleDisplayMode(this.checked)"
                />
                <label
                  class="form-check-label label-text fw-bold text-primary"
                  for="displayModeToggle"
                >
                  <i class="fas fa-eye me-1"></i>詳細分析模式
                </label>
              </div>
            </div>
          </div>

          <!-- 縮放比例控制區 (同步首頁邏輯) -->
          <div class="row mt-3">
            <div class="col-12">
              <div
                class="d-flex align-items-center gap-3 bg-light-subtle p-2 rounded border"
              >
                <label
                  class="form-label label-text mb-0 small"
                  style="white-space: nowrap"
                  ><i class="fas fa-search-plus me-1"></i>介面縮放</label
                >
                <input
                  type="range"
                  class="form-range"
                  id="fontScaleRange"
                  min="0.8"
                  max="1.5"
                  step="0.1"
                  value="1.0"
                />
                <span id="fontScaleValue" class="badge bg-primary">1.0x</span>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button
              class="btn btn-primary flex-grow-1 label-text text-white"
              onclick="runPrediction()"
            >
              <i class="fas fa-search me-2"></i> 開始智慧預測
            </button>
            <button
              class="btn btn-outline-info label-text px-3"
              onclick="showAIWeights()"
              title="查看 AI 學習權重"
            >
              <i class="fas fa-brain"></i>
            </button>
            <button
              class="btn btn-outline-danger label-text px-3"
              onclick="clearCacheAndRetry()"
              title="清除全域快取並手動重新計算"
            >
              <i class="fas fa-broom"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- AI 智能建議區 (比照 Predict.html) -->
      <div id="aiSuggestionArea" class="mb-4"></div>

      <div id="resultArea" class="mb-4"></div>

      <div class="card shadow-sm mt-4 mb-5 d-none" id="historyCard">
        <div class="card-header bg-dark text-white">
          <i class="fas fa-chart-area me-2"></i>歷史 10 期命中趨勢 (回測)
        </div>
        <div class="card-body">
          <canvas id="historyChart" style="width: 100%; height: 300px"></canvas>
        </div>
      </div>
