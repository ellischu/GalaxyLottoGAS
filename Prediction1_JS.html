<script>
  let historyChart = null;
  let bsChart = null; // 大小平衡圖
  let oeChart = null; // 奇偶平衡圖
  window.lastResult = null;

  $(document).ready(function () {
    // 初始化預測日期為今日
    var d = new Date();
    var dateStr =
      d.getFullYear() +
      "-" +
      String(d.getMonth() + 1).padStart(2, "0") +
      "-" +
      String(d.getDate()).padStart(2, "0");
    $("#predDate").val(dateStr);

    // 初始化顯示模式狀態
    var isDetailed = localStorage.getItem("detailedMode") === "true";
    $("#displayModeToggle").prop("checked", isDetailed);
    updateDetailedToggleUI(isDetailed);

    // 初始化縮放比例滑桿
    var savedScale = localStorage.getItem("uiFontScale") || "1.0";
    $("#fontScaleRange").val(savedScale);
    $("#fontScaleValue").text(savedScale + "x");
    updateUIFontScale(savedScale);

    // 監聽滑桿即時調整大小
    $("#fontScaleRange").on("input", function () {
      var val = $(this).val();
      $("#fontScaleValue").text(val + "x");
      updateUIFontScale(val);
    });
  });

  /**
   * 更新全域 CSS 變數以縮放字體與球體
   */
  function updateUIFontScale(scale) {
    document.documentElement.style.setProperty("--font-scale", scale);
    localStorage.setItem("uiFontScale", scale);
  }

  window.toggleDisplayMode = function (isDetailed) {
    localStorage.setItem("detailedMode", isDetailed);
    updateDetailedToggleUI(isDetailed);
    AppUI.toast(isDetailed ? "切換至詳細分析" : "切換至精簡模式", "info");

    if (window.lastResult) {
      renderResults(window.lastResult);
    }

    // 當開啟詳細模式時，自動捲動至 AI 戰略分析區
    if (isDetailed) {
      setTimeout(function () {
        $("html, body").animate(
          {
            scrollTop: $("#aiSuggestionArea").offset().top - 80,
          },
          600,
        );
      }, 300); // 延遲 300ms 等待結果渲染完成
    }
  };

  function updateDetailedToggleUI(isDetailed) {
    const $label = $('label[for="displayModeToggle"]');
    if (isDetailed) {
      $label.addClass("detailed-label-active");
    } else {
      $label.removeClass("detailed-label-active");
    }
  }

  function runPrediction() {
    const data = {
      date: $("#predDate").val(),
      lotto: $("#lottoType").val(),
      topN: $("#topN").val(),
      trend: $("#useTrend").is(":checked"),
    };

    if (!data.date) {
      AppUI.toast("請選擇預測日期", "warning");
      return;
    }

    AppUI.loading("星系計算中", "正在利用星系路徑演算法分析大數據...");
    $("#historyCard").addClass("d-none");

    google.script.run
      .withSuccessHandler(function (res) {
        AppUI.close();
        renderAISuggestion(res);
        renderResults(res);
      })
      .withFailureHandler(function (err) {
        AppUI.showCommonError(err);
      })
      .getPrediction01(data.lotto, data.date, data.trend, parseInt(data.topN));
  }

  /**
   * 渲染 AI 智能建議卡片
   */
  function renderAISuggestion(res) {
    var $area = $("#aiSuggestionArea");
    if (!res.aiStrategy) {
      $area.empty();
      return;
    }

    var strategy = res.aiStrategy;
    var html = `
      <div class="card border-info shadow-sm bg-light-subtle">
        <div class="card-body">
          <h6 class="fw-bold text-info mb-2"><i class="fas fa-robot me-2"></i>星系戰略分析</h6>
          <p class="mb-2 small fw-bold text-dark">${strategy.recommendation}</p>
          <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
              <span class="badge bg-info-subtle text-info border border-info-subtle">${strategy.focus}</span>
              <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">風險: ${strategy.risk}</span>
            </div>
          </div>
        </div>
      </div>`;
    $area.html(html).fadeIn();
  }

  function renderResults(res) {
    window.lastResult = res;
    var isDetailed = localStorage.getItem("detailedMode") === "true";

    if (!res.success) {
      AppUI.error("預測失敗", res.error);
      return;
    }

    const isS1Hit = res.isS1Hit;
    let html = `
    <div class="card mb-3 ${isS1Hit ? "border-s1-hit animate-glow-gold" : ""}">
      <div class="card-body">
        <h5 class="card-title text-center mb-4">
          <span class="text-primary">${res.date}</span> 預測結果: ${res.hitSummary}
          ${res.actualNums ? `<div class="mt-2 small text-muted">本期答案: <span class="fw-bold text-success">${res.actualNums.join(", ")}</span>${res.actualS1 ? ` <span class="badge bg-s1 text-dark">S:${res.actualS1}</span>` : ""}</div>` : ""}
        </h5>
        <div class="row row-cols-2 row-cols-sm-3 row-cols-md-5 g-3 justify-content-center">
  `;

    res.prediction.forEach((numStr) => {
      const num = Number(numStr);
      const label = res.labels[num] || "";
      let badgeClass = "bg-secondary";
      let isHit = res.actualNums && res.actualNums.includes(num);
      let isS1Hit = res.actualS1 && num === res.actualS1;
      let isResonance =
        res.resonanceNumbers && res.resonanceNumbers.includes(numStr);
      let isRepeat = res.lastDrawNums && res.lastDrawNums.includes(num);
      let isSkip = res.prevDrawNums && res.prevDrawNums.includes(num);

      if (isS1Hit) {
        badgeClass = "bg-s1 animate-flash";
      } else if (isHit) {
        badgeClass = "bg-success animate-pulse";
      } else if (label === "冷門反彈") {
        badgeClass = "bg-rebound animate-flash";
      } else if (isResonance) {
        badgeClass = "bg-resonance animate-glow-green";
      } else if (label === "過熱") {
        badgeClass = "bg-danger";
      } else if (label === "過冷") {
        badgeClass = "bg-info";
      }

      html += `
      <div class="col text-center">
        <div class="ball-wrapper d-inline-block" style="position: relative;">
          ${isRepeat ? '<span class="badge badge-repeat position-absolute top-0 start-50 translate-middle-x" style="z-index:1; font-size:0.7rem; margin-top:-5px;">連莊</span>' : ""}
          ${isSkip ? `<span class="badge badge-skip position-absolute start-50 translate-middle-x" style="z-index:1; font-size:0.7rem; bottom: ${isDetailed ? "30px" : "25px"};">隔期</span>` : ""}
          <div class="lotto-ball ${isHit ? "hit" : ""}">${numStr}</div>
          <span class="badge ${badgeClass}">${isS1Hit ? "中特" : isHit ? "命中" : isResonance ? "五行共振" : label}</span>
        </div>
      </div>
    `;
    });

    html += `</div></div></div>`;
    html += `
      <div class="alert alert-light border d-flex align-items-center">
        <i class="fas fa-info-circle me-2 text-info"></i>
        <span>分析參數與相關係數已同步記錄至 <strong>prct1_Settings</strong> 工作表。</span>
      </div>`;
    $("#resultArea").html(html);

    // 顯示預測組合平衡指標圖表
    if (res.balanceStats) {
      let balanceHtml = `
        <div class="card shadow-sm mt-3 mb-3">
          <div class="card-header bg-secondary text-white small fw-bold">
            <i class="fas fa-balance-scale me-2"></i>預測組合平衡指標 (大小/奇偶)
          </div>
          <div class="card-body py-2">
            <div class="row text-center">
              <div class="col-6 border-end"><canvas id="bsChart" style="height:120px"></canvas></div>
              <div class="col-6"><canvas id="oeChart" style="height:120px"></canvas></div>
            </div>
            <div class="d-flex gap-2 mt-2">
              <button class="btn btn-outline-warning btn-sm flex-grow-1 fw-bold" onclick="exchangeNumber()">
                <i class="fas fa-random me-1"></i> 一鍵換組
              </button>
              <button class="btn btn-outline-info btn-sm flex-grow-1 fw-bold" onclick="showStrategyComparison()">
                <i class="fas fa-chart-bar me-1"></i> 戰略分析對比
              </button>
            </div>
          </div>
        </div>`;
      $("#resultArea").append(balanceHtml);
      renderBalanceCharts(res.balanceStats);
    }

    // 詳細分析模式：顯示環境係數表格
    if (isDetailed && res.envDetails && res.envDetails.length > 0) {
      let detailHtml = `
        <div class="card shadow-sm mt-4">
          <div class="card-header bg-info text-white fw-bold">
            <i class="fas fa-microscope me-2"></i>星系環境係數明細 (AI 參考值)
          </div>
          <div class="card-body p-0">
            <div class="p-2 bg-light border-bottom d-flex align-items-center gap-3 flex-wrap">
              <div class="input-group input-group-sm" style="max-width: 250px;">
                <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                <input type="text" id="envSearch" class="form-control" placeholder="搜尋參數..." onkeyup="filterEnvTable()">
              </div>
              <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="hideUnchanged" onchange="filterEnvTable()">
                <label class="form-check-label small fw-bold" for="hideUnchanged text-secondary">僅顯示變動參數</label>
              </div>
            </div>
            <div class="table-responsive" style="max-height: 500px;">
              <table class="table table-hover table-sm mb-0 small">
                <thead class="table-light sticky-top">
                  <tr><th class="ps-3">係數名稱</th><th>係數值</th><th>變動</th><th class="text-end pe-3">ID</th></tr>
                </thead>
                <tbody id="envTableBody">
                  ${res.envDetails
                    .map(
                      (d) => `
                    <tr class="${d.isChanged ? "table-warning" : ""}" data-changed="${d.isChanged}">
                      <td class="ps-3 fw-bold ${d.isChanged ? "text-primary" : "text-secondary"}">${d.name}</td>
                      <td><span class="badge ${d.isChanged ? "bg-primary" : "bg-primary-subtle text-primary"} border border-primary-subtle">${d.value}</span></td>
                      <td class="text-center">${d.isChanged ? '<i class="fas fa-bolt text-warning animate-flash"></i>' : "-"}</td>
                      <td class="text-end pe-3 text-muted">${d.id}</td>
                    </tr>
                  `,
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;
      $("#resultArea").append(detailHtml);
    }

    if (isDetailed && res.historyHits && res.historyHits.length > 0) {
      $("#historyCard").removeClass("d-none");
      renderChart(res.historyHits);
    } else {
      $("#historyCard").addClass("d-none");
    }
  }

  function filterEnvTable() {
    const searchText = $("#envSearch").val().toLowerCase();
    const hideUnchanged = $("#hideUnchanged").is(":checked");

    $("#envTableBody tr").each(function () {
      const isChanged = $(this).data("changed") === true;
      const textMatch = $(this).text().toLowerCase().indexOf(searchText) > -1;
      const changeMatch = hideUnchanged ? isChanged : true;
      $(this).toggle(textMatch && changeMatch);
    });
  }

  /**
   * 一鍵換組功能：具備平衡感知(Balance-Aware)的遞補邏輯
   */
  window.exchangeNumber = function () {
    if (!window.lastResult || !window.lastResult.fullPool) return;

    const res = window.lastResult;
    const current = res.prediction;
    const pool = res.fullPool;
    const trend = res.trendStats;
    const lotto = $("#lottoType").val();
    const maxNum = lotto === "L539" || lotto === "L638" ? 39 : 49;
    const mid = Math.floor(maxNum / 2);

    // 1. 計算目前的平衡狀態
    let curBig = 0,
      curSmall = 0;
    current.forEach((n) => {
      if (Number(n) > mid) curBig++;
      else curSmall++;
    });
    const curBigRatio = curBig / current.length;

    // 2. 判定遞補方向：如果目前太大(高於趨勢)，則優先找小號
    const needSmall = trend ? curBigRatio > trend.bigRatio : false;

    const toRemove = current[current.length - 1];

    // 3. 從 pool 尋找符合方向的候選星球
    let nextCandidate = pool.find((n) => {
      if (current.includes(n)) return false;
      return needSmall ? Number(n) <= mid : Number(n) > mid;
    });

    // 若找不到符合方向的，則退而求其實找 pool 裡權重最高的
    if (!nextCandidate) {
      nextCandidate = pool.find((n) => !current.includes(n));
    }

    if (!nextCandidate) {
      AppUI.toast("已無更多候選星球可供替換", "info");
      return;
    }

    res.prediction[current.length - 1] = nextCandidate;
    let big = 0,
      small = 0,
      odd = 0,
      even = 0;
    res.prediction.forEach((n) => {
      const num = Number(n);
      if (num > mid) big++;
      else small++;
      if (num % 2 !== 0) odd++;
      else even++;
    });
    res.prediction.sort((a, b) => a - b); // 保持球號排序一致性
    res.balanceStats = { big, small, odd, even };
    AppUI.toast(
      `已剔除 ${toRemove}，遞補${needSmall ? "平衡小號" : "平衡大號"} ${nextCandidate}`,
      "success",
    );
    renderResults(res);
  };

  /**
   * 顯示戰略分析對比視窗
   */
  window.showStrategyComparison = function () {
    const res = window.lastResult;
    const trend = res.trendStats;
    const pred = res.balanceStats;
    const currentPrediction = res.prediction.map(Number);
    const currentSum = currentPrediction.reduce((a, b) => a + b, 0);
    if (!trend || !pred) return;

    const ballCount = pred.big + pred.small;

    let html = `
      <div class="table-responsive">
        <table class="table table-bordered table-sm small text-center mb-0">
          <thead class="table-dark">
            <tr><th>維度</th><th>近期趨勢(平均)</th><th>當前預測組</th><th>偏差</th></tr>
          </thead>
          <tbody>
            <tr>
              <td class="fw-bold">大小比</td>
              <td>${(trend.bigRatio * ballCount).toFixed(1)}大 : ${(ballCount - trend.bigRatio * ballCount).toFixed(1)}小</td>
              <td class="text-primary fw-bold">${pred.big}大 : ${pred.small}小</td>
              <td><span class="badge ${Math.abs(pred.big / ballCount - trend.bigRatio) > 0.2 ? "bg-danger" : "bg-success"}">${((pred.big / ballCount - trend.bigRatio) * 100).toFixed(0)}%</span></td>
            </tr>
            <tr>
              <td class="fw-bold">奇偶比</td>
              <td>${(trend.oddRatio * ballCount).toFixed(1)}奇 : ${(ballCount - trend.oddRatio * ballCount).toFixed(1)}偶</td>
              <td class="text-primary fw-bold">${pred.odd}奇 : ${pred.even}偶</td>
              <td><span class="badge ${Math.abs(pred.odd / ballCount - trend.oddRatio) > 0.2 ? "bg-danger" : "bg-success"}">${((pred.odd / ballCount - trend.oddRatio) * 100).toFixed(0)}%</span></td>
            </tr>
            <tr class="table-info-subtle">
              <td class="fw-bold">全組合總和</td>
              <td>理論中值: ${trend.theoryMeanSum.toFixed(0)}</td>
              <td class="text-primary fw-bold">Sum: ${currentSum}</td>
              <td><span class="badge ${Math.abs(currentSum - trend.theoryMeanSum) > res.avgAmp ? "bg-warning text-dark" : "bg-success"}">
                ${Math.abs(currentSum - trend.theoryMeanSum) > res.avgAmp ? "震盪預警" : "穩定"}</span>
              </td>
            </tr>
          </tbody>
        </table>
        
        <div class="alert alert-secondary mt-3 p-2 small">
          <h6 class="fw-bold mb-1 border-bottom pb-1"><i class="fas fa-arrows-alt-h me-1"></i>星系位置平均值 (Position Means)</h6>
          <div class="d-flex justify-content-around mt-2">
            ${
              res.columnMeans
                ? res.columnMeans
                    .map(
                      (m, i) => `
              <div class="text-center">
                <div class="text-muted" style="font-size:0.7rem">N${i + 1}柱</div>
                <div class="fw-bold text-dark">${m}</div>
              </div>
            `,
                    )
                    .join("")
                : "無數據"
            }
          </div>
          <p class="mt-2 mb-1 text-muted" style="font-size:0.75rem">* 預測球號應在各柱平均值附近震盪為佳。</p>
          <p class="mb-0 text-muted" style="font-size:0.75rem">* 總和偏差建議小於歷史平均振幅 (±${res.avgAmp})。</p>
        </div>
      </div>`;

    AppUI.alertHtml(
      '<i class="fas fa-balance-scale me-2"></i>戰略平衡分析對比',
      html,
      "500px",
    );
  };

  /**
   * 渲染預測組合的平衡比例圖
   */
  function renderBalanceCharts(stats) {
    const chartOptions = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "bottom",
          labels: { boxWidth: 10, font: { size: 11 } },
        },
        tooltip: {
          callbacks: { label: (ctx) => ` ${ctx.label}: ${ctx.raw} 顆` },
        },
      },
    };

    const bsCtx = document.getElementById("bsChart").getContext("2d");
    if (bsChart) bsChart.destroy();
    bsChart = new Chart(bsCtx, {
      type: "doughnut",
      data: {
        labels: ["大號", "小號"],
        datasets: [
          {
            data: [stats.big, stats.small],
            backgroundColor: ["#fd7e14", "#0dcaf0"],
            borderWidth: 2,
          },
        ],
      },
      options: chartOptions,
    });

    const oeCtx = document.getElementById("oeChart").getContext("2d");
    if (oeChart) oeChart.destroy();
    oeChart = new Chart(oeCtx, {
      type: "doughnut",
      data: {
        labels: ["奇數", "偶數"],
        datasets: [
          {
            data: [stats.odd, stats.even],
            backgroundColor: ["#6f42c1", "#20c997"],
            borderWidth: 2,
          },
        ],
      },
      options: chartOptions,
    });
  }

  function renderChart(historyData) {
    const ctx = document.getElementById("historyChart").getContext("2d");
    if (historyChart) historyChart.destroy();

    historyChart = new Chart(ctx, {
      type: "line",
      data: {
        labels: historyData.map((d) => d.date),
        datasets: [
          {
            label: "命中個數",
            data: historyData.map((d) => d.hits),
            borderColor: "#0d6efd",
            backgroundColor: "rgba(13, 110, 253, 0.1)",
            fill: true,
            tension: 0.4,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
      },
    });
  }

  /**
   * 清理全域快取並自動重新執行預測
   */
  window.clearCacheAndRetry = function () {
    AppUI.loading("修復中", "正在清理系統快取並重置環境...");
    google.script.run
      .withSuccessHandler(function () {
        AppUI.toast("快取已清理，重新執行預測", "success");
        runPrediction();
      })
      .clearAllCache(false);
  };
</script>
