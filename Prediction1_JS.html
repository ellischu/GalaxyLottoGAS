<script>
  let historyChart = null;
  let bsChart = null; // 大小平衡圖
  let oeChart = null; // 奇偶平衡圖
  let radarChart = null; // 共振雷達圖
  let progressInterval = null; // 進度輪詢計時器
  window.lastResult = null;
  window.originalResult = null; // 儲存最初預測結果供還原使用
  let v1HistoryCache = {}; // 建立客戶端快取物件

  $(document).ready(function () {
    // 初始化預測日期為今日
    var d = new Date();
    var dateStr =
      d.getFullYear() +
      "-" +
      String(d.getMonth() + 1).padStart(2, "0") +
      "-" +
      String(d.getDate()).padStart(2, "0");
    $("#predDate").val(dateStr);

    // 初始化顯示模式狀態
    var isDetailed = localStorage.getItem("detailedMode") === "true";
    $("#displayModeToggle").prop("checked", isDetailed);
    updateDetailedToggleUI(isDetailed);

    // 初始化權重面板開關
    var showWeight = localStorage.getItem("showWeightPanel") !== "false";
    $("#weightPanelToggle").prop("checked", showWeight);

    // 初始化主題
    initTheme();

    // 確保歷史趨勢 (回測) 開關在載入時處於禁用且未勾選狀態
    $("#historyToggle").prop("checked", false).prop("disabled", true);
    $("#historyCard").addClass("d-none");

    // 初始化載入歷史統計
    loadV1HistoryStats();

    // 監聽推薦數與彩種變更，即時更新歷史統計圖表
    $("#topN, #lottoType, #useTrend, #predDate, #historyPeriod").on(
      "change",
      loadV1HistoryStats,
    );

    // 切換彩種時立即更新快取資訊，避免等待定時器
    $("#lottoType").on("change", updateCacheInfo);

    // 初始執行與背景定時同步
    updateCacheInfo();
    setInterval(updateCacheInfo, 60000); // 每 60 秒背景更新一次
  });

  // --- 主題切換邏輯 ---
  window.applyTheme = function (theme) {
    document.documentElement.setAttribute("data-bs-theme", theme);
    localStorage.setItem("theme", theme);
    const $icon = $(
      ".tech-panel button i.fa-moon, .tech-panel button i.fa-sun",
    );
    if (theme === "dark") {
      $icon.removeClass("fa-moon").addClass("fa-sun");
    } else {
      $icon.removeClass("fa-sun").addClass("fa-moon");
    }
  };

  window.toggleTheme = function () {
    var current =
      document.documentElement.getAttribute("data-bs-theme") || "light";
    var next = current === "dark" ? "light" : "dark";
    window.applyTheme(next);
  };

  function initTheme() {
    var savedTheme = localStorage.getItem("theme");
    if (!savedTheme) {
      savedTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";
    }
    window.applyTheme(savedTheme);
  }

  window.toggleDisplayMode = function (isDetailed) {
    localStorage.setItem("detailedMode", isDetailed);
    updateDetailedToggleUI(isDetailed);
    AppUI.toast(isDetailed ? "切換至詳細分析" : "切換至精簡模式", "info");

    if (window.lastResult) {
      renderResults(window.lastResult);
    }

    // 當開啟詳細模式時，自動捲動至 AI 戰略分析區
    if (isDetailed) {
      setTimeout(function () {
        $("html, body").animate(
          { scrollTop: $("#aiSuggestionArea").offset().top - 80 },
          600,
        );
      }, 300); // 延遲 300ms 等待結果渲染完成
    }
  };

  window.toggleHistoryStats = function (isVisible) {
    const $card = $("#historyCard");
    if (isVisible) {
      $card.removeClass("d-none");
      // 如果有快取的圖表，確保重新渲染大小
      if (historyChart) {
        setTimeout(() => historyChart.update(), 100);
      }
    } else {
      $card.addClass("d-none");
    }
  };

  window.toggleWeightPanel = function (isVisible) {
    localStorage.setItem("showWeightPanel", isVisible);
    if (!isVisible) {
      $("#weightStrategyPanel").addClass("d-none");
    } else if (window.lastResult) {
      renderAISuggestion(window.lastResult);
    }
  };

  function updateDetailedToggleUI(isDetailed) {
    const $label = $('label[for="displayModeToggle"]');
    if (isDetailed) {
      $label.addClass("detailed-label-active");
    } else {
      $label.removeClass("detailed-label-active");
    }
  }

  /**
   * 啟動進度輪詢
   */
  function startPolling(lotto, initialMsg = "啟動星系掃描儀...") {
    $("#progressContainer").removeClass("d-none");
    updateProgressBar(0, initialMsg);
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (!lotto) return;
      google.script.run
        .withSuccessHandler(function (statusJson) {
          if (statusJson) {
            const status = JSON.parse(statusJson);
            updateProgressBar(status.percent, status.message);
          }
        })
        .withFailureHandler(function () {
          if (progressInterval) clearInterval(progressInterval);
        })
        .getPredictProgress(lotto);
    }, 1200); // 每 1.2 秒詢問一次
  }

  function stopPolling() {
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = null;
    setTimeout(() => $("#progressContainer").addClass("d-none"), 1500);
  }

  function updateProgressBar(percent, message) {
    $("#predictionProgressBar").css("width", percent + "%");
    $("#progressMessage").text(message + " (" + percent + "%)");
  }

  // 修改 runPrediction 接受一個選擇性的回呼函式
  window.runPrediction = function (callback) {
    const data = {
      date: $("#predDate").val(),
      lotto: $("#lottoType").val(),
      topN: $("#topN").val(),
      trend: $("#useTrend").is(":checked"),
    };

    if (!data.date) {
      AppUI.toast("請選擇預測日期", "warning");
      return;
    }

    // 觸發科幻擴散動畫
    const $btn = $("#predictBtnV1");
    $btn.addClass("btn-scan-active");
    setTimeout(() => $btn.removeClass("btn-scan-active"), 800);

    AppUI.loading("星系計算中", "正在利用星系路徑演算法分析大數據...");
    $("#historyCard").addClass("d-none");

    startPolling(data.lotto); // 啟動進度條

    // 暫存彩種資訊，供錯誤回報使用
    window._lastErrorLotto = data.lotto;

    // 實作超時處理邏輯 (放寬至 60秒，避免 GAS 運算較久時斷開)
    let isRequestActive = true;
    const timeoutId = setTimeout(function () {
      if (isRequestActive) {
        isRequestActive = false;
        AppUI.close();
        AppUI.error(
          "連線超時",
          "星系預測執行時間過長 (超過 5 分鐘)，請檢查網路或縮減預測範圍。",
        );
      }
    }, 300000); // 延長至 5 分鐘

    google.script.run
      .withSuccessHandler(function (res) {
        if (!isRequestActive) return;
        isRequestActive = false;
        stopPolling();
        clearTimeout(timeoutId);
        AppUI.close();
        window.originalResult = JSON.parse(JSON.stringify(res)); // 備份初始結果

        // 更新星系噴發倒計時
        if (res.nextEruption) {
          $("#eruptionCountdown").removeClass("d-none");

          if (
            res.isPiEruption &&
            res.eruptionBalls &&
            res.eruptionBalls.length > 0
          ) {
            $("#countdownTimer")
              .text("噴發中")
              .removeClass("bg-info")
              .addClass("bg-danger text-white animate-pulse");
            $("#countdownMsg").html(
              `<i class="fas fa-fire me-1 text-warning"></i>今日星系噴發中！關鍵星球: <span class="fw-bold text-warning">${res.eruptionBalls.join(", ")}</span>`,
            );
          } else {
            $("#countdownTimer")
              .text(res.nextEruption.daysRemaining + " 天")
              .removeClass("bg-danger animate-pulse")
              .addClass("bg-info text-dark");
            let msg = `下一個星系共振點: <span class="text-info fw-bold">${res.nextEruption.date}</span>`;
            // 額外顯示前 3 顆高共振候選星球作為預警資訊
            if (res.resonanceNumbers && res.resonanceNumbers.length > 0) {
              msg += `<br><small class="text-white-50">預期共振星球: ${res.resonanceNumbers.slice(0, 3).join(", ")}...</small>`;
            }
            $("#countdownMsg").html(msg);
          }
        }

        renderAISuggestion(res);
        renderResults(res);

        // 如果有傳入回呼函式，執行它
        if (typeof callback === "function") callback(res);
      })
      .withFailureHandler(function (err) {
        if (!isRequestActive) return;
        isRequestActive = false;
        stopPolling();
        clearTimeout(timeoutId);
        AppUI.close();
        AppUI.showCommonError(err);
      })
      .getPrediction01(data.lotto, data.date, data.trend, parseInt(data.topN));
  };

  /**
   * 渲染 AI 智能建議卡片
   */
  function renderAISuggestion(res) {
    var $area = $("#aiSuggestionArea");
    var $weightPanel = $("#weightStrategyPanel");
    var $weightBody = $("#weightPanelBody");

    if (!res || !res.aiStrategy) {
      $area.empty();
      $weightPanel.addClass("d-none");
      return;
    }

    var strategy = res.aiStrategy;
    var html = `
        <div class="card border-info shadow-sm bg-light-subtle">
          <div class="card-body">
            <h6 class="fw-bold text-info mb-2"><i class="fas fa-robot me-2"></i>星系戰略分析</h6>
            <p class="mb-2 small fw-bold">${strategy.recommendation}</p>
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex gap-2">
                <span class="badge bg-info-subtle text-info border border-info-subtle">${strategy.focus}</span>
                <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">風險: ${strategy.risk}</span>
              </div>
            </div>
          </div>
        </div>`;
    $area.html(html).fadeIn();

    // 填充權重戰略面板，顯示熱門尾數與權重 (處理建議事項)
    const showWeightSetting =
      localStorage.getItem("showWeightPanel") !== "false";
    if (showWeightSetting && res.hotTails && res.learnedWeights) {
      $weightPanel.removeClass("d-none");
      const w = res.learnedWeights;
      const tails = res.hotTails.join(", ");
      const panelHtml = `
          <div class="row g-2">
            <div class="col-6">
              <div class="p-2 border rounded bg-white shadow-sm">
                <div class="small text-muted mb-1"><i class="fas fa-fire-alt text-danger me-1"></i>熱門尾數偵測</div>
                <div class="fw-bold h6 mb-0 text-danger"><span class="ticker" data-val="${tails}">${tails}</span> 尾</div>
              </div>
            </div>
            <div class="col-6">
              <div class="p-2 border rounded bg-white shadow-sm">
                <div class="small text-muted mb-1"><i class="fas fa-magnet text-primary me-1"></i>連莊引力權重</div>
                <div class="fw-bold h6 mb-0 text-primary ticker" data-val="${(w.repeat || 0).toFixed(2)}">0.00</div>
              </div>
            </div>
            <div class="col-4">
              <div class="p-2 border rounded bg-light-subtle text-center">
                <div class="small text-muted">年度五行</div>
                <div class="fw-bold ticker" data-val="${(w.metaBoostYear || 0).toFixed(2)}">0.00</div>
              </div>
            </div>
            <div class="col-4">
              <div class="p-2 border rounded bg-light-subtle text-center">
                <div class="small text-muted">三合噴發</div>
                <div class="fw-bold ticker" data-val="${(w.metaBoostTriple || 0).toFixed(2)}">0.00</div>
              </div>
            </div>
            <div class="col-4">
              <div class="p-2 border rounded bg-light-subtle text-center" 
                   style="cursor: pointer;"
                   onclick="showHouseAnalysis()"
                   title="點擊查看各宮位共振明細"
                   data-bs-toggle="tooltip">
                <div class="small text-muted">紫微共振 <i class="fas fa-info-circle ms-1"></i></div>
                <div class="fw-bold ticker" data-val="${(w.metaBoostLifePalace || 0).toFixed(2)}">0.00</div>
                <div class="text-muted" style="font-size: 0.65rem;">(匹配: ${res.ziWeiMatchCount || 0}期)</div>
              </div>
            </div>
          </div>`;
      $weightBody.html(panelHtml);
      // 啟動數字跑動動畫
      animateTickers();

      // 初始化 Tooltip
      const tooltipTriggerList = [].slice.call(
        document.querySelectorAll('[data-bs-toggle="tooltip"]'),
      );
      tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl);
      });
    } else {
      $weightPanel.addClass("d-none");
    }
  }

  /**
   * 數字跑動動畫 (Ticker Effect)
   */
  function animateTickers() {
    $(".ticker").each(function () {
      const $this = $(this);
      const target = parseFloat($this.data("val"));
      if (isNaN(target)) return;

      let current = 0;
      const duration = 800; // 動畫時長 0.8 秒
      const startTime = performance.now();

      function update(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // 使用 easeOutQuad 讓動畫在接近結尾時減速
        const easeProgress = progress * (2 - progress);
        current = target * easeProgress;

        // 如果是尾數(整數)，則不顯示小數點
        $this.text(
          Number.isInteger(target) ? Math.round(current) : current.toFixed(2),
        );

        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }
      requestAnimationFrame(update);
    });
  }

  function renderResults(res, highlightNum = null) {
    window.lastResult = res;
    if (!res || !res.success) {
      AppUI.error("預測失敗", res ? res.error : "數據為空");
      return;
    }

    const isDetailed = localStorage.getItem("detailedMode") === "true";
    $("#resultArea").empty();

    // 1. 渲染主卡片與球號
    renderMainResultCard(res, isDetailed, highlightNum);

    // 2. 渲染平衡圖表區
    if (res.balanceStats) renderBalanceSection(res);

    // 3. 渲染詳細環境明細 (僅詳細模式)
    if (isDetailed && res.envDetails) renderEnvDetailSection(res);
  }

  function renderMainResultCard(res, isDetailed, highlightNum = null) {
    const isS1Hit = res.isS1Hit;
    let ballHtml = "";

    res.prediction.forEach((item) => {
      const numStr = typeof item === "string" ? item : item.number;
      const num = Number(numStr);
      const label = res.labels[numStr] || "";
      let badgeClass = "bg-secondary";

      const isHit = res.actualNums && res.actualNums.includes(num);
      const isS1HitBall = res.actualS1 && num === res.actualS1;

      // 判定是否為剛替換的新球號，若是則加入登場動畫
      const isNewReplacement =
        highlightNum && String(numStr) === String(highlightNum);
      const enterAnimClass = isNewReplacement ? "ball-enter-space" : "";

      if (isS1HitBall) badgeClass = "bg-s1 animate-glow-s1";
      else if (isHit) badgeClass = "bg-success animate-pulse";
      else if (label === "冷門反彈") badgeClass = "bg-rebound animate-flash";
      else if (label === "過熱") badgeClass = "bg-danger animate-overheat";
      else if (label === "過冷") badgeClass = "bg-info";

      const hitAnim =
        isHit || isS1HitBall ? "ball-hit-appear ball-hit-breathing" : "";
      const elementBadge = item.elementCategory
        ? `<span class="badge ${item.elementColor} position-absolute top-0 start-0 translate-middle" style="z-index:2; font-size:0.7rem; margin-top:-5px; margin-left: 10px;">${item.elementCategory}</span>`
        : "";
      const repeatBadge =
        res.lastDrawNums && res.lastDrawNums.includes(num)
          ? '<span class="badge badge-repeat position-absolute top-0 start-50 translate-middle-x" style="z-index:1; font-size:0.7rem; margin-top:-5px;">連莊</span>'
          : "";
      const skipBadge =
        res.prevDrawNums && res.prevDrawNums.includes(num)
          ? `<span class="badge badge-skip position-absolute start-50 translate-middle-x" style="z-index:1; font-size:0.7rem; bottom: ${isDetailed ? "30px" : "25px"};">隔期</span>`
          : "";

      ballHtml += `
          <div class="col text-center ${enterAnimClass}">
            <div class="ball-wrapper d-inline-block" style="position: relative;">
              ${elementBadge} ${repeatBadge} ${skipBadge}
              <div class="lotto-ball ${isHit ? "hit" : ""} ${isS1HitBall ? "bg-s1 animate-glow-s1" : ""} ${hitAnim}">${numStr}</div>
              <span class="badge ${badgeClass}">${isS1HitBall ? "中特" : isHit ? "命中" : label}</span>
            </div>
          </div>`;
    });

    const cardHtml = `
        <div class="card mb-3 ${isS1Hit ? "border-s1-hit animate-glow-gold" : ""}">
          <div class="card-body">
            <h5 class="card-title text-center mb-4">
              <span class="text-primary">${res.date}</span> 預測結果: ${res.hitSummary}
              ${res.actualNums ? `<div class="mt-2 small text-muted">本期答案: <span class="fw-bold text-success">${res.actualNums.join(", ")}</span>${res.actualS1 ? ` <span class="badge bg-s1 text-dark">S:${res.actualS1}</span>` : ""}</div>` : ""}
            </h5>
            <div class="row row-cols-2 row-cols-sm-3 row-cols-md-5 g-3 justify-content-center">${ballHtml}</div>
          </div>
        </div>`;
    $("#resultArea").append(cardHtml);
  }

  function renderBalanceSection(res) {
    const balanceHtml = `
        <div class="card shadow-sm mt-3 mb-3">
          <div class="card-header bg-secondary text-white small fw-bold"><i class="fas fa-balance-scale me-2"></i>預測組合平衡指標 (大小/奇偶)</div>
          <div class="card-body py-2">
            <div class="row text-center">
              <div class="col-6 border-end"><canvas id="bsChart" style="height:120px"></canvas></div>
              <div class="col-6"><canvas id="oeChart" style="height:120px"></canvas></div>
            </div>
            <div class="d-flex gap-2 mt-2">
              <button class="btn btn-outline-warning btn-sm flex-grow-1 fw-bold" onclick="exchangeNumber()"><i class="fas fa-random me-1"></i> 一鍵換組</button>
              <button class="btn btn-outline-secondary btn-sm flex-grow-1 fw-bold" onclick="restoreOriginal()"><i class="fas fa-undo me-1"></i> 還原預測</button>
              <button class="btn btn-outline-info btn-sm flex-grow-1 fw-bold" onclick="showStrategyComparison()"><i class="fas fa-chart-bar me-1"></i> 戰略分析對比</button>
            </div>
          </div>
        </div>`;
    $("#resultArea").append(balanceHtml);
    renderBalanceCharts(res.balanceStats);
  }

  function renderEnvDetailSection(res) {
    const cacheBadge = res.isCached
      ? '<span class="badge bg-success-subtle text-success border border-success-subtle ms-auto animate-pulse" style="font-size:0.7rem;"><i class="fas fa-bolt me-1"></i>快取命中</span>'
      : `<div class="ms-auto d-flex align-items-center gap-2"><span class="badge bg-light text-muted border" style="font-size:0.7rem;"><i class="fas fa-microchip me-1"></i>即時計算</span><button class="btn btn-sm btn-outline-success py-0 px-1" style="font-size:0.65rem;" onclick="manualCacheSave()">存入快取</button></div>`;

    const detailHtml = `
        <div class="card shadow-sm mt-4">
          <div class="card-header bg-info text-white fw-bold d-flex align-items-center py-2"><span><i class="fas fa-microscope me-2"></i>星系環境係數明細</span>${cacheBadge}</div>
          <div class="card-body p-0">
            <div class="p-2 bg-light border-bottom d-flex align-items-center gap-3">
              <input type="text" id="envSearch" class="form-control form-control-sm w-auto" placeholder="搜尋..." onkeyup="filterEnvTable()">
              <div class="form-check form-switch mb-0"><input class="form-check-input" type="checkbox" id="hideUnchanged" onchange="filterEnvTable()"><label class="form-check-label small fw-bold">變動參數</label></div>
            </div>
            <div class="table-responsive" style="max-height: 400px;">
              <table class="table table-hover table-sm mb-0 small">
                <thead class="table-light sticky-top"><tr><th class="ps-3">係數名稱</th><th>係數值</th><th>變動</th><th class="text-end pe-3">ID</th></tr></thead>
                <tbody id="envTableBody">
                  ${res.envDetails
                    .map(
                      (d) => `
                    <tr class="${d.isChanged ? "table-warning" : ""}" data-changed="${d.isChanged}">
                      <td class="ps-3 fw-bold ${d.isChanged ? "text-primary" : "text-secondary"}">${d.name}</td>
                      <td><span class="badge ${d.isChanged ? "bg-primary" : "bg-primary-subtle text-primary"}">${d.value}</span></td>
                      <td class="text-center">${d.isChanged ? '<i class="fas fa-bolt text-warning"></i>' : "-"}</td>
                      <td class="text-end pe-3 text-muted">${d.id}</td>
                    </tr>`,
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;
    $("#resultArea").append(detailHtml);
  }

  function filterEnvTable() {
    const searchText = $("#envSearch").val().toLowerCase();
    const hideUnchanged = $("#hideUnchanged").is(":checked");

    $("#envTableBody tr").each(function () {
      const isChanged = $(this).data("changed") === true;
      const textMatch = $(this).text().toLowerCase().indexOf(searchText) > -1;
      const changeMatch = hideUnchanged ? isChanged : true;
      $(this).toggle(textMatch && changeMatch);
    });
  }

  /**
   * 一鍵換組功能：具備平衡感知(Balance-Aware)的遞補邏輯
   */
  window.exchangeNumber = function () {
    if (!window.lastResult || !window.lastResult.fullPool) return;

    const res = window.lastResult;
    const current = res.prediction;
    const pool = res.fullPool;
    const trend = res.trendStats;
    const lotto = $("#lottoType").val();
    const maxNum = lotto === "L539" || lotto === "L638" ? 39 : 49;
    const mid = Math.floor(maxNum / 2);

    // 1. 計算目前的平衡狀態
    let curBig = 0,
      curSmall = 0;
    current.forEach((n) => {
      if (Number(n) > mid) curBig++;
      else curSmall++;
    });
    const curBigRatio = curBig / current.length;

    // 2. 判定遞補方向：如果目前太大(高於趨勢)，則優先找小號
    const needSmall = trend ? curBigRatio > trend.bigRatio : false;

    const toRemoveObj = current[current.length - 1];
    const toRemoveNum =
      typeof toRemoveObj === "string" ? toRemoveObj : toRemoveObj.number;

    // 3. 從 pool 尋找符合方向的候選星球，優先考慮「冷門反彈球」
    let nextCandidate = pool.find((n) => {
      const nNum = typeof n === "string" ? n : n.number;
      const isAlreadyIn = current.some(
        (curr) => (typeof curr === "string" ? curr : curr.number) === nNum,
      );
      if (isAlreadyIn) return false;

      const isRebound = res.labels[nNum] === "冷門反彈";
      const sizeMatch = needSmall ? Number(nNum) <= mid : Number(nNum) > mid;
      return isRebound && sizeMatch; // 同時符合冷門反彈與大小平衡
    });

    // 若無符合方向的反彈球，退而求其次找任何反彈球
    if (!nextCandidate) {
      nextCandidate = pool.find(
        (n) =>
          !current.some((curr) => (curr.number || curr) === (n.number || n)) &&
          res.labels[n.number || n] === "冷門反彈",
      );
    }

    // 若找不到符合方向的，則退而求其實找 pool 裡權重最高的
    if (!nextCandidate) {
      nextCandidate = pool.find((n) => {
        const nNum = typeof n === "string" ? n : n.number;
        return !current.some(
          (curr) => (typeof curr === "string" ? curr : curr.number) === nNum,
        );
      });
    }

    if (!nextCandidate) {
      AppUI.toast("已無更多候選星球可供替換", "info");
      return;
    }

    const nextNum =
      typeof nextCandidate === "string" ? nextCandidate : nextCandidate.number;

    // --- 啟動消失動畫 ---
    const $resultArea = $("#resultArea");
    // 1. 啟動消失動畫與容器半透明過渡
    const $targetWrapper = $resultArea.find(".col").filter(function () {
      return $(this).find(".lotto-ball").text().trim() === toRemoveNum;
    });

    $resultArea.css("transition", "opacity 0.3s ease").css("opacity", "0.6");
    $targetWrapper.addClass("ball-exit-space");

    // 延遲執行邏輯，等待動畫完成
    setTimeout(() => {
      res.prediction[current.length - 1] = nextCandidate;

      let big = 0,
        small = 0,
        odd = 0,
        even = 0;
      res.prediction.forEach((n) => {
        const nStr = typeof n === "string" ? n : n.number;
        const num = Number(nStr);
        if (num > mid) big++;
        else small++;
        if (num % 2 !== 0) odd++;
        else even++;
      });
      // 排序保持一致
      res.prediction.sort((a, b) => {
        const valA = Number(typeof a === "string" ? a : a.number);
        const valB = Number(typeof b === "string" ? b : b.number);
        return valA - valB;
      });
      res.balanceStats = { big, small, odd, even };

      // --- 核心修正：重新計算命中摘要 (hitSummary) 與特別號狀態 ---
      if (res.actualNums && res.actualNums.length > 0) {
        const actualNums = res.actualNums.map(Number);
        const predNums = res.prediction.map((n) =>
          Number(typeof n === "string" ? n : n.number),
        );
        const mainHits = predNums.filter((n) => actualNums.includes(n)).length;
        const totalToHit = lotto === "L539" ? 5 : 6;
        let summary = `命中 ${mainHits}/${totalToHit}`;

        let s1HitNow = false;
        if (res.actualS1) {
          s1HitNow = predNums.includes(Number(res.actualS1));
          if (s1HitNow) summary += " (+特別號)";
        }
        res.hitSummary = summary;
        res.isS1Hit = s1HitNow; // 同步更新卡片邊框判定旗標
      }

      // 2. 渲染結果並對新號碼套用動畫
      renderResults(res, nextNum);
      $resultArea.css("opacity", "1");

      AppUI.toast(
        `已剔除 ${toRemoveNum}，遞補${needSmall ? "平衡小號" : "平衡大號"} ${nextNum}`,
        "success",
      );
    }, 400);
  };

      elementCategory: "手動",
      elementColor: "badge-secondary",

  /**
   * 更新快取資訊區塊 (新增功能)
   */
  function updateCacheInfo() {
    const lotto = $("#lottoType").val();
    const $container = $("#cacheInfoContainer");

    // 增加過渡感，提示使用者正在更新
    $container.css("opacity", "0.6");

    google.script.run
      .withSuccessHandler(function (info) {
        $container.css("opacity", "1");
        const html = `
        <div class="d-flex justify-content-center gap-3 mt-4 small text-muted border-top pt-2">
          <span><i class="fas fa-code-branch me-1"></i>版本: <b>${info.version}</b></span>
          <span><i class="fas fa-database me-1"></i>快取行數: <b>${info.rowCount}</b></span>
        </div>`;
        $container.html(html);
      })
      .getCacheInfo(lotto);
  }
</script>
